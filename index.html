<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B1A17">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Ledger — Lift Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  :root{
    --bg: #1B1A17;
    --surface: #221F1B;
    --surface-2: #2B2722;
    --line: #3A352E;
    --chalk: #EDE9E1;
    --chalk-dim: #9A9284;
    --steel: #6C89A3;
    --steel-dim: #3F5266;
    --olive: #8A9463;
    --olive-dim: #4E5539;
    --rust: #C1541F;
    --rust-dim: #6B3016;
    --radius: 3px;
  }

  *{ box-sizing: border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body::before{
    content:"";
    position: fixed; inset:0;
    background-image: radial-gradient(circle at 1px 1px, rgba(237,233,225,0.035) 1px, transparent 0);
    background-size: 18px 18px;
    pointer-events:none;
    z-index: 0;
  }

  h1,h2,h3,.display{
    font-family:'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin:0;
    font-weight:600;
  }
  .mono{ font-family:'IBM Plex Mono', monospace; }

  #app{ position:relative; z-index:1; max-width: 880px; margin: 0 auto; padding: 28px 20px 80px; }

  /* Header */
  .masthead{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px; border-bottom:2px solid var(--line); padding-bottom:16px; }
  .masthead h1{ font-size: 26px; letter-spacing:0.06em; }
  .masthead h1 span{ color: var(--rust); }
  .masthead .sub{ color: var(--chalk-dim); font-size:12px; letter-spacing:0.08em; text-transform:uppercase; }
  .unit-toggle{ display:flex; border:1px solid var(--line); border-radius: var(--radius); overflow:hidden; }
  .unit-btn{ font-family:'Oswald',sans-serif; letter-spacing:0.05em; font-size:12px; padding:7px 14px; background: var(--surface); color: var(--chalk-dim); border:none; cursor:pointer; }
  .unit-btn.active{ background: var(--rust-dim); color: var(--chalk); }
  .unit-btn:not(:last-child){ border-right:1px solid var(--line); }

  /* Tabs */
  nav.tabs{ display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  nav.tabs button{
    background:none; border:none; color: var(--chalk-dim);
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em;
    font-size:13px; padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent;
    transition: color .15s, border-color .15s;
  }
  nav.tabs button:hover{ color: var(--chalk); }
  nav.tabs button.active{ color: var(--chalk); border-bottom-color: var(--rust); }

  .card{ background: var(--surface); border:1px solid var(--line); border-radius: var(--radius); padding:20px; margin-bottom:16px; }
  .card h2{ font-size:16px; color: var(--chalk-dim); margin-bottom:14px; }

  button.btn{
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em;
    background: var(--surface-2); color: var(--chalk); border:1px solid var(--line);
    padding:9px 16px; border-radius: var(--radius); cursor:pointer; font-size:13px;
    transition: background .15s, border-color .15s;
  }
  button.btn:hover{ border-color: var(--chalk-dim); }
  button.btn.primary{ background: var(--rust-dim); border-color: var(--rust); color: var(--chalk); }
  button.btn.primary:hover{ background: var(--rust); }
  button.btn.ghost{ background:none; }
  button.btn.small{ padding:5px 10px; font-size:11px; }
  button.icon-btn{ background:none; border:none; color: var(--chalk-dim); cursor:pointer; font-size:16px; line-height:1; padding:4px 8px; }
  button.icon-btn:hover{ color: var(--rust); }
  button:focus-visible, input:focus-visible, select:focus-visible{ outline: 2px solid var(--steel); outline-offset:1px; }

  input[type=text], input[type=number], input[type=date], select, textarea{
    background: var(--bg); border:1px solid var(--line); color: var(--chalk);
    font-family:'Inter',sans-serif; font-size:14px; padding:8px 10px; border-radius: var(--radius);
    width:100%;
  }
  label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color: var(--chalk-dim); margin-bottom:5px; }

  /* Calendar */
  .cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-header h2{ font-size:18px; color:var(--chalk); }
  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; }
  .cal-dow{ text-align:center; font-size:10px; letter-spacing:0.08em; color:var(--chalk-dim); text-transform:uppercase; padding-bottom:4px; }
  .cal-cell{
    aspect-ratio:1; background: var(--bg); border:1px solid var(--line); border-radius: var(--radius);
    display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative;
    cursor:pointer; transition: border-color .15s;
  }
  .cal-cell:hover{ border-color: var(--chalk-dim); }
  .cal-cell.empty{ background:none; border:none; cursor:default; }
  .cal-cell .num{ font-family:'IBM Plex Mono',monospace; font-size:11px; color: var(--chalk-dim); position:absolute; top:4px; left:6px; }
  .cal-cell.today{ border-color: var(--rust); }
  .plate{ width:22px; height:22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Oswald',sans-serif; font-size:10px; font-weight:600; color: var(--bg); border:2px solid; }
  .plate.upper{ background: var(--steel); border-color: var(--chalk); }
  .plate.legs{ background: var(--olive); border-color: var(--chalk); }
  .plate.free{ background: var(--rust); border-color: var(--chalk); }
  .cal-legend{ display:flex; gap:18px; margin-top:14px; font-size:11px; color:var(--chalk-dim); flex-wrap:wrap; }
  .cal-legend span{ display:inline-flex; align-items:center; gap:6px; }
  .legend-dot{ width:10px; height:10px; border-radius:50%; display:inline-block; }

  /* Day detail panel */
  .day-panel{ margin-top:18px; padding-top:18px; border-top:1px dashed var(--line); }
  .day-panel .empty-state{ color: var(--chalk-dim); font-size:13px; }

  /* Log workout */
  .row{ display:flex; gap:12px; }
  .row > *{ flex:1; }
  .exercise-block{ border:1px solid var(--line); border-radius: var(--radius); padding:14px; margin-bottom:10px; background: var(--bg); }
  .exercise-block .ex-title{ display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
  .exercise-block .ex-title h3{ font-size:14px; color: var(--chalk); text-transform:none; letter-spacing:0; }
  .set-row{ display:grid; grid-template-columns: 70px 70px 1fr 28px; gap:8px; align-items:center; margin-bottom:6px; }
  .set-row .set-idx{ font-family:'IBM Plex Mono',monospace; font-size:11px; color: var(--chalk-dim); }
  .set-row input{ padding:6px 8px; font-size:13px; }

  .preset-picker{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
  .preset-picker button{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.03em; font-size:12px; padding:8px 14px; border-radius:var(--radius); border:1px solid var(--line); background: var(--bg); color: var(--chalk-dim); cursor:pointer; }
  .preset-picker button.active{ border-color: var(--steel); color: var(--chalk); background: var(--steel-dim); }
  .preset-picker button[data-cat="legs"].active{ border-color: var(--olive); background: var(--olive-dim); }
  .preset-picker button[data-cat="free"].active{ border-color: var(--rust); background: var(--rust-dim); }

  /* History */
  .session-item{ border:1px solid var(--line); border-radius: var(--radius); margin-bottom:10px; background: var(--bg); overflow:hidden; }
  .session-head{ display:flex; justify-content:space-between; align-items:center; padding:12px 14px; cursor:pointer; }
  .session-head .meta{ display:flex; align-items:center; gap:10px; }
  .session-head .date{ font-family:'IBM Plex Mono',monospace; font-size:13px; color: var(--chalk-dim); }
  .session-head .label{ font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:0.03em; }
  .session-body{ padding:0 14px 14px; border-top:1px solid var(--line); display:none; }
  .session-body.open{ display:block; padding-top:12px; }
  .session-body .ex{ margin-bottom:10px; }
  .session-body .ex-name{ font-size:13px; color: var(--chalk); margin-bottom:4px; font-weight:500; }
  .session-body table{ width:100%; border-collapse: collapse; font-family:'IBM Plex Mono',monospace; font-size:12px; }
  .session-body td{ padding:3px 8px 3px 0; color: var(--chalk-dim); }
  .session-body td.note{ color: var(--chalk-dim); font-style:italic; font-family:'Inter',sans-serif; }

  /* Progress */
  .ex-select{ margin-bottom:18px; }
  .chart-wrap{ background: var(--bg); border:1px solid var(--line); border-radius: var(--radius); padding:16px; }
  .pr-stat-row{ display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
  .pr-stat{ background: var(--bg); border:1px solid var(--line); border-radius: var(--radius); padding:14px 18px; flex:1; min-width:130px; }
  .pr-stat .val{ font-family:'Oswald',sans-serif; font-size:24px; color: var(--rust); }
  .pr-stat .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color: var(--chalk-dim); margin-top:2px; }

  /* Presets editor */
  .preset-cat{ margin-bottom:22px; }
  .preset-cat h3{ font-size:14px; color: var(--chalk); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px; border-left:3px solid var(--steel); padding-left:8px; }
  .preset-cat.legs h3{ border-left-color: var(--olive); }
  .preset-list-item{ display:flex; gap:8px; margin-bottom:6px; align-items:center; }
  .empty-state{ text-align:center; padding:30px 10px; color: var(--chalk-dim); font-size:13px; }
  .empty-state .display{ font-size:14px; color: var(--chalk-dim); margin-bottom:6px; }

  ::-webkit-scrollbar{ width:8px; height:8px; }
  ::-webkit-scrollbar-thumb{ background: var(--line); border-radius:4px; }

  @media (max-width: 520px){
    .set-row{ grid-template-columns: 55px 55px 1fr 24px; }
    .masthead{ flex-direction:column; align-items:flex-start; gap:4px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ---------- Constants ---------- */
  var DAY_TYPES = {
    upperA:  { label: "Upper A",        cat:"upper", badge:"A" },
    upperB:  { label: "Upper B",        cat:"upper", badge:"B" },
    legsA:   { label: "Legs + Arms A",  cat:"legs",  badge:"A" },
    legsB:   { label: "Legs + Arms B",  cat:"legs",  badge:"B" },
    free:    { label: "Freeform",       cat:"free",  badge:"F" }
  };

  var DEFAULT_PRESETS = {
    upperA: ["Lat pull down","Incline DB chest press","Barbell row","Military press","Incline DB fly","Lateral raises","Face pulls"],
    upperB: ["Weighted pull ups","Smith machine incline chest press","Sitting machine row","Seated DB shoulder press","Vertical chest press","Lateral raises","Seated rear delt DB flys"],
    legsA:  ["Hack Squat","Barbell RDL","DB Romanian Split Squats","Hamstring curl","Leg curl","Standing calf","Cable overhead tricep extension","Cable bicep curl","Cable tricep extensions","Pronated bicep curl"],
    legsB:  ["Leg press","Barbell RDL","Walking DB lunges","Hamstring curl","Leg curl","Standing calf","Seated DB overhead tricep extension","Bicep curl DB","Dips","Hammer curl"]
  };

  var DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var KG_TO_LBS = 2.20462;

  /* ---------- State ---------- */
  var state = {
    tab: "calendar",
    presets: null,
    workouts: null,
    unit: "kg",              // canonical storage is always kg; this only controls display/input
    calMonth: new Date().getMonth(),
    calYear: new Date().getFullYear(),
    selectedDate: null,
    logDate: todayStr(),
    logDayType: null,
    logExercises: [],       // [{name, sets:[{weight,reps,note}]}] — weight held in state.unit while editing
    editingSessionId: null, // if set, saving updates this existing session instead of creating a new one
    progressExercise: null,
    loaded: false
  };

  function todayStr(){
    var d = new Date();
    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  }
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
  function round1(n){ return Math.round(n*10)/10; }
  function kgToDisplay(kg){ return state.unit === 'lbs' ? round1(kg*KG_TO_LBS) : round1(kg); }
  function displayToKg(val){ return state.unit === 'lbs' ? val/KG_TO_LBS : val; }
  function unitLabel(){ return state.unit; }

  /* ---------- Storage ---------- */
  function loadData(){
    try{
      var p = localStorage.getItem('ltp:presets');
      state.presets = p ? JSON.parse(p) : JSON.parse(JSON.stringify(DEFAULT_PRESETS));
    }catch(e){ state.presets = JSON.parse(JSON.stringify(DEFAULT_PRESETS)); }
    try{
      var w = localStorage.getItem('ltp:workouts');
      state.workouts = w ? JSON.parse(w) : [];
    }catch(e){ state.workouts = []; }
    try{
      var u = localStorage.getItem('ltp:unit');
      state.unit = (u === 'kg' || u === 'lbs') ? u : 'kg';
    }catch(e){ state.unit = 'kg'; }
    state.loaded = true;
    render();
  }
  function savePresets(){
    try{ localStorage.setItem('ltp:presets', JSON.stringify(state.presets)); }
    catch(e){ console.error('Failed to save presets', e); alert('Could not save presets — your browser storage may be full or blocked.'); }
  }
  function saveWorkouts(){
    try{ localStorage.setItem('ltp:workouts', JSON.stringify(state.workouts)); }
    catch(e){ console.error('Failed to save workouts', e); alert('Could not save workout — your browser storage may be full or blocked.'); }
  }
  function saveUnit(){
    try{ localStorage.setItem('ltp:unit', state.unit); }
    catch(e){ console.error('Failed to save unit', e); }
  }

  /* ---------- Helpers ---------- */
  function workoutsOnDate(dateStr){
    return state.workouts.filter(function(w){ return w.date === dateStr; });
  }
  function allExerciseNames(){
    var set = {};
    Object.keys(state.presets).forEach(function(k){ state.presets[k].forEach(function(n){ set[n]=true; }); });
    state.workouts.forEach(function(w){ w.exercises.forEach(function(e){ set[e.name]=true; }); });
    return Object.keys(set).sort(function(a,b){ return a.localeCompare(b); });
  }
  function bestSet(sets){
    // best = highest weight, tie-break higher reps
    var best = null;
    sets.forEach(function(s){
      var w = parseFloat(s.weight)||0, r = parseInt(s.reps)||0;
      if(!best || w > best.w || (w === best.w && r > best.r)){
        best = { w:w, r:r, note:s.note||"" };
      }
    });
    return best;
  }
  function startEditSession(id){
    var w = state.workouts.find(function(x){ return x.id === id; });
    if(!w) return;
    state.logDate = w.date;
    state.logDayType = w.dayType;
    state.logExercises = w.exercises.map(function(e){
      return {
        name: e.name,
        sets: e.sets.map(function(s){
          return { weight: String(kgToDisplay(s.weight||0)), reps: String(s.reps||''), note: s.note||'' };
        })
      };
    });
    state.editingSessionId = id;
    state.tab = 'log';
    render();
  }

  function exerciseHistory(name){
    var points = [];
    state.workouts.forEach(function(w){
      w.exercises.forEach(function(e){
        if(e.name === name && e.sets.length){
          var b = bestSet(e.sets);
          if(b) points.push({ date:w.date, weight:b.w, reps:b.r, note:b.note });
        }
      });
    });
    points.sort(function(a,b){ return a.date.localeCompare(b.date); });
    return points;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
    });
  }

  /* ---------- Render root ---------- */
  function render(){
    var app = document.getElementById('app');
    if(!state.loaded){
      app.innerHTML = '<div class="empty-state">Loading your log…</div>';
      return;
    }
    var html = '';
    html += renderMasthead();
    html += renderTabs();
    if(state.tab === 'calendar') html += renderCalendar();
    else if(state.tab === 'log') html += renderLog();
    else if(state.tab === 'progress') html += renderProgress();
    else if(state.tab === 'history') html += renderHistory();
    else if(state.tab === 'presets') html += renderPresetsEditor();
    app.innerHTML = html;
    attachHandlers();
  }

  function renderMasthead(){
    return '<div class="masthead">'
      + '<h1>LEDGER<span>.</span></h1>'
      + '<div class="unit-toggle">'
      + '<button class="unit-btn'+(state.unit==='kg'?' active':'')+'" data-unit="kg">KG</button>'
      + '<button class="unit-btn'+(state.unit==='lbs'?' active':'')+'" data-unit="lbs">LBS</button>'
      + '</div>'
      + '</div>';
  }

  function renderTabs(){
    var tabs = [["calendar","Calendar"],["log","Log Workout"],["progress","Progress"],["history","History"],["presets","Presets"]];
    var html = '<nav class="tabs">';
    tabs.forEach(function(t){
      html += '<button data-tab="'+t[0]+'" class="'+(state.tab===t[0]?'active':'')+'">'+t[1]+'</button>';
    });
    html += '</nav>';
    return html;
  }

  /* ---------- Calendar ---------- */
  function renderCalendar(){
    var y = state.calYear, m = state.calMonth;
    var firstDay = new Date(y, m, 1);
    var startOffset = (firstDay.getDay() + 6) % 7; // Monday=0
    var daysInMonth = new Date(y, m+1, 0).getDate();
    var today = todayStr();

    var html = '<div class="card">';
    html += '<div class="cal-header">';
    html += '<button class="btn small" id="cal-prev">&larr;</button>';
    html += '<h2>'+MONTHS[m]+' '+y+'</h2>';
    html += '<button class="btn small" id="cal-next">&rarr;</button>';
    html += '</div>';
    html += '<div class="cal-grid">';
    DOW.forEach(function(d){ html += '<div class="cal-dow">'+d+'</div>'; });
    for(var i=0;i<startOffset;i++) html += '<div class="cal-cell empty"></div>';
    for(var day=1; day<=daysInMonth; day++){
      var dateStr = y+"-"+pad(m+1)+"-"+pad(day);
      var sessions = workoutsOnDate(dateStr);
      var isToday = dateStr === today;
      html += '<div class="cal-cell'+(isToday?' today':'')+'" data-date="'+dateStr+'">';
      html += '<span class="num">'+day+'</span>';
      if(sessions.length){
        var s = sessions[0];
        var cat = DAY_TYPES[s.dayType] ? DAY_TYPES[s.dayType].cat : 'free';
        var badge = DAY_TYPES[s.dayType] ? DAY_TYPES[s.dayType].badge : 'F';
        html += '<div class="plate '+(cat==='upper'?'upper':cat==='legs'?'legs':'free')+'">'+badge+'</div>';
      }
      html += '</div>';
    }
    html += '</div>';
    html += '<div class="cal-legend">'
      + '<span><span class="legend-dot" style="background:var(--steel)"></span> Upper day</span>'
      + '<span><span class="legend-dot" style="background:var(--olive)"></span> Legs + Arms day</span>'
      + '<span><span class="legend-dot" style="background:var(--rust)"></span> Freeform</span>'
      + '</div>';

    html += '<div class="day-panel">'+renderDayPanel()+'</div>';
    html += '</div>';
    return html;
  }

  function renderDayPanel(){
    if(!state.selectedDate){
      return '<div class="empty-state">Tap a date to see or log that day\'s training.</div>';
    }
    var sessions = workoutsOnDate(state.selectedDate);
    var html = '<h3 style="font-size:14px;color:var(--chalk-dim);margin-bottom:10px;">'+state.selectedDate+'</h3>';
    if(!sessions.length){
      html += '<div class="empty-state" style="text-align:left;padding:0 0 10px;">No session logged.</div>';
      html += '<button class="btn primary small" id="day-log-btn">Log this day</button>';
      return html;
    }
    sessions.forEach(function(s){
      html += '<div style="margin-bottom:12px;">';
      html += '<div class="label" style="margin-bottom:6px;">'+ (DAY_TYPES[s.dayType]?DAY_TYPES[s.dayType].label:'Freeform') +'</div>';
      s.exercises.forEach(function(e){
        html += '<div class="ex-name" style="font-size:13px;margin-bottom:2px;">'+escapeHtml(e.name)+'</div>';
        html += '<table><tbody>';
        e.sets.forEach(function(set,i){
          html += '<tr><td class="mono">'+(i+1)+'.</td><td class="mono">'+kgToDisplay(set.weight||0)+' '+unitLabel()+'</td><td class="mono">x'+(set.reps||0)+'</td>'
            + (set.note? '<td class="note">'+escapeHtml(set.note)+'</td>':'') + '</tr>';
        });
        html += '</tbody></table>';
      });
      html += '</div>';
    });
    html += '<div style="display:flex;gap:10px;">';
    html += '<button class="btn ghost small" data-edit-session="'+sessions[0].id+'">Edit this session</button>';
    html += '<button class="btn ghost small" data-del-session="'+sessions[0].id+'">Delete this session</button>';
    html += '</div>';
    return html;
  }

  /* ---------- Log Workout ---------- */
  function renderLog(){
    var editing = !!state.editingSessionId;
    var html = '<div class="card">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;">';
    html += '<h2 style="margin-bottom:0;">'+(editing ? 'Edit Session' : 'New Session')+'</h2>';
    if(editing) html += '<button class="btn ghost small" id="cancel-edit">Cancel edit</button>';
    html += '</div>';
    html += '<div style="height:14px;"></div>';
    html += '<div class="row" style="margin-bottom:16px;">';
    html += '<div><label>Date</label><input type="date" id="log-date" value="'+state.logDate+'"></div>';
    html += '</div>';

    html += '<label>Day type</label>';
    html += '<div class="preset-picker">';
    Object.keys(DAY_TYPES).forEach(function(k){
      var dt = DAY_TYPES[k];
      html += '<button data-daytype="'+k+'" data-cat="'+dt.cat+'" class="'+(state.logDayType===k?'active':'')+'">'+dt.label+'</button>';
    });
    html += '</div>';

    if(state.logDayType){
      html += '<div id="log-exercises">';
      state.logExercises.forEach(function(ex, exIdx){
        html += renderExerciseBlock(ex, exIdx);
      });
      html += '</div>';
      html += '<button class="btn ghost small" id="add-custom-ex" style="margin-bottom:16px;">+ Add exercise</button>';
      html += '<div><button class="btn primary" id="save-session">'+(editing?'Update session':'Save session')+'</button></div>';
    } else {
      html += '<div class="empty-state">Pick a day type to load your exercises, or choose Freeform to build from scratch.</div>';
    }
    html += '</div>';
    return html;
  }

  function renderExerciseBlock(ex, exIdx){
    var html = '<div class="exercise-block" data-ex-idx="'+exIdx+'">';
    html += '<div class="ex-title"><h3>'+escapeHtml(ex.name)+'</h3>'
      + '<button class="icon-btn" data-remove-ex="'+exIdx+'" title="Remove exercise">&times;</button></div>';
    ex.sets.forEach(function(s, setIdx){
      html += '<div class="set-row" data-set-idx="'+setIdx+'">';
      html += '<div class="set-idx">Set '+(setIdx+1)+'</div>';
      html += '<input type="number" placeholder="'+state.unit+'" step="0.5" value="'+(s.weight||'')+'" data-field="weight" data-ex-idx="'+exIdx+'" data-set-idx="'+setIdx+'">';
      html += '<input type="number" placeholder="reps" value="'+(s.reps||'')+'" data-field="reps" data-ex-idx="'+exIdx+'" data-set-idx="'+setIdx+'" style="flex:0 0 70px;">';
      html += '<input type="text" placeholder="note" value="'+escapeHtml(s.note||'')+'" data-field="note" data-ex-idx="'+exIdx+'" data-set-idx="'+setIdx+'">';
      html += '<button class="icon-btn" data-remove-set data-ex-idx="'+exIdx+'" data-set-idx="'+setIdx+'" title="Remove set">&times;</button>';
      html += '</div>';
    });
    html += '<button class="btn ghost small" data-add-set="'+exIdx+'" style="margin-top:6px;">+ Add set</button>';
    html += '</div>';
    return html;
  }

  /* ---------- Progress ---------- */
  function renderProgress(){
    var names = allExerciseNames();
    if(!state.progressExercise && names.length) state.progressExercise = names[0];

    var html = '<div class="card">';
    html += '<h2>Progress</h2>';
    html += '<div class="ex-select"><label>Exercise</label><select id="progress-select">';
    names.forEach(function(n){
      html += '<option value="'+escapeHtml(n)+'"'+(n===state.progressExercise?' selected':'')+'>'+escapeHtml(n)+'</option>';
    });
    html += '</select></div>';

    if(!names.length){
      html += '<div class="empty-state">Log a session to start tracking progress.</div>';
      html += '</div>';
      return html;
    }

    var rawPoints = exerciseHistory(state.progressExercise);
    if(!rawPoints.length){
      html += '<div class="empty-state">No sets logged yet for this exercise.</div></div>';
      return html;
    }
    var points = rawPoints.map(function(p){ return { date:p.date, weight:kgToDisplay(p.weight), reps:p.reps, note:p.note }; });

    var maxW = points.reduce(function(a,p){ return Math.max(a,p.weight); }, 0);
    var latest = points[points.length-1];
    var firstW = points[0].weight;
    var delta = round1(maxW - firstW);

    html += '<div class="pr-stat-row">';
    html += '<div class="pr-stat"><div class="val">'+maxW+' '+unitLabel()+'</div><div class="lbl">Best lift</div></div>';
    html += '<div class="pr-stat"><div class="val">'+latest.weight+'&times;'+latest.reps+'</div><div class="lbl">Most recent</div></div>';
    html += '<div class="pr-stat"><div class="val">'+(delta>=0?'+':'')+delta+' '+unitLabel()+'</div><div class="lbl">Since first log</div></div>';
    html += '</div>';

    html += '<div class="chart-wrap">'+renderChart(points)+'</div>';

    html += '<table style="width:100%;margin-top:16px;border-collapse:collapse;font-family:IBM Plex Mono,monospace;font-size:12px;">';
    html += '<thead><tr style="color:var(--chalk-dim);text-align:left;"><th style="padding:6px 0;">Date</th><th>Weight</th><th>Reps</th><th>Note</th></tr></thead><tbody>';
    points.slice().reverse().forEach(function(p){
      html += '<tr style="border-top:1px solid var(--line);"><td style="padding:6px 8px 6px 0;color:var(--chalk-dim);">'+p.date+'</td>'
        + '<td style="color:var(--chalk);">'+p.weight+' '+unitLabel()+'</td><td style="color:var(--chalk);">'+p.reps+'</td>'
        + '<td style="color:var(--chalk-dim);font-family:Inter,sans-serif;font-style:italic;">'+escapeHtml(p.note||'')+'</td></tr>';
    });
    html += '</tbody></table>';

    html += '</div>';
    return html;
  }

  function renderChart(points){
    var w = 760, h = 220, padL = 40, padR = 16, padT = 16, padB = 30;
    var innerW = w - padL - padR, innerH = h - padT - padB;
    var weights = points.map(function(p){return p.weight;});
    var minW = Math.min.apply(null, weights), maxW = Math.max.apply(null, weights);
    if(minW === maxW){ minW -= 5; maxW += 5; }
    var range = maxW - minW;

    function x(i){ return padL + (points.length===1 ? innerW/2 : (i/(points.length-1))*innerW); }
    function y(val){ return padT + innerH - ((val-minW)/range)*innerH; }

    var pathD = points.map(function(p,i){ return (i===0?'M':'L')+x(i)+','+y(p.weight); }).join(' ');

    var svg = '<svg viewBox="0 0 '+w+' '+h+'" width="100%" style="display:block;">';
    // gridlines
    for(var g=0; g<=3; g++){
      var gy = padT + (innerH/3)*g;
      svg += '<line x1="'+padL+'" y1="'+gy+'" x2="'+(w-padR)+'" y2="'+gy+'" stroke="var(--line)" stroke-width="1"/>';
    }
    svg += '<path d="'+pathD+'" fill="none" stroke="var(--rust)" stroke-width="2"/>';
    points.forEach(function(p,i){
      svg += '<circle cx="'+x(i)+'" cy="'+y(p.weight)+'" r="4" fill="var(--rust)" stroke="var(--chalk)" stroke-width="1.5"/>';
    });
    // y labels
    svg += '<text x="4" y="'+(y(maxW)+4)+'" font-family="IBM Plex Mono" font-size="10" fill="var(--chalk-dim)">'+maxW+'</text>';
    svg += '<text x="4" y="'+(y(minW)+4)+'" font-family="IBM Plex Mono" font-size="10" fill="var(--chalk-dim)">'+minW+'</text>';
    // x labels first/last
    svg += '<text x="'+x(0)+'" y="'+(h-8)+'" font-family="IBM Plex Mono" font-size="10" fill="var(--chalk-dim)" text-anchor="start">'+points[0].date+'</text>';
    if(points.length>1){
      svg += '<text x="'+x(points.length-1)+'" y="'+(h-8)+'" font-family="IBM Plex Mono" font-size="10" fill="var(--chalk-dim)" text-anchor="end">'+points[points.length-1].date+'</text>';
    }
    svg += '</svg>';
    return svg;
  }

  /* ---------- History ---------- */
  function renderHistory(){
    var html = '<div class="card">';
    html += '<h2>History</h2>';
    var sorted = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(!sorted.length){
      html += '<div class="empty-state">No sessions yet. Head to Log Workout to start.</div>';
    } else {
      sorted.forEach(function(s){
        var dt = DAY_TYPES[s.dayType] ? DAY_TYPES[s.dayType].label : 'Freeform';
        html += '<div class="session-item">';
        html += '<div class="session-head" data-toggle-session="'+s.id+'">';
        html += '<div class="meta"><span class="date">'+s.date+'</span><span class="label">'+dt+'</span></div>';
        html += '<div style="display:flex;align-items:center;gap:4px;">';
        html += '<button class="icon-btn" data-edit-session="'+s.id+'" title="Edit">&#9998;</button>';
        html += '<button class="icon-btn" data-del-session="'+s.id+'" title="Delete">&times;</button>';
        html += '</div>';
        html += '</div>';
        html += '<div class="session-body" id="session-body-'+s.id+'">';
        s.exercises.forEach(function(e){
          html += '<div class="ex">';
          html += '<div class="ex-name">'+escapeHtml(e.name)+'</div>';
          html += '<table><tbody>';
          e.sets.forEach(function(set,i){
            html += '<tr><td class="mono">'+(i+1)+'.</td><td class="mono">'+kgToDisplay(set.weight||0)+' '+unitLabel()+'</td><td class="mono">x'+(set.reps||0)+'</td>'
              + (set.note? '<td class="note">'+escapeHtml(set.note)+'</td>':'') + '</tr>';
          });
          html += '</tbody></table></div>';
        });
        html += '</div></div>';
      });
    }
    html += '</div>';
    return html;
  }

  /* ---------- Presets editor ---------- */
  function renderPresetsEditor(){
    var html = '<div class="card">';
    html += '<h2>Edit Presets</h2>';
    Object.keys(DEFAULT_PRESETS).forEach(function(key){
      var dt = DAY_TYPES[key];
      html += '<div class="preset-cat '+(dt.cat==='legs'?'legs':'')+'">';
      html += '<h3>'+dt.label+'</h3>';
      state.presets[key].forEach(function(name, i){
        html += '<div class="preset-list-item">';
        html += '<input type="text" value="'+escapeHtml(name)+'" data-preset-key="'+key+'" data-preset-idx="'+i+'">';
        html += '<button class="icon-btn" data-preset-remove="'+key+'" data-preset-idx="'+i+'">&times;</button>';
        html += '</div>';
      });
      html += '<button class="btn ghost small" data-preset-add="'+key+'">+ Add exercise</button>';
      html += '</div>';
    });
    html += '<div style="display:flex;gap:10px;margin-top:10px;">';
    html += '<button class="btn primary" id="save-presets">Save presets</button>';
    html += '<button class="btn ghost" id="reset-presets">Reset to defaults</button>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  /* ---------- Event handling ---------- */
  function attachHandlers(){
    var app = document.getElementById('app');

    var tabBtns = app.querySelectorAll('[data-tab]');
    tabBtns.forEach(function(b){
      b.addEventListener('click', function(){
        var target = b.getAttribute('data-tab');
        if(target === 'log' && state.tab !== 'log'){
          // fresh entry into Log Workout via nav (not via an Edit action) starts a clean form
          state.editingSessionId = null;
          state.logDayType = null;
          state.logExercises = [];
          state.logDate = todayStr();
        }
        state.tab = target;
        render();
      });
    });

    app.querySelectorAll('[data-unit]').forEach(function(b){
      b.addEventListener('click', function(){
        var newUnit = b.getAttribute('data-unit');
        if(newUnit === state.unit) return;
        // convert any in-progress (unsaved) log entries so numbers on screen stay correct
        state.logExercises.forEach(function(ex){
          ex.sets.forEach(function(s){
            var v = parseFloat(s.weight);
            if(!isNaN(v)){
              var kg = state.unit === 'lbs' ? v/KG_TO_LBS : v;
              s.weight = String(newUnit === 'lbs' ? round1(kg*KG_TO_LBS) : round1(kg));
            }
          });
        });
        state.unit = newUnit;
        saveUnit();
        render();
      });
    });

    // Calendar nav
    var prev = document.getElementById('cal-prev');
    var next = document.getElementById('cal-next');
    if(prev) prev.addEventListener('click', function(){
      state.calMonth--; if(state.calMonth<0){ state.calMonth=11; state.calYear--; }
      render();
    });
    if(next) next.addEventListener('click', function(){
      state.calMonth++; if(state.calMonth>11){ state.calMonth=0; state.calYear++; }
      render();
    });
    app.querySelectorAll('[data-date]').forEach(function(cell){
      cell.addEventListener('click', function(){
        state.selectedDate = cell.getAttribute('data-date');
        render();
      });
    });
    var dayLogBtn = document.getElementById('day-log-btn');
    if(dayLogBtn) dayLogBtn.addEventListener('click', function(){
      state.editingSessionId = null;
      state.logDayType = null;
      state.logExercises = [];
      state.logDate = state.selectedDate;
      state.tab = 'log';
      render();
    });

    // Session delete (calendar panel + history)
    app.querySelectorAll('[data-del-session]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        var id = b.getAttribute('data-del-session');
        if(!confirm('Delete this session? This can\'t be undone.')) return;
        state.workouts = state.workouts.filter(function(w){ return w.id !== id; });
        if(state.editingSessionId === id){ state.editingSessionId = null; state.logDayType = null; state.logExercises = []; }
        saveWorkouts();
        render();
      });
    });

    // Session edit (calendar panel + history)
    app.querySelectorAll('[data-edit-session]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        startEditSession(b.getAttribute('data-edit-session'));
      });
    });

    // History expand/collapse
    app.querySelectorAll('[data-toggle-session]').forEach(function(h){
      h.addEventListener('click', function(){
        var id = h.getAttribute('data-toggle-session');
        var body = document.getElementById('session-body-'+id);
        if(body) body.classList.toggle('open');
      });
    });

    // Log: date
    var logDateInput = document.getElementById('log-date');
    if(logDateInput) logDateInput.addEventListener('change', function(){
      state.logDate = logDateInput.value;
    });

    // Log: day type pick
    app.querySelectorAll('[data-daytype]').forEach(function(b){
      b.addEventListener('click', function(){
        var key = b.getAttribute('data-daytype');
        state.logDayType = key;
        if(key === 'free'){
          state.logExercises = [];
        } else {
          state.logExercises = state.presets[key].map(function(name){
            return { name: name, sets: [{weight:'', reps:'', note:''}] };
          });
        }
        render();
      });
    });

    // Log: add custom exercise
    var addCustomEx = document.getElementById('add-custom-ex');
    if(addCustomEx) addCustomEx.addEventListener('click', function(){
      var name = prompt('Exercise name:');
      if(name && name.trim()){
        state.logExercises.push({ name: name.trim(), sets:[{weight:'',reps:'',note:''}] });
        render();
      }
    });

    // Log: remove exercise
    app.querySelectorAll('[data-remove-ex]').forEach(function(b){
      b.addEventListener('click', function(){
        var idx = parseInt(b.getAttribute('data-remove-ex'));
        state.logExercises.splice(idx,1);
        render();
      });
    });

    // Log: add set
    app.querySelectorAll('[data-add-set]').forEach(function(b){
      b.addEventListener('click', function(){
        var idx = parseInt(b.getAttribute('data-add-set'));
        state.logExercises[idx].sets.push({weight:'',reps:'',note:''});
        render();
      });
    });

    // Log: remove set
    app.querySelectorAll('[data-remove-set]').forEach(function(b){
      b.addEventListener('click', function(){
        var exIdx = parseInt(b.getAttribute('data-ex-idx'));
        var setIdx = parseInt(b.getAttribute('data-set-idx'));
        state.logExercises[exIdx].sets.splice(setIdx,1);
        render();
      });
    });

    // Log: field inputs (avoid full re-render on keystroke)
    app.querySelectorAll('[data-field]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var exIdx = parseInt(inp.getAttribute('data-ex-idx'));
        var setIdx = parseInt(inp.getAttribute('data-set-idx'));
        var field = inp.getAttribute('data-field');
        state.logExercises[exIdx].sets[setIdx][field] = inp.value;
      });
    });

    // Log: save session
    var saveBtn = document.getElementById('save-session');
    if(saveBtn) saveBtn.addEventListener('click', function(){
      if(!state.logDate){ alert('Pick a date first.'); return; }
      var cleaned = state.logExercises
        .map(function(e){
          var sets = e.sets
            .filter(function(s){ return s.weight!=='' || s.reps!==''; })
            .map(function(s){
              var entered = parseFloat(s.weight) || 0;
              var kg = state.unit === 'lbs' ? entered/KG_TO_LBS : entered;
              return { weight: Math.round(kg*100)/100, reps: s.reps, note: s.note };
            });
          return { name: e.name, sets: sets };
        })
        .filter(function(e){ return e.sets.length>0; });
      if(!cleaned.length){ alert('Log at least one set before saving.'); return; }
      if(state.editingSessionId){
        var idx = state.workouts.findIndex(function(w){ return w.id === state.editingSessionId; });
        if(idx > -1){
          state.workouts[idx] = { id: state.editingSessionId, date: state.logDate, dayType: state.logDayType, exercises: cleaned };
        }
      } else {
        state.workouts.push({ id: uid(), date: state.logDate, dayType: state.logDayType, exercises: cleaned });
      }
      saveWorkouts();
      state.editingSessionId = null;
      state.logDayType = null;
      state.logExercises = [];
      state.selectedDate = state.logDate;
      state.tab = 'calendar';
      render();
    });

    var cancelEditBtn = document.getElementById('cancel-edit');
    if(cancelEditBtn) cancelEditBtn.addEventListener('click', function(){
      state.editingSessionId = null;
      state.logDayType = null;
      state.logExercises = [];
      state.logDate = todayStr();
      state.tab = 'history';
      render();
    });

    // Progress: exercise select
    var progSelect = document.getElementById('progress-select');
    if(progSelect) progSelect.addEventListener('change', function(){
      state.progressExercise = progSelect.value;
      render();
    });

    // Presets: edit text
    app.querySelectorAll('[data-preset-key]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var key = inp.getAttribute('data-preset-key');
        var idx = parseInt(inp.getAttribute('data-preset-idx'));
        state.presets[key][idx] = inp.value;
      });
    });
    // Presets: remove
    app.querySelectorAll('[data-preset-remove]').forEach(function(b){
      b.addEventListener('click', function(){
        var key = b.getAttribute('data-preset-remove');
        var idx = parseInt(b.getAttribute('data-preset-idx'));
        state.presets[key].splice(idx,1);
        render();
      });
    });
    // Presets: add
    app.querySelectorAll('[data-preset-add]').forEach(function(b){
      b.addEventListener('click', function(){
        var key = b.getAttribute('data-preset-add');
        state.presets[key].push('New exercise');
        render();
      });
    });
    // Presets: save / reset
    var savePresetsBtn = document.getElementById('save-presets');
    if(savePresetsBtn) savePresetsBtn.addEventListener('click', function(){
      savePresets();
      savePresetsBtn.textContent = 'Saved ✓';
      setTimeout(function(){ savePresetsBtn.textContent = 'Save presets'; }, 1400);
    });
    var resetPresetsBtn = document.getElementById('reset-presets');
    if(resetPresetsBtn) resetPresetsBtn.addEventListener('click', function(){
      if(confirm('Reset all presets to the original defaults? This discards your edits.')){
        state.presets = JSON.parse(JSON.stringify(DEFAULT_PRESETS));
        savePresets();
        render();
      }
    });
  }

  loadData();
})();
</script>
</body>
</html>
