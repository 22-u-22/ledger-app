  /* ---- wiring ---- */
  function wire(){
    var app=document.getElementById('app');
    var q=function(s){ return app.querySelectorAll(s); };

    q('[data-tab]').forEach(function(b){
      b.addEventListener('click', function(){
        var t=b.getAttribute('data-tab');
        if(t==='settings' && state.tab==='settings') t='today';   // gear toggles
        if(t===state.tab && t!=='today') return;
        if(t!=='today') state.picking=false;
        state.tab=t; render(); window.scrollTo(0,0);
      });
    });

    // "Pick another" — override the rotation
    var po=document.getElementById('pick-other');
    if(po) po.addEventListener('click', function(){ state.picking=true; render(); window.scrollTo(0,0); });
    var pc=document.getElementById('pick-cancel');
    if(pc) pc.addEventListener('click', function(){ state.picking=false; render(); window.scrollTo(0,0); });

    q('[data-unit]').forEach(function(b){
      b.addEventListener('click', function(){
        var u=b.getAttribute('data-unit');
        if(u===state.unit) return;
        if(state.draft){
          state.draft.exercises.forEach(function(ex){
            ex.sets.forEach(function(s){
              var v=parseFloat(s.weight);
              if(!isNaN(v)){
                var kg = state.unit==='lbs'? v/KG_LBS : v;
                s.weight = String(u==='lbs'? r1(kg*KG_LBS) : r1(kg));
              }
            });
          });
        }
        state.unit=u; save('unit',u); saveDraft(); render();
      });
    });

    // calendar
    var p=document.getElementById('cal-prev'), n=document.getElementById('cal-next');
    if(p) p.addEventListener('click', function(){ state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} render(); });
    if(n) n.addEventListener('click', function(){ state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} render(); });
    q('[data-date]').forEach(function(c){
      c.addEventListener('click', function(){ state.selectedDate=c.getAttribute('data-date'); render(); });
    });
    var ltd=document.getElementById('log-this-day');
    if(ltd) ltd.addEventListener('click', function(){ state.picking=true; state.tab='today'; render(); window.scrollTo(0,0); });

    // session edit / delete
    q('[data-edit]').forEach(function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); editSession(b.getAttribute('data-edit')); });
    });
    q('[data-del]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        if(!confirm('Delete this session permanently?')) return;
        var id=b.getAttribute('data-del');
        state.workouts=state.workouts.filter(function(w){ return w.id!==id; });
        saveWorkouts(); toast('Session deleted'); render();
      });
    });
    q('[data-sess]').forEach(function(hd){
      hd.addEventListener('click', function(){
        var b=document.getElementById('sb-'+hd.getAttribute('data-sess'));
        if(b) b.classList.toggle('open');
      });
    });

    // start session
    var nd=document.getElementById('new-date');
    if(nd) nd.addEventListener('change', function(){ state.selectedDate=nd.value; });
    q('[data-start]').forEach(function(b){
      b.addEventListener('click', function(){ startDraft(b.getAttribute('data-start')); window.scrollTo(0,0); });
    });

    // draft date
    var dd=document.getElementById('d-date');
    if(dd) dd.addEventListener('change', function(){ state.draft.date=dd.value; saveDraft(); });

    // accordion
    q('[data-open]').forEach(function(hd){
      hd.addEventListener('click', function(){
        var i=parseInt(hd.getAttribute('data-open'),10);
        state.openEx = (state.openEx===i? -1 : i);
        render();
      });
    });

    // steppers (buttons)
    q('[data-step]').forEach(function(b){
      b.addEventListener('click', function(){
        var raw=b.getAttribute('data-step');            // e.g. "w+2-1" / "r-2-1"
        var kind=raw[0], sign=raw[1];
        var parts=raw.slice(2).replace(/^-/,'').split('-');
        var i=parseInt(parts[0],10), j=parseInt(parts[1],10);
        var set=state.draft.exercises[i].sets[j];
        var step = kind==='w' ? (state.unit==='lbs'?5:2.5) : 1;
        var cur = parseFloat(kind==='w'? set.weight : set.reps) || 0;
        var next = sign==='+' ? cur+step : Math.max(0, cur-step);
        if(kind==='w') set.weight=String(r1(next)); else set.reps=String(Math.round(next));
        saveDraft(); render();
      });
    });

    // direct typing (no re-render — keeps focus)
    q('[data-fld]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var pr=inp.getAttribute('data-fld').split('-');
        var kind=pr[0], i=parseInt(pr[1],10), j=parseInt(pr[2],10);
        var set=state.draft.exercises[i].sets[j];
        if(kind==='w') set.weight=inp.value; else set.reps=inp.value;
        saveDraft();
      });
    });

    // RIR chips
    q('[data-rir]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-rir').split('-');
        var i=parseInt(pr[0],10), v=pr[1];
        var ex=state.draft.exercises[i];
        ex.rir = (String(ex.rir)===v) ? undefined : v;   // tap again to clear
        saveDraft(); render();
      });
    });

    // note
    q('[data-note]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var i=parseInt(inp.getAttribute('data-note'),10);
        var ex=state.draft.exercises[i];
        if(ex.sets.length) ex.sets[0].note=inp.value;
        saveDraft();
      });
    });

    // mark set done → start rest
    q('[data-setdone]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-setdone').split('-');
        var i=parseInt(pr[0],10), j=parseInt(pr[1],10);
        var ex=state.draft.exercises[i];
        var set=ex.sets[j];
        set.done=!set.done;
        if(set.done){
          if(!set.weight) set.weight='0';
          if(!set.reps) set.reps='0';
          startRest();
          // auto-advance when the exercise is complete
          if(exDone(ex) && state.openEx===i){
            var nx = state.draft.exercises.findIndex(function(e,k){ return k>i && !exDone(e); });
            state.openEx = nx>-1 ? nx : -1;
          }
        }
        saveDraft(); render();
      });
    });

    q('[data-addset]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-addset'),10);
        var sets=state.draft.exercises[i].sets;
        sets.push(newSet(sets[sets.length-1]));
        saveDraft(); render();
      });
    });
    q('[data-delset]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-delset').split('-');
        var i=parseInt(pr[0],10), j=parseInt(pr[1],10);
        state.draft.exercises[i].sets.splice(j,1);
        saveDraft(); render();
      });
    });
    q('[data-delex]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-delex'),10);
        state.draft.exercises.splice(i,1);
        if(state.openEx>=state.draft.exercises.length) state.openEx=-1;
        saveDraft(); render();
      });
    });
    var ae=document.getElementById('add-ex');
    if(ae) ae.addEventListener('click', function(){
      var nm=prompt('Exercise name:');
      if(!nm || !nm.trim()) return;
      state.draft.exercises.push({ name:nm.trim(), sets:seedSets(nm.trim()) });
      state.openEx=state.draft.exercises.length-1;
      saveDraft(); render();
    });

    // finish
    var fin=document.getElementById('finish');
    if(fin) fin.addEventListener('click', function(){
      var d=state.draft;
      var out=d.exercises.map(function(e){
        var sets=e.sets.filter(function(s){ return s.done || s.weight!=='' || s.reps!==''; })
          .map(function(s){
            var v=parseFloat(s.weight)||0;
            return { weight: Math.round(toKg(v)*100)/100, reps: parseInt(s.reps)||0, note:s.note||'' };
          });
        var out_ex = { name:e.name, sets:sets };
        if(e.rir!==undefined && e.rir!=='') out_ex.rir = e.rir;
        return out_ex;
      }).filter(function(e){ return e.sets.length; });

      if(!out.length){ toast('Nothing logged yet'); return; }

      if(d.editingId){
        var ix=state.workouts.findIndex(function(w){ return w.id===d.editingId; });
        if(ix>-1) state.workouts[ix]={ id:d.editingId, date:d.date, dayType:d.dayType, exercises:out };
        toast('Session updated');
      } else {
        state.workouts.push({ id:uid(), date:d.date, dayType:d.dayType, exercises:out });
        toast('Workout saved');
      }
      saveWorkouts();
      state.selectedDate=d.date;
      state.draft=null; saveDraft(); stopRest();
      state.tab='today'; render(); window.scrollTo(0,0);
    });

    var dis=document.getElementById('discard');
    if(dis) dis.addEventListener('click', function(){
      var wasEditing = !!state.draft.editingId;
      if(!confirm(wasEditing?'Discard changes?':'Discard this session? Everything logged will be lost.')) return;
      state.draft=null; saveDraft(); stopRest();
      state.tab = wasEditing ? 'history' : 'today';
      render(); window.scrollTo(0,0);
    });

    // progress
    var pex=document.getElementById('pex');
    if(pex) pex.addEventListener('change', function(){ state.progressExercise=pex.value; render(); });

    // presets
    q('[data-pk]').forEach(function(inp){
      inp.addEventListener('input', function(){
        state.presets[inp.getAttribute('data-pk')][parseInt(inp.getAttribute('data-pi'),10)]=inp.value;
      });
    });
    q('[data-prm]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-prm').split('-');
        state.presets[pr[0]].splice(parseInt(pr[1],10),1); render();
      });
    });
    q('[data-padd]').forEach(function(b){
      b.addEventListener('click', function(){
        state.presets[b.getAttribute('data-padd')].push('New exercise'); render();
      });
    });
    var ps=document.getElementById('psave');
    if(ps) ps.addEventListener('click', function(){
      state.presets = Object.keys(state.presets).reduce(function(acc,k){
        acc[k]=state.presets[k].map(function(x){ return x.trim(); }).filter(Boolean); return acc;
      },{});
      save('presets', state.presets); toast('Presets saved'); render();
    });
    var prst=document.getElementById('preset');
    if(prst) prst.addEventListener('click', function(){
      if(!confirm('Reset all presets to defaults?')) return;
      state.presets=JSON.parse(JSON.stringify(DEFAULT_PRESETS));
      save('presets', state.presets); toast('Presets reset'); render();
    });
    var rd=document.getElementById('rest-dur');
    if(rd) rd.addEventListener('change', function(){
      state.rest.dur=parseInt(rd.value,10); save('rest', String(state.rest.dur)); toast('Rest set to '+fmtTime(state.rest.dur));
    });

    // muscle tags
    var ts=document.getElementById('tsave');
    if(ts) ts.addEventListener('click', function(){
      var next={}, bad=[];
      app.querySelectorAll('[data-tag]').forEach(function(inp){
        var name=inp.getAttribute('data-tag');
        var parts=inp.value.split('/');
        var clean=function(str){
          return (str||'').split(',').map(function(x){ return x.trim(); }).filter(Boolean)
            .filter(function(m){
              if(MUSCLE_ORDER.indexOf(m)>-1) return true;
              bad.push(m); return false;
            });
        };
        next[name]={ p:clean(parts[0]), s:clean(parts[1]) };
      });
      state.tags=next; save('tags', next);
      toast(bad.length ? 'Saved — ignored: '+bad.slice(0,2).join(', ') : 'Tags saved');
      render();
    });
    var tr=document.getElementById('treset');
    if(tr) tr.addEventListener('click', function(){
      if(!confirm('Reset all muscle tags to defaults?')) return;
      state.tags={}; save('tags', {}); toast('Tags reset'); render();
    });
  }

  try{ var r=localStorage.getItem('ltp:rest'); if(r) state.rest.dur=parseInt(r,10)||REST_DEFAULT; }catch(e){}
  load();
})();
</script>
</body>
</html>
