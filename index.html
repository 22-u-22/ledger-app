  /* ---- TARGET ENGINE ----
     Double progression, 6–10 reps.
     Judged on the TOP SET — the heaviest weight you handled, and the best reps
     you got at that weight (set order doesn't matter; a 10 is a 10).
     Top set reaches 10 → add 2.5 kg next time, drop back to 6 and climb again.
     Otherwise hold the weight and chase one more rep (cap 10).                   */
  var REP_LOW = 6, REP_HIGH = 10, STEP_KG = 2.5;

  // heaviest set; ties broken by the most reps at that weight
  function topSet(sets){
    var best=null;
    (sets||[]).forEach(function(s){
      var w=parseFloat(s.weight)||0, r=parseInt(s.reps)||0;
      if(!w && !r) return;
      if(!best || w>best.w || (w===best.w && r>best.r)) best={ w:w, r:r };
    });
    return best;
  }

  function targetFor(name){
    var l = lastFor(name);
    if(!l || !l.sets.length) return null;
    var top = topSet(l.sets);
    if(!top) return null;

    if(top.r >= REP_HIGH){
      return { kg: top.w + STEP_KG, reps: REP_LOW, moved:true, sets:l.sets.length||2,
               why:'You hit '+top.r+' at '+toDisp(top.w)+'. Move up.' };
    }
    return { kg: top.w, reps: Math.min(REP_HIGH, Math.max(REP_LOW, top.r+1)), moved:false, sets:l.sets.length||2,
             why:'Hold the weight, chase one more rep.' };
  }

  // the most recent note you left on this lift, plus how many times you've noted it
  function carriedNote(name){
    var editId = state.draft && state.draft.editingId;
    var notes = [];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        if(editId && w.id===editId) return;
        w.exercises.forEach(function(e){
          if(e.name!==name) return;
          var n = e.sets.map(function(s){ return (s.note||'').trim(); }).filter(Boolean)[0];
          if(n) notes.push(n);
        });
      });
    if(!notes.length) return null;
    return { text: notes[0], count: notes.length };
  }
  function carryHtml(name){
    var c = carriedNote(name);
    if(!c) return '';
    var warn = '<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>';
    var flag = c.count>=3 ? '<span class="flag">Noted '+c.count+'×:</span> ' : '';
    return '<div class="carry">'+warn+'<div>'+flag+esc(c.text)+'</div></div>';
  }

  /* ---- LOAD: sets per muscle over a rolling window ----
     Primary muscle = 1 set. Secondary = 0.5. Standard-ish convention, not gospel. */
  function daysAgo(n){
    var d=new Date(); d.setDate(d.getDate()-n);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function volumeWindow(days){
    var since = daysAgo(days-1);          // inclusive: today + (days-1) back
    var vol = {};
    MUSCLE_ORDER.forEach(function(m){ vol[m] = { sets:0, last:null, from:[] }; });
    state.workouts.forEach(function(w){
      if(w.date < since) return;
      w.exercises.forEach(function(e){
        var n = e.sets.length;
        if(!n) return;
        var t = tagsFor(e.name);
        var credit = function(m, mult, role){
          if(!vol[m]) return;
          vol[m].sets += n*mult;
          // keep the receipts, so the panel can show its working
          vol[m].from.push({ date:w.date, name:e.name, sets:n, mult:mult, role:role });
          if(!vol[m].last || w.date > vol[m].last) vol[m].last = w.date;
        };
        (t.p||[]).forEach(function(m){ credit(m, 1,   'primary');   });
        (t.s||[]).forEach(function(m){ credit(m, 0.5, 'secondary'); });
      });
    });
    return vol;
  }

  /* BUG FIX: "days since trained" was read off the 7-day window, so a muscle
     you last hit 9 days ago showed "—" — indistinguishable from never trained.
     Search the whole history for that column instead. */
  function lastTrainedDate(m){
    var best = null;
    state.workouts.forEach(function(w){
      w.exercises.forEach(function(e){
        if(!e.sets.length) return;
        var t = tagsFor(e.name);
        var hits = (t.p||[]).indexOf(m)>-1 || (t.s||[]).indexOf(m)>-1;
        if(hits && (!best || w.date > best)) best = w.date;
      });
    });
    return best;
  }

  function trainedToday(){
    return state.workouts.some(function(w){ return w.date === todayStr(); });
  }

  /* BUG FIX: this hardcoded 2 sets per lift. Use however many sets you actually
     did that exercise last time, so the projection matches your real behaviour. */
  function plannedAdds(dayType){
    var add = {};
    (state.presets[dayType]||[]).forEach(function(n){
      var l = lastFor(n);
      var sets = (l && l.sets.length) ? l.sets.length : 2;   // 2 = your default
      var t = tagsFor(n);
      (t.p||[]).forEach(function(m){ add[m]=(add[m]||0)+sets; });
      (t.s||[]).forEach(function(m){ add[m]=(add[m]||0)+sets*0.5; });
    });
    return add;
  }
  function daysBetween(a,b){
    return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/86400000);
  }

  /* ---- FATIGUE: did lifts go backwards last session? ----
     Compares each lift in your most recent session against the previous time
     you did it. Nothing about sleep or soreness — just what the bar did. */
  function lastSessionReview(){
    var sorted = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(sorted.length < 2) return null;
    var recent = sorted[0];
    var down = [], up = 0;

    recent.exercises.forEach(function(e){
      var now = topSet(e.sets);
      if(!now) return;
      // find the previous session (before this one) that had this lift
      var prevW = null;
      for(var i=1;i<sorted.length;i++){
        if(sorted[i].exercises.some(function(x){ return x.name===e.name && x.sets.length; })){ prevW = sorted[i]; break; }
      }
      if(!prevW) return;
      var prevEx = prevW.exercises.filter(function(x){ return x.name===e.name; })[0];
      var was = topSet(prevEx.sets);
      if(!was) return;
      if(now.w < was.w || (now.w === was.w && now.r < was.r)) down.push(e.name);
      else if(now.w > was.w || (now.w === was.w && now.r > was.r)) up++;
    });

    var rirs = recent.exercises.map(function(e){ return e.rir; })
      .filter(function(v){ return v!==undefined && v!==null && v!==''; })
      .map(Number);
    var avgRir = rirs.length ? rirs.reduce(function(a,b){return a+b;},0)/rirs.length : null;

    return {
      date: recent.date,
      dayType: recent.dayType,
      ago: daysBetween(recent.date, todayStr()),
      down: down, up: up,
      total: recent.exercises.length,
      avgRir: avgRir
    };
  }

  /* ---- STALL: same top set, three sessions running ---- */
  function stalled(name){
    var tops = [];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        if(tops.length>=3) return;
        var e = w.exercises.filter(function(x){ return x.name===name && x.sets.length; })[0];
        if(e){ var t=topSet(e.sets); if(t) tops.push(t); }
      });
    if(tops.length<3) return false;
    return tops.every(function(t){ return t.w===tops[0].w && t.r===tops[0].r; });
  }

  /* ---- RECOVERY & RECOMMENDATION ----
     Grounded in what's actually supported, and nothing more:
       · Muscle protein synthesis is elevated ~24–48h after training in trained
         lifters, so ~48h is a defensible gap before hitting a muscle hard again.
       · Training a muscle 2x/week beats 1x/week at matched weekly volume.
       · Weekly volume: more than a little is better, curve flattens somewhere
         in the ~10–20 set range. A rough band, not a law — treated as such.
     There is NO reliable per-muscle recovery table in the literature.
     The app does not pretend otherwise. It knows nothing about your sleep,
     stress, or soreness, so it reports and suggests — it does not command.     */
  var READY_DAYS = 2;        // the ~48h window
  var WEEK_SETS_LOW = 10;    // bottom of the useful band
  var FREQ_TARGET = 2;       // sessions per muscle per week

  function daysSinceTrained(m, vol){
    var v = vol[m];
    if(!v || !v.last) return null;   // never trained / not in window
    return daysBetween(v.last, todayStr());
  }
  function gapSinceLastSession(){
    if(!state.workouts.length) return null;
    var last = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })[0];
    return daysBetween(last.date, todayStr());
  }

  /* Score each day type against the last 7 days.
     Reward muscles that are recovered AND behind on volume.
     Penalise muscles you trained inside the ~48h window.          */
  function scoreDay(k, vol){
    var adds = plannedAdds(k);
    var reward=0, penalty=0, fresh=[], recent=[];
    Object.keys(adds).forEach(function(m){
      var planned = adds[m];
      var since = daysSinceTrained(m, vol);
      var have = vol[m] ? vol[m].sets : 0;
      var deficit = Math.max(0, WEEK_SETS_LOW - have);

      if(since !== null && since < READY_DAYS){
        // trained inside the window — weight the penalty by how much this day piles on
        penalty += planned * (READY_DAYS - since);
        if(planned >= 2) recent.push(m);
      } else {
        reward += Math.min(planned, deficit);
        if(deficit > 0 && planned >= 2) fresh.push(m);
      }
    });
    return { key:k, score: reward - penalty, reward:reward, penalty:penalty, fresh:fresh, recent:recent };
  }

  function recommendDay(){
    var vol = volumeWindow(7);
    var scored = ROTATION.map(function(k){ return scoreDay(k, vol); })
      .sort(function(a,b){ return b.score - a.score; });
    return { best: scored[0], all: scored, vol: vol };
  }

  // muscles that today's card hits despite being inside the 48h window
  function conflictsFor(k, vol){
    var adds = plannedAdds(k), out=[];
    Object.keys(adds).forEach(function(m){
      if(adds[m] < 2) return;                       // ignore incidental secondary work
      var since = daysSinceTrained(m, vol);
      if(since !== null && since < READY_DAYS) out.push({ m:m, since:since });
    });
    return out;
  }
  function muscleList(arr){
    return arr.map(function(m){ return MUSCLES[m] ? MUSCLES[m].toLowerCase() : m; }).join(', ');
  }

  /* ================= NOTES INTELLIGENCE =================
     Notes stop being write-only. They get read back at the moment they matter,
     recurring complaints get counted, and everything is searchable. */

  // every note you've left on a lift, newest first
  function noteHistory(name, excludeId){
    var out=[];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        if(excludeId && w.id===excludeId) return;
        w.exercises.forEach(function(e){
          if(e.name!==name) return;
          e.sets.forEach(function(s){
            var n=(s.note||'').trim();
            if(n) out.push({ date:w.date, text:n });
          });
        });
      });
    return out;
  }

  /* Recurring-issue detection.
     Deliberately NOT clever: no NLP, no sentiment. It looks for meaningful words
     that keep coming back, weighted toward the vocabulary that actually matters
     in a training log — joints, pain words, and cues. A dumb, transparent method
     you can audit beats a smart one you can't. */
  var BODY_WORDS = ['shoulder','shoulders','elbow','elbows','knee','knees','wrist','wrists','hip','hips',
    'back','lower','lumbar','neck','bicep','tricep','hamstring','quad','glute','calf','pec','lat','grip',
    'forearm','ankle','groin','chest','delt','rotator'];
  var ISSUE_WORDS = ['pain','painful','pinch','pinched','pinches','ache','aches','aching','tight','tightness',
    'sore','soreness','twinge','niggle','strain','strained','tweak','tweaked','click','clicking','pop',
    'unstable','weak','weaker','fail','failed','failing','collapse','rounded','hurts','hurt','uncomfortable'];
  var STOPWORDS = ['the','and','but','for','with','was','were','felt','feel','feels','this','that','very',
    'good','great','easy','hard','more','less','than','then','when','from','have','had','has','not','out',
    'set','sets','rep','reps','last','next','time','today','still','just','got','get','went','did','doing',
    'left','right','one','two','all','a','i','it','on','at','to','in','of','is','my','me','be','up','off'];

  function tokenize(text){
    return String(text).toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/).filter(Boolean);
  }

  /* Returns recurring themes for a lift: word, how many separate notes mention it,
     and over what span. Only surfaces things mentioned 2+ times. */
  function recurringFlags(name, excludeId){
    var notes = noteHistory(name, excludeId);
    if(notes.length < 2) return [];

    var counts = {};   // word -> { n, dates[], phrases[] }
    notes.forEach(function(nt){
      var seenInThisNote = {};
      var toks = tokenize(nt.text);
      toks.forEach(function(t, i){
        if(t.length < 3 || STOPWORDS.indexOf(t) > -1) return;
        var isBody  = BODY_WORDS.indexOf(t)  > -1;
        var isIssue = ISSUE_WORDS.indexOf(t) > -1;
        // plain words count too, but body/issue words are what we rank on
        if(seenInThisNote[t]) return;
        seenInThisNote[t] = 1;
        if(!counts[t]) counts[t] = { n:0, dates:[], weight:(isBody?3:isIssue?2:1) };
        counts[t].n++;
        counts[t].dates.push(nt.date);
      });
    });

    var flags = Object.keys(counts)
      .filter(function(w){ return counts[w].n >= 2 && counts[w].weight > 1; })
      .map(function(w){
        var c = counts[w];
        var ds = c.dates.slice().sort();
        var span = daysBetween(ds[0], ds[ds.length-1]);
        return { word:w, n:c.n, span:span, weight:c.weight,
                 first:ds[0], last:ds[ds.length-1] };
      })
      .sort(function(a,b){ return (b.n*b.weight) - (a.n*a.weight); });

    return flags.slice(0,2);
  }

  function flagSentence(f){
    var wks = Math.max(1, Math.round(f.span/7));
    return 'You\'ve mentioned <b>' + esc(f.word) + '</b> ' + f.n + ' times'
         + (f.span>0 ? ' in ' + wks + ' week' + (wks===1?'':'s') : '') + '.';
  }

  // search every note in the log
  function searchNotes(query){
    var q = String(query||'').toLowerCase().trim();
    if(q.length < 2) return [];
    var out=[];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        w.exercises.forEach(function(e){
          e.sets.forEach(function(s){
            var n=(s.note||'').trim();
            if(n && n.toLowerCase().indexOf(q) > -1){
              out.push({ date:w.date, name:e.name, text:n });
            }
          });
        });
      });
    return out;
  }

  /* ================= SETUP MEMORY =================
     Pin height, seat position, bench angle. Persists per exercise and carries
     forward, instead of being re-guessed every single session. */
  function setupFor(name){ return (state.setups && state.setups[name]) || ''; }
  function saveSetup(name, val){
    if(!state.setups) state.setups = {};
    var v = String(val||'').trim();
    if(v) state.setups[name] = v; else delete state.setups[name];
    save('setups', state.setups);
  }

  /* ================= STALL DIAGNOSIS =================
     A flat line is a question, not an answer. Everything below is computed from
     the log — no speculation. If the data can't explain it, the app says so. */
  function sessionsFor(name, limit){
    var out=[];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        if(limit && out.length>=limit) return;
        var e = w.exercises.filter(function(x){ return x.name===name && x.sets.length; })[0];
        if(e) out.push({ date:w.date, ex:e, top:topSet(e.sets) });
      });
    return out;   // newest first
  }
  function tonnage(ex){
    return ex.sets.reduce(function(a,s){
      return a + ((parseFloat(s.weight)||0) * (parseInt(s.reps)||0));
    }, 0);
  }

  function diagnoseStall(name){
    var ss = sessionsFor(name, 6);
    if(ss.length < 3) return null;

    var causes = [];

    // 1. total work actually done — the most common silent culprit
    var recent = ss.slice(0,2), prior = ss.slice(2,4);
    if(prior.length){
      var rT = recent.reduce(function(a,x){ return a+tonnage(x.ex); },0)/recent.length;
      var pT = prior.reduce(function(a,x){ return a+tonnage(x.ex); },0)/prior.length;
      if(pT > 0){
        var dv = (rT-pT)/pT*100;
        if(dv <= -10){
          causes.push({ k:'volume',
            t:'Your total work on this lift is down <b>'+Math.abs(Math.round(dv))+'%</b> versus a few sessions ago '
              + '('+Math.round(rT)+' vs '+Math.round(pT)+' kg lifted). Less work in, less progress out.' });
        }
      }
    }

    // 2. set count quietly dropped
    var rS = recent.reduce(function(a,x){ return a+x.ex.sets.length; },0)/recent.length;
    var pS = prior.length ? prior.reduce(function(a,x){ return a+x.ex.sets.length; },0)/prior.length : rS;
    if(prior.length && rS < pS - 0.4){
      causes.push({ k:'sets',
        t:'You\'ve been doing <b>fewer sets</b> lately ('+r1(rS)+' vs '+r1(pS)+'). That alone can flatten a lift.' });
    }

    // 3. leaving reps in the tank
    var rirs = ss.map(function(x){ return x.ex.rir; })
      .filter(function(v){ return v!==undefined && v!==null && v!==''; })
      .map(function(v){ return v==='3+' ? 3 : Number(v); });
    if(rirs.length >= 2){
      var avg = rirs.reduce(function(a,b){return a+b;},0)/rirs.length;
      if(avg >= 2){
        causes.push({ k:'rir',
          t:'You\'ve been averaging <b>'+r1(avg)+' reps in reserve</b>. You may simply be stopping too far from failure to force an adaptation.' });
      } else if(avg <= 0.5){
        causes.push({ k:'grind',
          t:'You\'ve been averaging <b>'+r1(avg)+' reps in reserve</b> — grinding every set. The lift isn\'t stalling for lack of effort; that points at recovery.' });
      }
    }

    // 4. training it less often
    if(ss.length >= 4){
      var g1 = daysBetween(ss[1].date, ss[0].date);
      var g2 = daysBetween(ss[3].date, ss[2].date);
      if(g1 > g2 + 3){
        causes.push({ k:'freq',
          t:'The gap between sessions has stretched to <b>'+g1+' days</b> (was '+g2+'). Frequency dropped.' });
      }
    }

    // 5. what YOU said about it
    var flags = recurringFlags(name);
    if(flags.length){
      causes.push({ k:'note',
        t:flagSentence(flags[0]) + ' A recurring complaint is worth ruling out before you chase the numbers.' });
    }

    return {
      name: name,
      sessions: ss.length,
      weight: ss[0].top ? ss[0].top.w : 0,
      causes: causes
    };
  }

  /* ================= FIT (the honest anthropometry answer) =================
     No biomechanical model. No claims about your femurs. Just: which lifts have
     you ACTUALLY added weight to, and how fast. Your own log is better evidence
     about your leverages than any generic model, because it's evidence about you. */
  function progressionRate(name){
    var ss = sessionsFor(name).reverse();   // oldest first
    if(ss.length < 3) return null;
    var first = ss[0], last = ss[ss.length-1];
    if(!first.top || !last.top) return null;
    var weeks = Math.max(1, daysBetween(first.date, last.date)/7);
    var gain = last.top.w - first.top.w;
    return {
      name: name,
      gain: gain,
      weeks: weeks,
      perWeek: gain/weeks,
      sessions: ss.length,
      from: first.top.w,
      to: last.top.w
    };
  }
  function allRates(){
    return allExNames().map(progressionRate).filter(Boolean)
      .sort(function(a,b){ return b.perWeek - a.perWeek; });
  }

  /* ---- draft ---- */
  function newSet(prev){
    return { weight: prev?prev.weight:'', reps: prev?prev.reps:'', note:'', done:false };
  }
  // pre-fill the weight the app is telling you to lift; leave reps for you to earn
  function seedSets(name){
    var t = targetFor(name);
    if(t){
      var n = Math.max(1, t.sets);
      var out=[];
      for(var i=0;i<n;i++) out.push({ weight:String(toDisp(t.kg)), reps:'', note:'', done:false });
      return out;
    }
    return [ newSet(null), newSet(null) ];
  }
  function startDraft(dayType){
    var names = dayType==='free' ? [] : (state.presets[dayType]||[]);
    state.draft = {
      date: state.selectedDate || todayStr(),
      dayType: dayType,
      editingId: null,
      exercises: names.map(function(n){ return { name:n, sets:seedSets(n) }; })
    };
    state.deckIndex = 0;
    state.pickingEx = null;
    state.picking = false;
    state.override = null;
    state.tab = 'today';
    saveDraft(); render();
  }
  function editSession(id){
    var w = state.workouts.filter(function(x){ return x.id===id; })[0];
    if(!w) return;
    if(state.draft && !state.draft.editingId && !confirm('You have a session in progress. Editing will discard it. Continue?')) return;
    state.draft = {
      date:w.date, dayType:w.dayType, editingId:id,
      exercises: w.exercises.map(function(e){
        return { name:e.name, rir:e.rir, sets:e.sets.map(function(s){
          return { weight:String(toDisp(s.weight||0)), reps:String(s.reps||''), note:s.note||'', done:true };
        })};
      })
    };
    state.deckIndex=0; state.pickingEx=null; state.picking=false; state.tab='today'; saveDraft(); render(); toTop();
  }
  function exDone(ex){ return ex.sets.length>0 && ex.sets.every(function(s){ return s.done; }); }
  function draftDoneCount(){ return state.draft ? state.draft.exercises.filter(exDone).length : 0; }

  /* ---- rest timer ---- */
  function startRest(){
    state.rest.endsAt = Date.now() + state.rest.dur*1000;
    tickRest();
    if(restTick) clearInterval(restTick);
    restTick = setInterval(tickRest, 500);
  }
  function stopRest(){
    state.rest.endsAt = 0;
    if(restTick){ clearInterval(restTick); restTick=null; }
    var el=document.getElementById('rest-bar'); if(el) el.remove();
  }
  function restLeft(){ return Math.max(0, Math.ceil((state.rest.endsAt - Date.now())/1000)); }
  function fmtTime(s){ return Math.floor(s/60)+':'+pad(s%60); }
  function tickRest(){
    var left = restLeft();
    var bar = document.getElementById('rest-bar');
    if(!state.rest.endsAt){ if(bar) bar.remove(); return; }
    if(!bar){
      bar = document.createElement('div');
      bar.id='rest-bar'; bar.className='rest-bar';
      bar.innerHTML = '<div class="rt-time" id="rt-time"></div><div class="rt-lbl">Rest</div>'
        + '<button class="btn small" id="rt-plus">+30s</button>'
        + '<button class="btn small ghost" id="rt-skip">Skip</button>';
      document.body.appendChild(bar);
      bar.querySelector('#rt-plus').addEventListener('click', function(){ state.rest.endsAt += 30000; tickRest(); });
      bar.querySelector('#rt-skip').addEventListener('click', stopRest);
    }
    var t = document.getElementById('rt-time');
    if(t) t.textContent = fmtTime(left);
    if(left<=0){
      stopRest();
      if(navigator.vibrate) navigator.vibrate([200,80,200]);
      toast('Rest done');
    }
  }

  /* ---- render ---- */
  function render(){
    var app=document.getElementById('app');
    var navEl=document.getElementById('nav');
    if(!state.loaded){ app.innerHTML='<div class="empty-state">Loading…</div>'; return; }
    var h = masthead();
    if(state.tab==='today') h+=vToday();
    else if(state.tab==='calendar') h+=vCalendar();
    else if(state.tab==='progress') h+=vProgress();
    else if(state.tab==='history') h+=vHistory();
    else if(state.tab==='settings') h+=vPresets();
    app.innerHTML=h;
    navEl.innerHTML=navButtons();   // nav lives outside the scroll container now
    wire();
    restoreDecks();                 // keep the swipe position across re-renders
    pinNav();                       // hold the nav flush to the viewport bottom
    if(state.tab==='settings') renderDiag();
  }

  function masthead(){
    // unit toggle lives in settings now — it's a set-once preference, not prime real estate
    return '<div class="masthead"><h1>LEDGER<span>.</span></h1><div class="masthead-actions">'
      + '<button class="gear-btn'+(state.tab==='settings'?' active':'')+'" data-tab="settings" aria-label="Settings">'+ICONS.gear+'</button>'
      + '</div></div>';
  }

  function navButtons(){
    var tabs=[['today','Today'],['calendar','Calendar'],['progress','Progress'],['history','History']];
    var live = state.draft && !state.draft.editingId;
    var h='';
    tabs.forEach(function(t){
      h+='<button data-tab="'+t[0]+'" class="'+(state.tab===t[0]?'active':'')+'" aria-label="'+t[1]+'" style="position:relative;">'
        + ICONS[t[0]] + '<span>'+t[1]+'</span>'
        + (t[0]==='today' && live ? '<span class="dot"></span>' : '')
        + '</button>';
    });
    return h;
  }

  function resumeBanner(){
    if(!state.draft || state.draft.editingId || state.tab==='today') return '';
    var dt=DAY_TYPES[state.draft.dayType];
    return '<div class="resume"><div class="txt"><strong>Session in progress</strong>'
      + '<span>'+(dt?dt.label:'Freeform')+' · '+draftDoneCount()+'/'+state.draft.exercises.length+' done</span></div>'
      + '<button class="btn small primary" data-tab="today">Resume</button></div>';
  }

  var WARN_SVG = '<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>';

  // What the bar did last time — reported, not prescribed.
  function fatigueBanner(){
    var rv = lastSessionReview();
    if(!rv || rv.down.length < 2) return '';
    var grind = (rv.avgRir!==null && rv.avgRir<=1) ? ' You were averaging '+r1(rv.avgRir)+' reps in reserve.' : '';
    return '<div class="fatigue">'+WARN_SVG+'<div class="ft">'
      + '<b>'+rv.down.length+' lifts went backwards</b> last session ('+(rv.ago===0?'today':rv.ago+'d ago')+') — '
      + rv.down.slice(0,3).map(esc).join(', ') + (rv.down.length>3?' +'+(rv.down.length-3)+' more':'') + '.'
      + grind
      + '<em>Going backwards on several lifts at once is usually recovery, not effort. Your call — but cutting a set or the last exercise today is a reasonable response.</em>'
      + '</div></div>';
  }

  /* The advisor only speaks when the plan has actually broken.
     Run the program as designed and it stays quiet — the rotation already
     answers the question, and a recommender that repeats the obvious is noise. */
  function advisor(rec, gap, offPlan, chosen){
    if(!offPlan || state.override) return '';
    var b = rec.best;
    var dt = DAY_TYPES[b.key];

    var body = '<b>You\'ve been away '+gap+' days.</b> The rotation would have you do '
             + DAY_TYPES[nextDayType()].label + ', but nothing is fresh any more, so rotation order '
             + 'no longer tells you much. Going by what you\'ve actually trained in the last 7 days, '
             + '<b>'+dt.label+'</b> is the better pick';

    if(b.fresh.length){
      body += ' — it hits ' + muscleList(b.fresh) + ', which '
            + (b.fresh.length===1?'is':'are') + ' furthest behind and fully recovered.';
    } else {
      body += '.';
    }

    // long layoff: strength holds up far better than work capacity
    if(gap >= 10){
      body += ' After '+gap+' days off, expect the first session back to feel harder than the numbers '
            + 'suggest. Dropping a set per exercise and keeping the weight is the safer trade.';
    }

    var alts = rec.all.slice(1,3).map(function(s){ return DAY_TYPES[s.key].label; }).join(', ');

    return '<div class="advisor" id="advisor">'
      + '<div class="ah">'+WARN_SVG+'<span>Off plan</span></div>'
      + '<div class="ab">'+body+'</div>'
      + '<div class="aacts">'
      +   '<button class="btn primary small" data-start="'+b.key+'">Start '+dt.label+'</button>'
      +   '<button class="btn ghost small" id="pick-other-2">Choose myself</button>'
      + '</div>'
      + '<button class="whytoggle" id="whytoggle">Why this?</button>'
      + '<div class="why">'
      +   'Ranked on two things only: how long since each muscle was trained, and how many sets it has had in the last 7 days. '
      +   'A muscle is treated as recovered after ~2 days — muscle protein synthesis is elevated for roughly 24–48h after training, '
      +   'so that is the window with real support behind it. There is no credible per-muscle recovery table in the literature, '
      +   'so this app does not invent one: calves are not assumed to bounce back faster than quads. '
      +   'Next best: '+alts+'. '
      +   'It knows nothing about your sleep, soreness or stress — you do. Override it freely.'
      + '</div></div>';
  }

  /* When you're ON plan but the rotation still collides with the 48h window,
     say so quietly rather than hijacking the screen. */
  function nudge(rec, chosen, vol){
    var conf = conflictsFor(chosen, vol);
    if(!conf.length) return '';
    var worst = conf.sort(function(a,b){ return a.since-b.since; })[0];
    var better = rec.all.filter(function(s){ return s.key!==chosen && !conflictsFor(s.key, vol).length; })[0];

    var txt = '<b>'+MUSCLES[worst.m]+'</b> trained '+(worst.since===0?'today':worst.since+'d ago')
            + ' — inside the ~48h window, and this day hits '+(conf.length>1? muscleList(conf.map(function(c){return c.m;})) : 'it')+' again.';
    if(better){
      txt += ' <button data-swap="'+better.key+'">Do '+DAY_TYPES[better.key].label+' instead</button>';
    }
    return '<div class="nudge">'+txt+'</div>';
  }

  /* ---- Today (home) ---- */
  function vToday(){
    // a live session takes over this screen — Today is "what am I doing right now"
    if(state.draft) return vLog();
    if(state.picking) return vDayTypePicker();

    var rec = recommendDay();
    var vol = rec.vol;
    var gap = gapSinceLastSession();

    // The rotation is the default. The advisor only overrides it when you've
    // actually fallen off the plan — otherwise it has nothing useful to say.
    var offPlan = (gap !== null && gap >= 4);
    var k = (state.override && DAY_TYPES[state.override]) ? state.override
          : offPlan ? rec.best.key
          : nextDayType();

    var dt = DAY_TYPES[k];
    var names = state.presets[k] || [];
    var done = weekCount();
    var since = daysSinceLast(k);

    var h = '';

    // week, not streak — rest days shouldn't punish you
    h += '<div class="weekbar"><div class="txt"><b>'+done+'</b> of '+WEEK_TARGET+' sessions this week</div><div class="pips">';
    for(var i=0;i<WEEK_TARGET;i++) h += '<i class="pip'+(i<done?' done':'')+'"></i>';
    h += '</div></div>';

    h += fatigueBanner();
    h += advisor(rec, gap, offPlan, k);

    // the bar, not the attendance record
    h += '<div class="hero" data-cat="'+dt.cat+'">'
       + '<div class="eyebrow">'+(state.override ? 'Your pick' : offPlan ? 'Recommended' : 'Next in rotation')+'</div>'
       + '<h3>'+dt.label+'</h3>'
       + '<div class="meta">'
       +   (since===null ? 'First time logging this day' :
            since===0 ? 'You already did this today' :
            'Last '+dt.label+' was '+since+' day'+(since===1?'':'s')+' ago')
       +   ' · '+names.length+' exercise'+(names.length===1?'':'s')
       + '</div>'
       + '<div class="acts">'
       +   '<button class="btn primary" data-start="'+k+'">Start session</button>'
       +   '<button class="btn ghost" id="pick-other">Pick another</button>'
       + '</div>'
       + nudge(rec, k, vol)
       + '</div>';

    // THE LEDGER — last vs target, with your own notes carried forward
    if(names.length){
      h += '<div class="lg-head"><span>Today\'s card</span><span>Last → target</span></div><div class="ledger">';
      names.forEach(function(n){
        var last = lastSummary(n);
        var t = targetFor(n);
        var st = stalled(n) ? '<span class="stall-badge">Stalled 3×</span>' : '';
        h += '<div class="lline"><div class="nm">'+esc(n)+st+'</div><div class="lcols">'
           + '<div class="lcol"><div class="k">LAST</div><div class="v">'+(last? esc(last) : '—')+'</div></div>'
           + '<div class="lcol tg"><div class="k">TARGET</div><div class="v">'
           +   (t ? '<b>'+toDisp(t.kg)+'</b> '+state.unit+' × '+t.reps : 'Set your baseline')
           + '</div></div></div>'
           + carryHtml(n)
           + '</div>';
      });
      h += '</div>';
    }

    // LOAD — sets per muscle over 7 days, and what the next session adds.
    // Shown, not judged: no thresholds, no "you're overtraining".
    var vol = volumeWindow(7);
    var didToday = trainedToday();
    // BUG FIX: the projection used to show even after you'd already trained,
    // sitting next to a count that ALREADY included today's work. That reads
    // exactly like a stale or double-counted number. If today's done, drop it.
    var adds = didToday ? {} : plannedAdds(k);

    var maxSets = 1;
    MUSCLE_ORDER.forEach(function(m){ maxSets = Math.max(maxSets, vol[m].sets + (adds[m]||0)); });
    var anyVol = MUSCLE_ORDER.some(function(m){ return vol[m].sets>0; });

    if(anyVol){
      h += '<div class="lg-head"><span>Load · last 7 days</span>'
         + '<span>'+(didToday ? 'today logged ✓' : '+ '+dt.label)+'</span></div>';
      h += '<div class="card" style="padding:12px 14px;">';
      MUSCLE_ORDER.forEach(function(m){
        var have = vol[m].sets, add = adds[m]||0;
        if(!have && !add) return;
        var hp = have/maxSets*100, ap = add/maxSets*100;
        // days-since now searches ALL history, not just the 7-day window
        var lt = lastTrainedDate(m);
        var last = lt ? daysBetween(lt, todayStr()) : null;
        var rd = last===null ? 'none' : (last >= READY_DAYS ? 'ready' : 'recovering');
        var open = state.openMuscle===m;
        h += '<div class="load-row'+(open?' open':'')+'" data-muscle="'+m+'">'
           + '<div class="lm"><i class="rdot '+rd+'"></i>'+MUSCLES[m]+'</div>'
           + '<div class="load-bar"><i class="have" style="width:'+hp+'%"></i><i class="add" style="width:'+ap+'%"></i></div>'
           + '<div class="ln">'+r1(have)+(add?' <b>+'+r1(add)+'</b>':'')+((have+add)===1?' set':' sets')+'</div>'
           + '<div class="ld">'+(last===null?'—':last===0?'today':last+'d')+'</div>'
           + '</div>';
        // the receipts: exactly which lifts produced that number
        if(open){
          h += '<div class="load-detail">';
          if(!vol[m].from.length){
            h += '<div class="ldrow"><span>Nothing in the last 7 days.</span></div>';
          } else {
            vol[m].from.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
              .forEach(function(c){
                h += '<div class="ldrow">'
                   + '<span>'+c.date.slice(5)+' · '+esc(c.name)
                   +   (c.role==='secondary' ? ' <em>(secondary)</em>' : '')
                   + '</span>'
                   + '<b>'+c.sets+(c.mult===0.5 ? ' × ½ = '+r1(c.sets*0.5) : '')+'</b>'
                   + '</div>';
              });
            h += '<div class="ldrow total"><span>Total</span><b>'+r1(have)+' sets</b></div>';
          }
          h += '</div>';
        }
      });
      h += '<div class="load-key">'
         + '<span><i class="rdot ready" style="border-radius:50%"></i>Recovered (2d+)</span>'
         + '<span><i class="rdot recovering" style="border-radius:50%"></i>Inside 48h</span>'
         + '<span>Tap a row to see the maths</span>'
         + '</div>';
      h += '</div>';
    }

    // calendar shrunk to a strip; the full month has its own tab
    var days = lastDays(14);
    h += '<div class="lg-head"><span>Last 14 days</span></div><div class="strip">';
    days.forEach(function(d,ix){
      h += '<i class="'+(d.cat||'')+(ix===days.length-1?' today':'')+'"></i>';
    });
    h += '</div><div class="strip-cap"><span>'+days[0].date.slice(5)+'</span><span>Today</span></div>';

    return h;
  }

  /* ---- Calendar ---- */
  function vCalendar(){
    var y=state.calYear, m=state.calMonth;
    var off=(new Date(y,m,1).getDay()+6)%7;
    var dim=new Date(y,m+1,0).getDate();
    var td=todayStr();

    var h = resumeBanner();
    h += '<div class="stat-row">'
      + '<div class="stat"><div class="val">'+weekCount()+'/'+WEEK_TARGET+'</div><div class="lbl">This week</div></div>'
      + '<div class="stat"><div class="val">'+monthCount()+'</div><div class="lbl">This month</div></div>'
      + '<div class="stat"><div class="val">'+state.workouts.length+'</div><div class="lbl">Total</div></div>'
      + '</div>';

    h += '<div class="card"><div class="cal-header">'
      + '<button class="btn small" id="cal-prev">&larr;</button>'
      + '<h2>'+MONTHS[m]+' '+y+'</h2>'
      + '<button class="btn small" id="cal-next">&rarr;</button></div><div class="cal-grid">';
    DOW.forEach(function(d){ h+='<div class="cal-dow">'+d+'</div>'; });
    for(var i=0;i<off;i++) h+='<div class="cal-cell empty"></div>';
    for(var d=1; d<=dim; d++){
      var ds=y+'-'+pad(m+1)+'-'+pad(d);
      var ss=onDate(ds);
      var cls='cal-cell'+(ds===td?' today':'')+(ds===state.selectedDate?' selected':'');
      h+='<div class="'+cls+'" data-date="'+ds+'"><span class="num">'+d+'</span>';
      if(ss.length){
        var dt=DAY_TYPES[ss[0].dayType]||DAY_TYPES.free;
        h+='<div class="plate '+dt.cat+'">'+dt.badge+'</div>';
      }
      h+='</div>';
    }
    h+='</div><div class="cal-legend">'
      + '<span><i class="legend-dot" style="background:var(--steel)"></i>Upper</span>'
      + '<span><i class="legend-dot" style="background:var(--olive)"></i>Legs + Arms</span>'
      + '<span><i class="legend-dot" style="background:var(--rust)"></i>Freeform</span></div>';
    h+='<div class="day-panel">'+dayPanel()+'</div></div>';
    return h;
  }

  function dayPanel(){
    if(!state.selectedDate) return '<div class="empty-state">Tap a day to view or log a session.</div>';
    var ss=onDate(state.selectedDate);
    var h='<div class="dp-date">'+state.selectedDate+'</div>';
    if(!ss.length){
      return h+'<button class="btn primary block" id="log-this-day">Log this day</button>';
    }

    var sess = ss[0];
    var dt = DAY_TYPES[sess.dayType]||DAY_TYPES.free;
    var exs = sess.exercises;

    h+='<div class="section-title" style="font-size:13px;margin-bottom:8px;">'+dt.label
      + ' · '+exs.length+' exercise'+(exs.length===1?'':'s')+'</div>';

    /* Compact summary FIRST — you keep the whole-session glance ("was the whole
       day flat?"), which a swipe deck alone would destroy. Then swipe for detail. */
    var di = Math.min(state.dayIndex||0, Math.max(0,exs.length-1));
    h+='<div class="day-sum">';
    exs.forEach(function(e,i){
      var t = topSet(e.sets);
      h+='<span class="'+(i===di?'cur':'')+'" data-dayjump="'+i+'">'
        + esc(e.name.split(' ').slice(0,2).join(' '))
        + (t ? ' ' + toDisp(t.w) + '×' + t.r : '')
        + '</span>';
    });
    h+='</div>';

    h+='<div class="deck-head">'
      + '<div class="dpos"><b>'+(di+1)+'</b> / '+exs.length+'</div>'
      + '<div class="dhint">swipe →</div></div>';

    h+='<div class="deck-wrap"><div class="deck" id="daydeck">';
    exs.forEach(function(e,i){
      h+='<div class="dcard rcard">';
      h+='<div class="dc-top"><div>'
        + '<div class="dc-idx">Exercise '+(i+1)+'</div>'
        + '<div class="dc-name">'+esc(e.name)+'</div>'
        + '</div></div>';

      h+='<table><tbody>';
      e.sets.forEach(function(st,j){
        h+='<tr><td style="width:22px;color:var(--chalk-faint);">'+(j+1)+'</td>'
          + '<td class="w">'+toDisp(st.weight||0)+' '+state.unit+'</td>'
          + '<td>× '+(st.reps||0)+'</td></tr>';
      });
      h+='</tbody></table>';

      if(e.rir!==undefined && e.rir!=='') h+='<div class="rrir">RIR '+esc(String(e.rir))+'</div>';

      var su = setupFor(e.name);
      if(su) h+='<div class="rsetup">Setup: '+esc(su)+'</div>';

      var notes = e.sets.map(function(st){ return (st.note||'').trim(); }).filter(Boolean);
      if(notes.length) h+='<div class="rnote">'+esc(notes.join(' · '))+'</div>';

      h+='</div>';
    });
    h+='</div></div>';

    h+='<div style="display:flex;gap:8px;margin-top:12px;">'
      + '<button class="btn small" data-edit="'+sess.id+'">Edit</button>'
      + '<button class="btn small danger" data-del="'+sess.id+'">Delete</button></div>';
    return h;
  }

  /* ---- Log ---- */
  function vLog(){
    if(!state.draft) return vDayTypePicker();
    var d=state.draft;
    var dt=DAY_TYPES[d.dayType]||DAY_TYPES.free;
    var done=draftDoneCount(), total=d.exercises.length;
    var pct= total? Math.round(done/total*100) : 0;

    var h='<div class="card">';
    h+='<div class="session-bar"><div class="ttl">'+(d.editingId?'Editing · ':'')+dt.label+'</div>'
      + '<div class="cnt">'+done+' / '+total+'</div></div>';
    h+='<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

    h+='<div style="margin-bottom:14px;"><label>Date</label><input type="date" id="d-date" value="'+d.date+'"></div>';
    h+='</div>';   // close the card — the deck bleeds to the screen edges

    // ---- SWIPE DECK: one exercise at a time, because that's how you train ----
    var idx = Math.min(state.deckIndex||0, Math.max(0,total-1));
    var cur = d.exercises[idx];

    h+='<div class="deck-head">'
      + '<div class="dpos"><b>'+(idx+1)+'</b> / '+total+'</div>'
      + '<div class="dhint">swipe →</div></div>';

    h+='<div class="deck-wrap"><div class="deck" id="deck">';
    d.exercises.forEach(function(ex,i){ h+=deckCard(ex,i); });
    h+='</div></div>';

    // dots double as a progress read: olive = logged
    h+='<div class="dots">';
    d.exercises.forEach(function(ex,i){
      h+='<i class="'+(i===idx?'on ':'')+(exDone(ex)?'done':'')+'" data-jump="'+i+'"></i>';
    });
    h+='</div>';

    h+='<div class="deck-nav">'
      + '<button class="btn small" id="deck-prev"'+(idx===0?' disabled':'')+'>‹ Prev</button>'
      + '<button class="btn small" id="deck-next"'+(idx>=total-1?' disabled':'')+'>Next ›</button>'
      + '</div>';

    h+='<div class="card" style="margin-top:14px;">';
    h+='<button class="btn ghost small block" id="add-ex" style="margin:0 0 14px;">+ Add exercise</button>';
    h+='<button class="btn primary block" id="finish">'+(d.editingId?'Update session':'Finish workout')+'</button>';
    h+='<button class="btn ghost small block" id="discard" style="margin-top:8px;">'+(d.editingId?'Cancel edit':'Discard session')+'</button>';
    h+='</div>';
    return h;
  }

  function vDayTypePicker(){
    var h = '<div class="card"><h2>Start a session</h2>';
    h+='<div style="margin-bottom:14px;"><label>Date</label><input type="date" id="new-date" value="'+(state.selectedDate||todayStr())+'"></div>';
    h+='<div class="dt-grid">';
    Object.keys(DAY_TYPES).forEach(function(k){
      var dt=DAY_TYPES[k];
      var n = k==='free'? 'Build from scratch' : (state.presets[k]||[]).length+' exercises';
      h+='<button class="dt-btn" data-start="'+k+'" data-cat="'+dt.cat+'">'+dt.label+'<span class="n">'+n+'</span></button>';
    });
    h+='</div>';
    h+='<button class="btn ghost small block" id="pick-cancel" style="margin-top:12px;">Back</button>';
    h+='</div>';
    return h;
  }

  /* Inline exercise picker shown when a card's title is tapped.
     Swap this slot for a preset, for anything already in your history, or a new
     name. Exercises already in this session are excluded so you don't double up. */
  function exPicker(i, currentName){
    var inSession = {};
    if(state.draft) state.draft.exercises.forEach(function(e,k){ if(k!==i) inSession[e.name]=1; });

    var dayKey = state.draft ? state.draft.dayType : null;
    var presetNames = (dayKey && state.presets[dayKey]) ? state.presets[dayKey] : [];
    var presetSet = {}; presetNames.forEach(function(n){ presetSet[n]=1; });

    var others = allExNames().filter(function(n){ return !presetSet[n]; });

    var h='<div class="expick">';

    var renderOpt = function(n){
      var disabled = inSession[n] && n!==currentName;
      var cur = n===currentName;
      return '<button class="expick-opt'+(cur?' cur':'')+(disabled?' off':'')+'"'
        + (disabled?' disabled':' data-swapto="'+i+'|'+esc(n)+'"')+'>'
        + esc(n)
        + (cur?'<span class="tag">current</span>':'')
        + (disabled?'<span class="tag">in session</span>':'')
        + '</button>';
    };

    if(presetNames.length){
      h+='<div class="expick-h">'+(DAY_TYPES[dayKey]?DAY_TYPES[dayKey].label:'Preset')+'</div>';
      presetNames.forEach(function(n){ h+=renderOpt(n); });
    }
    if(others.length){
      h+='<div class="expick-h">From your history</div>';
      others.forEach(function(n){ h+=renderOpt(n); });
    }

    h+='<div class="expick-h">Add new</div>';
    h+='<div class="expick-new">'
      + '<input type="text" id="expick-input-'+i+'" placeholder="New exercise name" data-newname="'+i+'">'
      + '<button class="btn small" data-addnew="'+i+'">Add</button>'
      + '</div>';

    h+='<button class="btn ghost small block" data-cancelpick="'+i+'" style="margin-top:8px;">Close</button>';
    h+='</div>';
    return h;
  }

  /* One exercise, one card. No collapse state — the card IS the screen now. */
  function deckCard(ex,i){
    var done = exDone(ex);
    var last = lastSummary(ex.name);
    var h='<div class="dcard'+(done?' done':'')+'" data-card="'+i+'">';

    h+='<div class="dc-top"><div style="flex:1;min-width:0;">'
      + '<div class="dc-idx">Exercise '+(i+1)+'</div>'
      + '<button class="dc-name dc-name-btn" data-rename="'+i+'">'+esc(ex.name)
      +   '<svg class="dc-caret" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></button>'
      + '</div>'
      + (done ? '<div class="dc-tick">'+ICONS.check+'</div>' : '')
      + '</div>';

    // inline picker: swap this exercise for another, or add a new one
    if(state.pickingEx===i){
      h+=exPicker(i, ex.name);
    }

    // the prescription — what to lift and why
    var tg = targetFor(ex.name);
    if(tg){
      h+='<div class="target-banner">'
        + '<div><div class="k">TARGET</div><div class="v">'+toDisp(tg.kg)+' '+state.unit+' × '+tg.reps+'</div></div>'
        + '<div class="why">'+esc(tg.why)+'</div></div>';
    }

    // your own note, surfaced while you're setting up — not buried in history
    h+=carryHtml(ex.name);

    // recurring complaints, counted. "3rd time" is a different signal to "once".
    recurringFlags(ex.name, state.draft && state.draft.editingId).forEach(function(f){
      h+='<div class="recur">'+WARN_SVG+'<div>'+flagSentence(f)+'</div></div>';
    });

    // SETUP MEMORY — pin height, seat, bench angle. Carried forward, not re-guessed.
    var su = setupFor(ex.name);
    h+='<div class="setup'+(su?' has':'')+'">'
      + '<div class="sk">Setup</div>'
      + '<input type="text" placeholder="Seat 4 · pin 3 · bench 30°" value="'+esc(su)+'" data-setup="'+i+'">'
      + '</div>';

    // the note trail for this lift
    var nh = noteHistory(ex.name, state.draft && state.draft.editingId);
    if(nh.length){
      var openN = state.openNotes===i;
      h+='<button class="notes-toggle" data-notes="'+i+'">'
        + (openN ? 'Hide' : 'Note history') + ' (' + nh.length + ')</button>';
      if(openN){
        h+='<div class="notes-trail">';
        nh.slice(0,8).forEach(function(n){
          h+='<div class="nt"><span class="nd">'+n.date.slice(5)+'</span><span>'+esc(n.text)+'</span></div>';
        });
        h+='</div>';
      }
    }

    if(last) h+='<div class="last-hint"><b>Last time:</b> '+esc(last)+'</div>';
    h+='<div class="set-hdr"><div>#</div><div>'+state.unit.toUpperCase()+'</div><div>Reps</div><div></div><div></div></div>';

    var best = bestKg(ex.name);
    ex.sets.forEach(function(s,j){
      var wv = parseFloat(s.weight)||0;
      var isPR = best>0 && wv>0 && toKg(wv) > best + 0.001;
      h+='<div class="set-row'+(s.done?' done':'')+'">'
        + '<div class="sidx">'+(j+1)+'</div>'
        + stepper('w',i,j,s.weight)
        + stepper('r',i,j,s.reps)
        + '<div class="set-done-btn" data-setdone="'+i+'-'+j+'">'+ICONS.check+'</div>'
        + '<button class="set-del" data-delset="'+i+'-'+j+'">&times;</button>'
        + '</div>';
      if(isPR) h+='<div style="margin:-2px 0 6px 32px;"><span class="pr-flag">PR</span></div>';
    });

    h+='<div class="rir"><div class="rl">Reps in reserve (optional)</div><div class="chips">';
    ['0','1','2','3+'].forEach(function(v){
      var on = String(ex.rir)===v ? ' on' : '';
      h+='<button class="'+on.trim()+'" data-rir="'+i+'-'+v+'">'+v+'</button>';
    });
    h+='</div></div>';

    h+='<div class="set-note"><input type="text" placeholder="Note — form cue, how it felt…" value="'+esc(ex.sets.length?ex.sets[0].note:'')+'" data-note="'+i+'"></div>';
    h+='<div class="ex-actions">'
      + '<button class="btn small" data-addset="'+i+'">+ Set</button>'
      + '<button class="btn small ghost" data-delex="'+i+'">Remove</button></div>';
    h+='</div>';
    return h;
  }

  function stepper(kind,i,j,val){
    return '<div class="stepper">'
      + '<button data-step="'+kind+'--'+i+'-'+j+'">&minus;</button>'
      + '<input type="number" inputmode="decimal" value="'+esc(val)+'" data-fld="'+kind+'-'+i+'-'+j+'" placeholder="0">'
      + '<button data-step="'+kind+'+'+i+'-'+j+'">+</button></div>';
  }

  /* ---- History ---- */
  function vHistory(){
    // note search — every note you've ever left, findable
    var sq = state.noteQuery || '';
    var searchUI = '<div class="card" style="padding:12px 14px;">'
      + '<label>Search your notes</label>'
      + '<input type="text" id="nsearch" placeholder="shoulder, depth, grip…" value="'+esc(sq)+'">';
    if(sq.trim().length >= 2){
      var res = searchNotes(sq);
      searchUI += '<div class="srx">'+res.length+' match'+(res.length===1?'':'es')+'</div>';
      if(res.length){
        searchUI += '<div class="sres">';
        res.slice(0,25).forEach(function(r){
          searchUI += '<div class="sr">'
            + '<div class="srh"><span class="srd">'+r.date.slice(5)+'</span>'
            +   '<span class="srn">'+esc(r.name)+'</span></div>'
            + '<div class="srt">'+esc(r.text)+'</div></div>';
        });
        searchUI += '</div>';
      }
    }
    searchUI += '</div>';
    return searchUI + vHistoryList();
  }

  function vHistoryList(){
    var h = resumeBanner() + '<div class="card"><h2>History</h2>';
    var ws = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });

      var dt=DAY_TYPES[s.dayType]||DAY_TYPES.free;

        + '<div class="meta"><i class="tag" style="background:'+col+'"></i>'

            + (st.note?'<td class="nt">'+esc(st.note)+'</td>':'<td></td>')+'</tr>';

  /* ---- Progress ---- */
  function vProgress(){
    var names=allExNames();
    if(state.progressExercise && names.indexOf(state.progressExercise)<0) state.progressExercise=null;
    if(!state.progressExercise && names.length) state.progressExercise=names[0];

    var h = resumeBanner() + '<div class="card"><h2>Progress</h2>';
    if(!names.length) return h+'<div class="empty-state">Log a session to see progress.</div></div>';

    h+='<div style="margin-bottom:16px;"><label>Exercise</label><select id="pex">';
    names.forEach(function(n){ h+='<option'+(n===state.progressExercise?' selected':'')+'>'+esc(n)+'</option>'; });
    h+='</select></div>';

    var raw=history(state.progressExercise);
    if(!raw.length) return h+'<div class="empty-state">No sets logged for this lift yet.</div></div>';
    var pts=raw.map(function(p){ return {date:p.date, weight:toDisp(p.weight), reps:p.reps, note:p.note}; });

    var max=pts.reduce(function(a,p){ return Math.max(a,p.weight); },0);
    var latest=pts[pts.length-1];
    var delta=r1(max-pts[0].weight);

    h+='<div class="pr-row">'
      + '<div class="pr-stat"><div class="val">'+max+' '+state.unit+'</div><div class="lbl">Best</div></div>'
      + '<div class="pr-stat"><div class="val">'+latest.weight+'×'+latest.reps+'</div><div class="lbl">Latest</div></div>'
      + '<div class="pr-stat"><div class="val">'+(delta>=0?'+':'')+delta+'</div><div class="lbl">Gain</div></div></div>';
    h+='<div class="chart-wrap">'+chart(pts)+'</div>';

    /* STALL DIAGNOSIS — a flat line is a question. Answer it from the log. */
    if(stalled(state.progressExercise)){
      var dg = diagnoseStall(state.progressExercise);
      h+='<div class="diag-card">';
      h+='<div class="dh">'+WARN_SVG+'<span>Stalled — same top set 3 sessions running</span></div>';
      if(dg && dg.causes.length){
        h+='<div class="dsub">Here\'s what changed in your log:</div>';
        h+='<ul class="dlist">';
        dg.causes.forEach(function(c){ h+='<li>'+c.t+'</li>'; });
        h+='</ul>';
      } else {
        // Honesty over cleverness: if the data doesn't explain it, say so.
        h+='<div class="dsub">Your volume, sets, frequency and effort all look steady — '
          + 'so the log can\'t explain this one. That usually means it\'s something the app '
          + 'can\'t see: sleep, food, stress, or simply that this lift is ready for a different '
          + 'stimulus. Worth a deload, a rep-range change, or a variation swap.</div>';
      }
      h+='</div>';
    }

    h+='<table style="width:100%;margin-top:14px;border-collapse:collapse;font-family:Roboto Condensed,sans-serif;font-size:12px;">'
      + '<thead><tr style="color:var(--chalk-faint);text-align:left;font-weight:400;">'
      + '<th style="padding:6px 0;font-weight:400;">Date</th><th style="font-weight:400;">Top set</th><th style="font-weight:400;">Note</th></tr></thead><tbody>';
    pts.slice().reverse().forEach(function(p){
      h+='<tr style="border-top:1px solid var(--line-soft);">'
        + '<td style="padding:7px 8px 7px 0;color:var(--chalk-dim);">'+p.date+'</td>'
        + '<td style="color:var(--chalk);">'+p.weight+' × '+p.reps+'</td>'
        + '<td style="color:var(--chalk-faint);font-family:Montserrat,sans-serif;font-style:italic;">'+esc(p.note)+'</td></tr>';
    });
    h+='</tbody></table></div>';

    /* ---- FIT ----
       The honest version of "anthropometry-aware exercise selection".
       No model of your femurs. Just: which lifts have you actually added weight
       to, and how fast. Your own log is stronger evidence about your leverages
       than any generic biomechanical claim, because it's evidence about YOU. */
    var rates = allRates();
    if(rates.length >= 2){
      h+='<div class="card"><h2>Fit — what your body responds to</h2>';
      h+='<div class="fit-note">Ranked by how fast you\'ve actually added weight, not by theory. '
        + 'A lift near the bottom isn\'t bad — it may just suit you badly. That\'s worth knowing '
        + 'before you spend another three months on it.</div>';
      var top = Math.max.apply(null, rates.map(function(r){ return Math.abs(r.perWeek); })) || 1;
      rates.forEach(function(r){
        var pct = Math.abs(r.perWeek)/top*100;
        var neg = r.perWeek < 0;
        h+='<div class="fit-row">'
          + '<div class="fn">'+esc(r.name)+'</div>'
          + '<div class="fbar"><i class="'+(neg?'neg':'')+'" style="width:'+pct+'%"></i></div>'
          + '<div class="fv">'+(r.perWeek>=0?'+':'')+r1(toDisp(r.perWeek))+'<em>/wk</em></div>'
          + '</div>'
          + '<div class="fsub">'+toDisp(r.from)+' → '+toDisp(r.to)+' '+state.unit
          +   ' over '+Math.round(r.weeks)+' week'+(Math.round(r.weeks)===1?'':'s')
          +   ' · '+r.sessions+' sessions</div>';
      });
      h+='</div>';
    }

    return h;
  }

  function chart(pts){
    var W=700,H=200,pl=42,pr=14,pt=14,pb=26;
    var iw=W-pl-pr, ih=H-pt-pb;
    var ws=pts.map(function(p){return p.weight;});
    var mn=Math.min.apply(null,ws), mx=Math.max.apply(null,ws);
    if(mn===mx){ mn-=2.5; mx+=2.5; }
    var rg=mx-mn;
    function X(i){ return pl + (pts.length===1? iw/2 : i/(pts.length-1)*iw); }
    function Y(v){ return pt + ih - (v-mn)/rg*ih; }

    var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;">';
    for(var g=0;g<=3;g++){ var gy=pt+ih/3*g; s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--line-soft)"/>'; }
    var area = pts.map(function(p,i){ return (i?'L':'M')+X(i)+','+Y(p.weight); }).join(' ')
      + ' L'+X(pts.length-1)+','+(pt+ih)+' L'+X(0)+','+(pt+ih)+' Z';
    s+='<path d="'+area+'" fill="var(--rust)" opacity="0.09"/>';
    s+='<path d="'+pts.map(function(p,i){ return (i?'L':'M')+X(i)+','+Y(p.weight); }).join(' ')+'" fill="none" stroke="var(--rust)" stroke-width="2"/>';
    pts.forEach(function(p,i){ s+='<circle cx="'+X(i)+'" cy="'+Y(p.weight)+'" r="3.5" fill="var(--rust)" stroke="var(--bg)" stroke-width="1.5"/>'; });
    s+='<text x="4" y="'+(Y(mx)+4)+'" font-family="Roboto Condensed" font-size="10" fill="var(--chalk-faint)">'+r1(mx)+'</text>';
    s+='<text x="4" y="'+(Y(mn)+4)+'" font-family="Roboto Condensed" font-size="10" fill="var(--chalk-faint)">'+r1(mn)+'</text>';
    s+='<text x="'+X(0)+'" y="'+(H-6)+'" font-family="Roboto Condensed" font-size="9" fill="var(--chalk-faint)">'+pts[0].date.slice(5)+'</text>';
    if(pts.length>1) s+='<text x="'+X(pts.length-1)+'" y="'+(H-6)+'" font-family="Roboto Condensed" font-size="9" fill="var(--chalk-faint)" text-anchor="end">'+pts[pts.length-1].date.slice(5)+'</text>';
    return s+'</svg>';
  }
