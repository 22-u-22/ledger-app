<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B1A17">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Ledger — Lift Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Roboto+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1B1A17;
    --surface: #221F1B;
    --surface-2: #2B2722;
    --line: #3A352E;
    --line-soft: #302C26;
    --chalk: #EDE9E1;
    --chalk-dim: #B4AC9F;
    --chalk-faint: #8A8377;
    --steel: #7E9BB5;
    --steel-dim: #33465A;
    --olive: #8A9463;
    --olive-dim: #464E33;
    --rust: #C1541F;
    --rust-dim: #5E2B13;
    --green: #6E9464;
    --radius: 3px;
  }

  *{ box-sizing: border-box; }
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }

  /* ---- Zoom + scrollbar lockdown ----
     iOS draws the scroll indicator for the MAIN DOCUMENT natively and CSS
     cannot style or hide it. The only way to control it is to stop scrolling
     the document at all: lock html/body, and scroll an inner container
     (#app) instead. An inner container's scrollbar IS stylable.
     This also removes rubber-band overscroll and makes the fixed nav solid. */
  html, body{
    height:100%;
    height:100dvh;
    height:var(--vh, 100dvh);        /* JS-measured; beats vh/dvh inside an iOS PWA */
    overflow:hidden;                 /* the document itself never scrolls */
    touch-action:manipulation;       /* kills double-tap-to-zoom */
    overscroll-behavior:none;
  }
  /* The nav is pinned to the VIEWPORT with position:fixed, not to the body.
     The body's height was coming up short on iOS, and flexbox was faithfully
     pinning the nav to the bottom of a container that didn't reach the screen
     edge. Fixed positioning ignores the body's height entirely — and it's safe
     here precisely because the document is locked and #app does the scrolling. */
  #app{
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    /* touch-action does NOT inherit, but a child CANNOT re-enable a gesture its
       ancestor forbids. pan-y here would kill horizontal swipe in the decks below.
       'manipulation' = panning in both axes, but still no double-tap zoom.
       Pinch stays blocked by the gesture handlers + viewport meta. */
    touch-action:manipulation;
  }
  /* now that we scroll an inner element, hiding the bar actually works */
  ::-webkit-scrollbar{ width:0 !important; height:0 !important; display:none !important; }
  *{ scrollbar-width:none; -ms-overflow-style:none; }
  body{
    margin:0; min-height:100%;
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Montserrat', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  body::before{
    content:""; position: fixed; inset:0;
    background-image: radial-gradient(circle at 1px 1px, rgba(237,233,225,0.03) 1px, transparent 0);
    background-size: 18px 18px;
    pointer-events:none; z-index:0;
  }

  h1,h2,h3,.display{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.03em; margin:0; font-weight:600; }
  .mono{ font-family:'Roboto Condensed', sans-serif; }

  /* Roboto Condensed is proportional, not monospaced — force tabular figures
     so weights and reps still line up in columns. */
  .mono, .stepper input, .set-hdr, .set-row .sidx, .lcol .k, .lcol .v, .strip-cap,
  .weekbar .txt, .hero .eyebrow, .lg-head span, .last-hint, .ex-meta .sub,
  .sess-head .date, .sess-body table, .stat .val, .pr-stat .val, .rest-bar .rt-time,
  .target-banner .k, .target-banner .v, .session-bar .cnt, .day-panel .dp-date, .cal-cell .num{
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }
  /* Condensed data type reads lighter than the mono it replaces — nudge it back up */
  .lcol .v, .ex-meta .sub, .last-hint, .sess-body table, .stepper input{ font-weight:500; }

  #app{
    position:relative; z-index:1; width:100%; max-width:780px; margin:0 auto;
    padding: calc(18px + env(safe-area-inset-top, 0px)) 16px
             calc(84px + env(safe-area-inset-bottom, 0px));   /* clears the fixed nav */
    height:100%;
    height:var(--vh, 100dvh);        /* JS-measured real viewport */
    overflow-y:auto;                 /* THIS is what scrolls, not the document */
    overflow-x:hidden;
  }

  /* ---- Masthead ---- */
  .masthead{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:20px; border-bottom:2px solid var(--line); padding-bottom:14px; }
  .masthead h1{ font-size:24px; letter-spacing:0.06em; }
  .masthead h1 span{ color: var(--rust); }
  .masthead-actions{ display:flex; align-items:center; gap:8px; }
  .unit-toggle{ display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .unit-btn{ font-family:'Oswald',sans-serif; letter-spacing:0.05em; font-size:12px; padding:8px 12px; background:var(--surface); color:var(--chalk-dim); border:none; cursor:pointer; }
  .unit-btn.active{ background: var(--rust-dim); color: var(--chalk); }
  .unit-btn:not(:last-child){ border-right:1px solid var(--line); }
  .gear-btn{ background:none; border:1px solid var(--line); border-radius:var(--radius); color:var(--chalk-dim); cursor:pointer; padding:8px 10px; display:inline-flex; }
  .gear-btn svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  .gear-btn.active{ color:var(--rust); border-color:var(--rust); }

  /* ---- Bottom nav ----
     No backdrop-filter: it creates a containing block and destabilises
     position:fixed on iOS (which is what kept knocking this bar out of place).
     A solid background needs no blur anyway. */
  nav.bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:60;
    display:flex; justify-content:center;
    background: #221F1B;
    border-top:1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    transform:none;                 /* explicit: never let this create its own containing block */
  }
  nav.bottom-nav button{
    flex:1; max-width:190px; background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    padding:9px 4px 7px; min-height:56px;
    color: var(--chalk-faint);
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.06em; font-size:10px;
    border-top:2px solid transparent; margin-top:-1px;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s, border-color .15s;
  }
  nav.bottom-nav button svg{ width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  nav.bottom-nav button.active{ color: var(--rust); border-top-color: var(--rust); }
  nav.bottom-nav button .dot{ position:absolute; top:8px; margin-left:26px; width:6px; height:6px; border-radius:50%; background:var(--rust); }

  /* ---- Generic ---- */
  .card{ background: var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px 16px; margin-bottom:14px; }
  .card > h2{ font-size:15px; color: var(--chalk-dim); margin-bottom:14px; }
  .section-title{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:15px; color:var(--chalk); }

  button.btn{
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em;
    background: var(--surface-2); color: var(--chalk); border:1px solid var(--line);
    padding:11px 16px; border-radius:var(--radius); cursor:pointer; font-size:13px;
    -webkit-tap-highlight-color: transparent;
  }
  button.btn.primary{ background: var(--rust); border-color: var(--rust); color:#fff; }
  button.btn.ghost{ background:none; color:var(--chalk-dim); }
  button.btn.small{ padding:7px 11px; font-size:11px; }
  button.btn.block{ width:100%; }
  button.btn.danger{ background:none; border-color:var(--line); color:#B0644A; }
  button.icon-btn{ background:none; border:none; color:var(--chalk-faint); cursor:pointer; padding:8px; line-height:1; display:inline-flex; -webkit-tap-highlight-color:transparent; }
  button.icon-btn svg{ width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  button.icon-btn:hover{ color:var(--rust); }
  button:focus-visible, input:focus-visible, select:focus-visible{ outline:2px solid var(--steel); outline-offset:1px; }

  input[type=text], input[type=number], input[type=date], select{
    background: var(--bg); border:1px solid var(--line); color: var(--chalk);
    font-family:'Montserrat',sans-serif; font-size:16px; padding:10px; border-radius:var(--radius); width:100%;
  }
  label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--chalk-dim); margin-bottom:6px; }
  .empty-state{ text-align:center; padding:28px 12px; color:var(--chalk-faint); font-size:13px; line-height:1.5; }

  /* ---- Resume banner ---- */
  .resume{ background: var(--rust-dim); border:1px solid var(--rust); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .resume .txt{ font-size:13px; color:var(--chalk); }
  .resume .txt strong{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em; display:block; font-size:13px; margin-bottom:2px; }
  .resume .txt span{ color:#E4BFA8; font-size:12px; }

  /* ---- Calendar ---- */
  .cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-header h2{ font-size:17px; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-dow{ text-align:center; font-size:9px; letter-spacing:0.08em; color:var(--chalk-faint); text-transform:uppercase; padding-bottom:2px; }
  .cal-cell{ aspect-ratio:1; background:var(--bg); border:1px solid var(--line-soft); border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .cal-cell.empty{ background:none; border:none; cursor:default; }
  .cal-cell .num{ font-family:'Roboto Condensed',sans-serif; font-size:10px; color:var(--chalk-faint); position:absolute; top:3px; left:5px; }
  .cal-cell.today{ border-color:var(--chalk-dim); }
  .cal-cell.selected{ border-color:var(--rust); border-width:2px; }
  .plate{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:10px; font-weight:600; color:var(--bg); border:2px solid var(--chalk); }
  .plate.upper{ background: var(--steel); }
  .plate.legs{ background: var(--olive); }
  .plate.free{ background: var(--rust); }
  .cal-legend{ display:flex; gap:14px; margin-top:12px; font-size:11px; color:var(--chalk-faint); flex-wrap:wrap; }
  .cal-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend-dot{ width:9px; height:9px; border-radius:50%; }

  .stat-row{ display:flex; gap:10px; margin-bottom:14px; }
  .stat{ flex:1; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:12px 10px; text-align:center; }
  .stat .val{ font-family:'Oswald',sans-serif; font-size:22px; color:var(--chalk); line-height:1.1; }
  .stat .lbl{ font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); margin-top:3px; }

  .day-panel{ margin-top:16px; padding-top:16px; border-top:1px dashed var(--line); }
  .day-panel .dp-date{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-dim); margin-bottom:10px; }

  /* ---- Session log ---- */
  .session-bar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .session-bar .ttl{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em; font-size:16px; }
  .session-bar .cnt{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-dim); }
  .progress-track{ height:3px; background:var(--line); border-radius:2px; overflow:hidden; margin-bottom:16px; }
  .progress-fill{ height:100%; background:var(--rust); transition: width .3s; }

  .ex-card{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:8px; background:var(--bg); overflow:hidden; }
  .ex-card.open{ border-color:var(--chalk-dim); }
  .ex-card.done{ border-color:var(--olive-dim); }
  .ex-head{ display:flex; align-items:center; gap:10px; padding:13px 12px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .ex-check{ width:19px; height:19px; border-radius:50%; border:1.5px solid var(--line); flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
  .ex-card.done .ex-check{ background:var(--olive); border-color:var(--olive); }
  .ex-check svg{ width:11px; height:11px; stroke:var(--bg); fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; display:none; }
  .ex-card.done .ex-check svg{ display:block; }
  .ex-meta{ flex:1; min-width:0; }
  .ex-meta .nm{ font-size:14px; font-weight:500; color:var(--chalk); }
  .ex-card.done .ex-meta .nm{ color:var(--chalk-dim); }
  .ex-meta .sub{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ex-meta .sub b{ color:var(--steel); font-weight:400; }
  .ex-body{ display:none; padding:0 12px 12px; }
  .ex-card.open .ex-body{ display:block; }
  .chev{ color:var(--chalk-faint); flex:0 0 auto; }
  .chev svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s; }
  .ex-card.open .chev svg{ transform:rotate(180deg); }

  .set-hdr{ display:grid; grid-template-columns: 26px 1fr 1fr 40px 30px; gap:6px; padding:0 0 5px; font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); }
  .set-row{ display:grid; grid-template-columns: 26px 1fr 1fr 40px 30px; gap:6px; align-items:center; margin-bottom:6px; }
  .set-row .sidx{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-faint); text-align:center; }
  .set-row.done .sidx{ color:var(--olive); }
  .stepper{ display:flex; align-items:center; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .stepper button{ background:none; border:none; color:var(--chalk-dim); font-size:17px; line-height:1; padding:0; width:28px; height:38px; flex:0 0 28px; cursor:pointer; -webkit-tap-highlight-color:transparent; font-family:'Montserrat',sans-serif; }
  .stepper button:active{ background:var(--line); }
  .stepper input{ flex:1; min-width:0; width:100%; border:none; background:none; text-align:center; padding:0; height:38px;
    font-family:'Roboto Condensed',sans-serif; font-size:16px; color:var(--chalk); -moz-appearance:textfield; }
  .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .set-done-btn{ width:38px; height:38px; border-radius:var(--radius); border:1px solid var(--line); background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .set-done-btn svg{ width:15px; height:15px; stroke:var(--chalk-faint); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
  .set-row.done .set-done-btn{ background:var(--olive-dim); border-color:var(--olive); }
  .set-row.done .set-done-btn svg{ stroke:var(--chalk); }
  .set-del{ background:none; border:none; color:var(--chalk-faint); cursor:pointer; font-size:17px; padding:0; height:38px; }
  .pr-flag{ display:inline-block; font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:0.08em; background:var(--rust); color:#fff; padding:2px 5px; border-radius:2px; margin-left:6px; vertical-align:middle; }
  .set-note{ margin-bottom:8px; }
  .set-note input{ font-size:16px; padding:7px 10px; }   /* 16px min, or iOS zooms on focus */
  .last-hint{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-faint); margin-bottom:10px; padding:7px 9px; background:var(--surface-2); border-left:2px solid var(--steel-dim); border-radius:2px; }
  .last-hint b{ color:var(--steel); font-weight:400; }
  .ex-actions{ display:flex; gap:8px; margin-top:4px; }

  /* ---- Day type picker ---- */
  .dt-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .dt-btn{ padding:16px 12px; border-radius:var(--radius); border:1px solid var(--line); background:var(--bg); color:var(--chalk-dim);
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em; font-size:13px; cursor:pointer; text-align:left;
    -webkit-tap-highlight-color:transparent; }
  .dt-btn .n{ display:block; font-size:10px; color:var(--chalk-faint); letter-spacing:0.06em; margin-top:3px; font-family:'Montserrat',sans-serif; text-transform:none; }
  .dt-btn[data-cat=upper]{ border-left:3px solid var(--steel); }
  .dt-btn[data-cat=legs]{ border-left:3px solid var(--olive); }
  .dt-btn[data-cat=free]{ border-left:3px solid var(--rust); grid-column:1 / -1; }
  .dt-btn:active{ background:var(--surface-2); color:var(--chalk); }

  /* ---- Rest timer ---- */
  .rest-bar{ position:fixed; left:0; right:0; z-index:55;
    bottom: calc(57px + env(safe-area-inset-bottom, 0px));
    background:var(--surface-2); border-top:1px solid var(--rust);
    display:flex; align-items:center; gap:10px; padding:10px 16px;
    max-width:780px; margin:0 auto; }
  .rest-bar .rt-time{ font-family:'Oswald',sans-serif; font-size:22px; color:var(--rust); min-width:62px; letter-spacing:0.02em; }
  .rest-bar .rt-lbl{ flex:1; font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); }

  /* ---- History ---- */
  .sess{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:8px; background:var(--bg); overflow:hidden; }
  .sess-head{ display:flex; justify-content:space-between; align-items:center; padding:12px; cursor:pointer; gap:8px; -webkit-tap-highlight-color:transparent; }
  .sess-head .meta{ display:flex; align-items:center; gap:9px; min-width:0; }
  .sess-head .date{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-dim); }
  .sess-head .label{ font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:0.03em; }
  .sess-head .tag{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .sess-body{ display:none; padding:0 12px 12px; border-top:1px solid var(--line-soft); }
  .sess-body.open{ display:block; padding-top:10px; }
  .sess-body .exn{ font-size:13px; color:var(--chalk); font-weight:500; margin:8px 0 3px; }
  .sess-body table{ width:100%; border-collapse:collapse; font-family:'Roboto Condensed',sans-serif; font-size:12px; }
  .sess-body td{ padding:2px 8px 2px 0; color:var(--chalk-dim); }
  .sess-body td.nt{ color:var(--chalk-faint); font-style:italic; font-family:'Montserrat',sans-serif; }

  /* ---- Progress ---- */
  .pr-row{ display:flex; gap:8px; margin-bottom:14px; }
  .pr-stat{ flex:1; background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:12px 10px; }
  .pr-stat .val{ font-family:'Oswald',sans-serif; font-size:20px; color:var(--rust); line-height:1.15; }
  .pr-stat .lbl{ font-size:9px; text-transform:uppercase; letter-spacing:0.06em; color:var(--chalk-faint); margin-top:3px; }
  .chart-wrap{ background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:14px 10px; }

  /* ---- Presets ---- */
  .pcat{ margin-bottom:20px; }
  .pcat h3{ font-size:13px; color:var(--chalk); margin-bottom:9px; border-left:3px solid var(--steel); padding-left:8px; }
  .pcat.legs h3{ border-left-color:var(--olive); }
  .prow{ display:flex; gap:6px; margin-bottom:6px; align-items:center; }

  /* ---- Today: week bar (replaces day streak) ---- */
  .weekbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .weekbar .txt{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-dim); }
  .weekbar .txt b{ color:var(--chalk); font-weight:500; }
  .pips{ display:flex; gap:5px; flex:0 0 auto; }
  .pip{ width:22px; height:4px; border-radius:2px; background:var(--line); }
  .pip.done{ background:var(--rust); }

  /* ---- Today: hero ---- */
  .hero{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .hero[data-cat=upper]{ border-left:3px solid var(--steel); }
  .hero[data-cat=legs]{ border-left:3px solid var(--olive); }
  .hero[data-cat=free]{ border-left:3px solid var(--rust); }
  .hero .eyebrow{ font-family:'Roboto Condensed',sans-serif; font-size:10px; letter-spacing:0.13em; text-transform:uppercase; color:var(--chalk-faint); margin-bottom:5px; }
  .hero h3{ font-family:'Oswald',sans-serif; font-size:26px; letter-spacing:0.02em; margin:0 0 3px; }
  .hero .meta{ font-size:12px; color:var(--chalk-dim); margin-bottom:14px; }
  .hero .acts{ display:flex; gap:8px; }
  .hero .acts .btn.primary{ flex:1; }

  /* ---- Today: ledger lines (last -> target) ---- */
  .lg-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
  .lg-head span{ font-family:'Roboto Condensed',sans-serif; font-size:10px; letter-spacing:0.13em; text-transform:uppercase; color:var(--chalk-faint); }
  .ledger{ border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
  .lline{ padding:11px 12px; border-bottom:1px solid var(--line-soft); background:var(--surface); }
  .lline:last-child{ border-bottom:none; }
  .lline .nm{ font-size:13px; font-weight:600; color:var(--chalk); margin-bottom:7px; }
  .lcols{ display:flex; gap:10px; }
  .lcol{ flex:1; min-width:0; }
  .lcol .k{ font-family:'Roboto Condensed',sans-serif; font-size:9px; letter-spacing:0.11em; color:var(--chalk-faint); margin-bottom:2px; }
  .lcol .v{ font-family:'Roboto Condensed',sans-serif; font-size:13px; color:var(--chalk-dim); }
  .lcol.tg{ border-left:1px solid var(--line); padding-left:10px; }
  .lcol.tg .k{ color:var(--rust); }
  .lcol.tg .v{ color:var(--chalk); }
  .lcol.tg .v b{ font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; }

  /* ---- carried-forward note ---- */
  .carry{ display:flex; gap:7px; margin-top:9px; padding-top:8px; border-top:1px dashed var(--line);
    font-size:11.5px; color:var(--chalk-dim); line-height:1.45; font-style:italic; }
  .carry svg{ width:12px; height:12px; flex:0 0 12px; margin-top:2px; stroke:var(--rust); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .carry .flag{ color:var(--rust); font-style:normal; font-weight:600; }

  /* ---- 14-day strip ---- */
  .strip{ display:flex; gap:4px; margin-bottom:6px; }
  .strip i{ flex:1; aspect-ratio:1; border-radius:2px; background:var(--surface); border:1px solid var(--line-soft); }
  .strip i.upper{ background:var(--steel); border-color:var(--steel); }
  .strip i.legs{ background:var(--olive); border-color:var(--olive); }
  .strip i.free{ background:var(--rust); border-color:var(--rust); }
  .strip i.today{ border:1px solid var(--chalk); }
  .strip-cap{ display:flex; justify-content:space-between; font-family:'Roboto Condensed',sans-serif; font-size:9.5px; color:var(--chalk-faint); }

  /* ---- target banner (in session) ---- */
  .target-banner{ display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--rust-dim); border:1px solid var(--rust); border-radius:var(--radius);
    padding:9px 11px; margin-bottom:10px; }
  .target-banner .k{ font-family:'Roboto Condensed',sans-serif; font-size:9px; letter-spacing:0.12em; color:#F0C4A8; margin-bottom:1px; }
  .target-banner .v{ font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; color:#fff; }
  .target-banner .why{ text-align:right; font-size:10px; color:#E3BDA3; line-height:1.35; max-width:145px; }

  /* ---- Load (volume per muscle) ---- */
  .load-row{ display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line-soft); }
  .load-row:last-child{ border-bottom:none; }
  .load-row .lm{ flex:0 0 88px; font-size:10.5px; color:var(--chalk); white-space:nowrap; letter-spacing:0.01em; }
  .load-bar{ flex:1; height:6px; background:var(--surface-2); border-radius:3px; overflow:hidden; display:flex; }
  .load-bar i{ height:100%; display:block; }
  .load-bar i.have{ background:var(--steel); }
  .load-bar i.add{ background:var(--rust); opacity:.75; }
  .load-row .ln{ flex:0 0 78px; text-align:right; font-family:'Roboto Condensed',sans-serif; font-size:10.5px; color:var(--chalk-dim); font-variant-numeric:tabular-nums; }
  .load-row .ln b{ color:var(--rust); font-weight:600; }
  .load-row .ld{ flex:0 0 42px; text-align:right; font-family:'Roboto Condensed',sans-serif; font-size:10px; color:var(--chalk-faint); }
  .load-row{ cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .load-row.open{ border-bottom:none; }
  .load-row.open .lm{ color:var(--rust); }
  .load-detail{ background:var(--bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:8px 10px; margin:0 0 8px; }
  .load-detail .ldrow{ display:flex; justify-content:space-between; gap:10px; align-items:baseline;
    font-family:'Roboto Condensed',sans-serif; font-size:10.5px; color:var(--chalk-dim);
    padding:3px 0; font-variant-numeric:tabular-nums; }
  .load-detail .ldrow em{ color:var(--chalk-faint); font-style:normal; }
  .load-detail .ldrow b{ color:var(--chalk); font-weight:600; white-space:nowrap; }
  .load-detail .ldrow.total{ border-top:1px dashed var(--line); margin-top:4px; padding-top:5px; }
  .load-detail .ldrow.total b{ color:var(--rust); }
  .load-key{ display:flex; gap:14px; margin-top:10px; font-size:10px; color:var(--chalk-faint); flex-wrap:wrap; }
  .load-key span{ display:inline-flex; align-items:center; gap:5px; }
  .load-key i{ width:9px; height:9px; border-radius:2px; }

  /* ---- Fatigue banner ---- */
  .fatigue{ display:flex; gap:9px; background:var(--surface); border:1px solid var(--line);
    border-left:3px solid var(--rust); border-radius:var(--radius); padding:12px; margin-bottom:14px; }
  .fatigue svg{ width:15px; height:15px; flex:0 0 15px; margin-top:1px; stroke:var(--rust); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .fatigue .ft{ font-size:12.5px; line-height:1.5; color:var(--chalk-dim); }
  .fatigue .ft b{ color:var(--chalk); font-weight:600; }
  .fatigue .ft em{ color:var(--chalk-faint); font-style:normal; display:block; margin-top:3px; font-size:11.5px; }

  .stall-badge{ display:inline-block; font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:0.07em;
    background:var(--surface-2); border:1px solid var(--rust); color:var(--rust); padding:1px 5px; border-radius:2px; margin-left:6px; vertical-align:middle; }

  /* ---- RIR chips ---- */
  .rir{ margin:10px 0 8px; }
  .rir .rl{ font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); margin-bottom:5px; }
  .rir .chips{ display:flex; gap:6px; }
  .rir .chips button{ flex:1; padding:8px 0; border:1px solid var(--line); background:var(--surface-2);
    color:var(--chalk-dim); border-radius:var(--radius); font-family:'Roboto Condensed',sans-serif; font-size:13px;
    cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .rir .chips button.on{ background:var(--rust-dim); border-color:var(--rust); color:var(--chalk); }

  /* ---- Advisor (off-plan recommendation) ---- */
  .advisor{ background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--rust);
    border-radius:var(--radius); padding:14px; margin-bottom:14px; }
  .advisor .ah{ display:flex; align-items:center; gap:7px; margin-bottom:8px; }
  .advisor .ah svg{ width:14px; height:14px; stroke:var(--rust); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .advisor .ah span{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.06em; font-size:11px; color:var(--rust); }
  .advisor .ab{ font-size:12.5px; line-height:1.55; color:var(--chalk-dim); margin-bottom:11px; }
  .advisor .ab b{ color:var(--chalk); font-weight:600; }
  .advisor .aacts{ display:flex; gap:8px; flex-wrap:wrap; }
  .advisor .why{ margin-top:10px; padding-top:9px; border-top:1px dashed var(--line);
    font-size:11px; color:var(--chalk-faint); line-height:1.5; display:none; }
  .advisor.open .why{ display:block; }
  .advisor .whytoggle{ background:none; border:none; color:var(--chalk-faint); font-size:11px;
    padding:6px 0 0; cursor:pointer; text-decoration:underline; font-family:'Montserrat',sans-serif; }

  /* readiness dot on load rows */
  .rdot{ display:inline-block; width:6px; height:6px; border-radius:50%; margin-right:5px; vertical-align:middle; }
  .rdot.ready{ background:var(--olive); }
  .rdot.recovering{ background:var(--rust); }
  .rdot.none{ background:var(--line); }

  /* nudge under the hero when load disagrees with rotation */
  .nudge{ margin-top:10px; padding-top:10px; border-top:1px dashed var(--line);
    font-size:11.5px; color:var(--chalk-dim); line-height:1.5; }
  .nudge b{ color:var(--chalk); font-weight:600; }
  .nudge button{ background:none; border:none; color:var(--rust); font-size:11.5px; padding:0; cursor:pointer;
    text-decoration:underline; font-family:'Montserrat',sans-serif; }

  /* ---- Notes intelligence ---- */
  .recur{ display:flex; gap:7px; align-items:flex-start; background:var(--surface-2);
    border:1px solid var(--rust); border-left:3px solid var(--rust); border-radius:var(--radius);
    padding:8px 10px; margin-bottom:9px; font-size:11.5px; color:var(--chalk-dim); line-height:1.45; }
  .recur svg{ width:13px; height:13px; flex:0 0 13px; margin-top:2px; stroke:var(--rust); fill:none; stroke-width:2; }
  .recur b{ color:var(--rust); font-weight:600; }

  /* ---- Setup memory ---- */
  .setup{ display:flex; align-items:center; gap:8px; margin-bottom:9px; }
  .setup .sk{ flex:0 0 44px; font-size:9px; text-transform:uppercase; letter-spacing:0.08em; color:var(--chalk-faint); }
  .setup input{ font-size:16px; padding:7px 9px; font-family:'Roboto Condensed',sans-serif; }
  .setup.has input{ border-color:var(--steel-dim); color:var(--chalk); }

  /* ---- Note trail ---- */
  .notes-toggle{ background:none; border:none; color:var(--chalk-faint); font-size:11px;
    padding:2px 0 8px; cursor:pointer; text-decoration:underline; font-family:'Montserrat',sans-serif; }
  .notes-trail{ background:var(--bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:8px 10px; margin-bottom:9px; }
  .notes-trail .nt{ display:flex; gap:9px; padding:4px 0; font-size:11.5px; color:var(--chalk-dim);
    line-height:1.45; border-bottom:1px solid var(--line-soft); }
  .notes-trail .nt:last-child{ border-bottom:none; }
  .notes-trail .nd{ flex:0 0 34px; font-family:'Roboto Condensed',sans-serif; color:var(--chalk-faint); }

  /* ---- Note search ---- */
  .srx{ font-family:'Roboto Condensed',sans-serif; font-size:10px; letter-spacing:0.08em;
    text-transform:uppercase; color:var(--chalk-faint); margin:10px 0 6px; }
  .sres{ max-height:none; }
  .sr{ border-top:1px solid var(--line-soft); padding:8px 0; }
  .srh{ display:flex; gap:8px; align-items:baseline; margin-bottom:2px; }
  .srd{ font-family:'Roboto Condensed',sans-serif; font-size:10.5px; color:var(--chalk-faint); }
  .srn{ font-size:11.5px; color:var(--chalk); font-weight:600; }
  .srt{ font-size:11.5px; color:var(--chalk-dim); font-style:italic; line-height:1.45; }

  /* ---- Stall diagnosis ---- */
  .diag-card{ background:var(--surface); border:1px solid var(--line); border-left:3px solid var(--rust);
    border-radius:var(--radius); padding:13px; margin-top:14px; }
  .diag-card .dh{ display:flex; align-items:center; gap:7px; margin-bottom:8px; }
  .diag-card .dh svg{ width:14px; height:14px; stroke:var(--rust); fill:none; stroke-width:2; }
  .diag-card .dh span{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em;
    font-size:11px; color:var(--rust); }
  .diag-card .dsub{ font-size:12px; color:var(--chalk-dim); line-height:1.55; }
  .diag-card .dlist{ margin:8px 0 0; padding-left:16px; }
  .diag-card .dlist li{ font-size:12px; color:var(--chalk-dim); line-height:1.55; margin-bottom:7px; }
  .diag-card .dlist b{ color:var(--chalk); font-weight:600; }

  /* ---- Fit ---- */
  .fit-note{ font-size:11.5px; color:var(--chalk-faint); line-height:1.5; margin-bottom:14px; }
  .fit-row{ display:flex; align-items:center; gap:9px; margin-top:10px; }
  .fit-row .fn{ flex:1; font-size:12px; color:var(--chalk); min-width:0; overflow:hidden;
    text-overflow:ellipsis; white-space:nowrap; }
  .fit-row .fbar{ flex:0 0 70px; height:6px; background:var(--surface-2); border-radius:3px; overflow:hidden; }
  .fit-row .fbar i{ display:block; height:100%; background:var(--olive); }
  .fit-row .fbar i.neg{ background:var(--rust); }
  .fit-row .fv{ flex:0 0 60px; text-align:right; font-family:'Roboto Condensed',sans-serif;
    font-size:12px; color:var(--chalk); font-variant-numeric:tabular-nums; }
  .fit-row .fv em{ font-style:normal; font-size:9px; color:var(--chalk-faint); }
  .fsub{ font-family:'Roboto Condensed',sans-serif; font-size:10px; color:var(--chalk-faint);
    padding-left:0; margin-top:2px; }

  /* ================= SWIPE DECK =================
     Built on CSS scroll-snap, deliberately NOT on JS drag handlers: native
     momentum, no gesture fights with the number inputs living inside the cards,
     and iOS doesn't have to be argued with. */
  .deck-wrap{ margin:0 -16px 12px; }          /* bleed to the screen edges */
  .deck{
    display:flex; gap:12px;
    overflow-x:auto; overflow-y:hidden;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior-x:contain;
    padding:0 16px;
    touch-action:pan-x pan-y;
  }
  .deck::-webkit-scrollbar{ display:none; }
  .deck > .dcard{
    flex:0 0 calc(100% - 24px);
    scroll-snap-align:center;
    scroll-snap-stop:always;
    min-width:0;
  }
  @media(min-width:620px){ .deck > .dcard{ flex:0 0 420px; } }

  /* deck chrome */
  .deck-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:9px; }
  .deck-head .dpos{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-dim);
    font-variant-numeric:tabular-nums; }
  .deck-head .dpos b{ color:var(--chalk); font-weight:600; }
  .deck-head .dhint{ font-size:10px; color:var(--chalk-faint); letter-spacing:0.04em; }
  .dots{ display:flex; gap:5px; justify-content:center; margin-top:10px; flex-wrap:wrap; }
  .dots i{ width:6px; height:6px; border-radius:50%; background:var(--line); transition:background .15s, width .15s; }
  .dots i.on{ background:var(--rust); width:16px; border-radius:3px; }
  .dots i.done{ background:var(--olive); }
  .deck-nav{ display:flex; gap:8px; margin-top:10px; }
  .deck-nav button{ flex:1; }

  /* the card itself */
  .dcard{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:14px; }
  .dcard.done{ border-color:var(--olive-dim); }
  .dcard .dc-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; }
  .dcard .dc-name{ font-size:15px; font-weight:600; color:var(--chalk); line-height:1.3; }
  .dc-name-btn{ display:inline-flex; align-items:center; gap:5px; background:none; border:none;
    padding:0; margin:0; cursor:pointer; text-align:left; font-family:'Montserrat',sans-serif;
    -webkit-tap-highlight-color:transparent; }
  .dc-caret{ width:15px; height:15px; flex:0 0 15px; stroke:var(--chalk-faint); fill:none;
    stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .expick{ margin:0 0 12px; padding:10px; background:var(--bg); border:1px solid var(--line);
    border-radius:var(--radius); }
  .expick-h{ font-family:'Roboto Condensed',sans-serif; font-size:9px; letter-spacing:0.11em;
    text-transform:uppercase; color:var(--chalk-faint); margin:8px 2px 5px; }
  .expick-h:first-child{ margin-top:2px; }
  .expick-opt{ display:flex; align-items:center; justify-content:space-between; gap:8px; width:100%;
    text-align:left; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius);
    color:var(--chalk); font-family:'Montserrat',sans-serif; font-size:13px; padding:9px 11px;
    margin-bottom:5px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .expick-opt.cur{ border-color:var(--rust); }
  .expick-opt.off{ color:var(--chalk-faint); cursor:default; }
  .expick-opt .tag{ font-family:'Roboto Condensed',sans-serif; font-size:9px; letter-spacing:0.06em;
    text-transform:uppercase; color:var(--chalk-faint); flex:0 0 auto; }
  .expick-opt.cur .tag{ color:var(--rust); }
  .expick-new{ display:flex; gap:6px; }
  .expick-new input{ flex:1; font-size:16px; padding:9px 10px; }
  .dcard .dc-idx{ font-family:'Roboto Condensed',sans-serif; font-size:10px; color:var(--chalk-faint);
    letter-spacing:0.08em; text-transform:uppercase; margin-bottom:3px; }
  .dcard .dc-tick{ flex:0 0 auto; color:var(--olive); font-size:15px; }

  /* read-only card (calendar day review) */
  .rcard table{ width:100%; border-collapse:collapse; }
  .rcard td{ padding:4px 8px 4px 0; font-family:'Roboto Condensed',sans-serif; font-size:13px;
    color:var(--chalk-dim); font-variant-numeric:tabular-nums; }
  .rcard td.w{ color:var(--chalk); font-weight:500; }
  .rcard .rnote{ margin-top:9px; padding-top:8px; border-top:1px dashed var(--line);
    font-size:11.5px; color:var(--chalk-dim); font-style:italic; line-height:1.45; }
  .rcard .rsetup{ margin-top:7px; font-family:'Roboto Condensed',sans-serif; font-size:10.5px; color:var(--chalk-faint); }
  .rcard .rrir{ display:inline-block; margin-top:8px; font-family:'Roboto Condensed',sans-serif;
    font-size:10px; color:var(--chalk-dim); border:1px solid var(--line); border-radius:2px; padding:2px 6px; }

  /* day summary above the deck — keeps the whole-session glance */
  .day-sum{ display:flex; flex-wrap:wrap; gap:5px; margin-bottom:12px; }
  .day-sum span{ font-family:'Roboto Condensed',sans-serif; font-size:10.5px; color:var(--chalk-dim);
    background:var(--surface-2); border:1px solid var(--line); border-radius:2px; padding:3px 7px;
    font-variant-numeric:tabular-nums; }
  .day-sum span.cur{ border-color:var(--rust); color:var(--chalk); }

  .toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:calc(78px + env(safe-area-inset-bottom,0px));
    background:var(--chalk); color:var(--bg); font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em;
    font-size:12px; padding:10px 18px; border-radius:var(--radius); z-index:80; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show{ opacity:1; }
</style>

<body>
<div id="app"></div>
<nav id="nav" class="bottom-nav"></nav>
<div id="toast" class="toast"></div>

<script>
(function(){
  "use strict";

  var DAY_TYPES = {
    upperA: { label:"Upper A", cat:"upper", badge:"A" },
    upperB: { label:"Upper B", cat:"upper", badge:"B" },
    legsA:  { label:"Legs + Arms A", cat:"legs", badge:"A" },
    legsB:  { label:"Legs + Arms B", cat:"legs", badge:"B" },
    free:   { label:"Freeform", cat:"free", badge:"F" }
  };

  var DEFAULT_PRESETS = {
    upperA: ["Lat pull down","Incline DB chest press","Barbell row","Military press","Incline DB fly","Lateral raises","Face pulls"],
    upperB: ["Weighted pull ups","Smith machine incline chest press","Sitting machine row","Seated DB shoulder press","Vertical chest press","Lateral raises","Seated rear delt DB flys"],
    legsA:  ["Hack Squat","Barbell RDL","DB Romanian Split Squats","Hamstring curl","Leg curl","Standing calf","Cable overhead tricep extension","Cable bicep curl","Cable tricep extensions","Pronated bicep curl"],
    legsB:  ["Leg press","Barbell RDL","Walking DB lunges","Hamstring curl","Leg curl","Standing calf","Seated DB overhead tricep extension","Bicep curl DB","Dips","Hammer curl"]
  };

  var DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var KG_LBS = 2.20462;
  var REST_DEFAULT = 120;
  var BUILD = '20 · edit from card';

  /* ---- MUSCLE TAGGING ----
     Primary muscles count a full set; secondary count half.
     Everything here is editable in Settings — these are just sensible defaults. */
  var MUSCLES = {
    chest:'Chest', back:'Back', frontDelts:'Front delts', sideDelts:'Side delts', rearDelts:'Rear delts',
    biceps:'Biceps', triceps:'Triceps', quads:'Quads', hamstrings:'Hamstrings', glutes:'Glutes', calves:'Calves'
  };
  var MUSCLE_ORDER = ['chest','back','frontDelts','sideDelts','rearDelts','biceps','triceps','quads','hamstrings','glutes','calves'];

  var DEFAULT_TAGS = {
    // Upper A
    'Lat pull down':                    { p:['back'], s:['biceps'] },
    'Incline DB chest press':           { p:['chest'], s:['frontDelts','triceps'] },
    'Barbell row':                      { p:['back'], s:['biceps','rearDelts'] },
    'Military press':                   { p:['frontDelts'], s:['triceps'] },
    'Incline DB fly':                   { p:['chest'], s:[] },

  // guess tags for a lift the app has never seen (custom / freeform)
  function inferTags(name){
    var n = name.toLowerCase();
    var has = function(){ for(var i=0;i<arguments.length;i++){ if(n.indexOf(arguments[i])>-1) return true; } return false; };
    if(has('calf','calves'))                       return { p:['calves'], s:[] };
    if(has('lateral raise','side raise'))          return { p:['sideDelts'], s:[] };
    if(has('rear delt','face pull','reverse fly')) return { p:['rearDelts'], s:[] };
    if(has('curl') && !has('leg','hamstring'))     return { p:['biceps'], s:[] };
    if(has('tricep','pushdown','skull','dip'))     return { p:['triceps'], s:[] };
    if(has('leg curl','hamstring','rdl','deadlift'))return { p:['hamstrings'], s:['glutes'] };
    if(has('squat','leg press','lunge','leg extension')) return { p:['quads'], s:['glutes'] };
    if(has('row','pull up','pull-up','pulldown','pull down','chin')) return { p:['back'], s:['biceps'] };
    if(has('shoulder press','overhead press','military')) return { p:['frontDelts'], s:['triceps'] };
    if(has('bench','chest','fly','press'))         return { p:['chest'], s:['triceps'] };
    if(has('glute','hip thrust'))                  return { p:['glutes'], s:[] };

  }

  /* ---- storage ---- */

  /* ---- BACKUP ----
     Entirely client-side: no server, no account, no cost. The JSON never leaves
     the phone unless you send it somewhere yourself.
     Why this matters: everything lives in localStorage on ONE device. Clearing
     Safari's website data, replacing the phone, or iOS evicting storage under
     pressure all wipe it permanently. There is no other copy. */
  var BACKUP_VERSION = 1;

  function buildBackup(){
    return JSON.stringify({
      app: 'ledger',
      backupVersion: BACKUP_VERSION,
      build: BUILD,
      exportedAt: new Date().toISOString(),
      workouts: state.workouts,
      presets: state.presets,
      tags: state.tags,
      setups: state.setups,
      unit: state.unit,
      rest: state.rest.dur
    }, null, 2);
  }

  function backupFilename(){
    return 'ledger-backup-' + todayStr() + '.json';
  }

  function exportBackup(){
    var json = buildBackup();
    var name = backupFilename();
    try{
      var blob = new Blob([json], { type:'application/json' });
      var url  = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url; a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
      toast(state.workouts.length + ' sessions exported');
    }catch(e){
      toast('Download blocked — use Share instead');
    }
  }

  /* iOS standalone PWAs often refuse anchor downloads outright. The share sheet
     is the reliable route there: it can save to Files, mail it, or AirDrop it. */
  function shareBackup(){
    var json = buildBackup();
    var name = backupFilename();
    if(navigator.share && navigator.canShare){
      try{
        var file = new File([json], name, { type:'application/json' });
        if(navigator.canShare({ files:[file] })){
          navigator.share({ files:[file], title:'Ledger backup' })
            .then(function(){ toast('Backup shared'); })
            .catch(function(){});
          return;
        }
      }catch(e){}
    }
    if(navigator.share){
      navigator.share({ title:'Ledger backup', text:json }).catch(function(){});
      return;
    }
    copyBackup();
  }

  function copyBackup(){
    var json = buildBackup();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(json)
        .then(function(){ toast('Backup copied — paste it somewhere safe'); })
        .catch(function(){ showBackupText(json); });
    } else {
      showBackupText(json);
    }
  }
  // last resort: put it on screen so it can be selected by hand
  function showBackupText(json){
    var box = document.getElementById('backup-box');
    if(box){ box.style.display='block'; box.value = json; box.select(); }
    toast('Select all and copy');
  }

  function importBackup(json, mode){
    var data;
    try{ data = JSON.parse(json); }
    catch(e){ toast('Not valid backup JSON'); return false; }
    if(!data || data.app !== 'ledger' || !Array.isArray(data.workouts)){
      toast('This is not a Ledger backup'); return false;
    }

    if(mode === 'merge'){
      // keep both sides; a workout already present (same id) is not duplicated
      var seen = {};
      state.workouts.forEach(function(w){ seen[w.id]=1; });
      var added = 0;
      data.workouts.forEach(function(w){
        if(!w.id || seen[w.id]) return;
        state.workouts.push(w); added++;
      });
      saveWorkouts();
      toast(added + ' new session' + (added===1?'':'s') + ' merged');
    } else {
      state.workouts = data.workouts;
      if(data.presets) state.presets = data.presets;
      if(data.tags)    state.tags    = data.tags;
      if(data.setups)  state.setups  = data.setups;
      if(data.unit==='kg'||data.unit==='lbs') state.unit = data.unit;
      if(data.rest)    state.rest.dur = data.rest;
      saveWorkouts();
      save('presets', state.presets);
      save('tags', state.tags);
      save('setups', state.setups);
      save('unit', state.unit);
      save('rest', String(state.rest.dur));
      toast('Restored ' + state.workouts.length + ' sessions');
    }
    state.openMuscle = null;
    render();
    return true;
  }

  /* ---- data helpers ---- */
  function onDate(d){ return state.workouts.filter(function(w){ return w.date===d; }); }
  function allExNames(){
    var s={};
    Object.keys(state.presets).forEach(function(k){ state.presets[k].forEach(function(n){ s[n]=1; }); });
    state.workouts.forEach(function(w){ w.exercises.forEach(function(e){ s[e.name]=1; }); });
    return Object.keys(s).sort(function(a,b){ return a.localeCompare(b); });
  }
  // most recent PAST session containing this exercise (excludes the session being edited)
  function lastFor(name){
    var editId = state.draft && state.draft.editingId;
    var cands = state.workouts.filter(function(w){
      if(editId && w.id===editId) return false;
      return w.exercises.some(function(e){ return e.name===name && e.sets.length; });
    }).sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(!cands.length) return null;
    var w = cands[0];
    var ex = w.exercises.filter(function(e){ return e.name===name; })[0];
    return { date:w.date, sets:ex.sets };
  }
  function lastSummary(name){
    var l = lastFor(name);
    if(!l) return null;
    return l.sets.map(function(s){ return toDisp(s.weight||0)+'×'+(s.reps||0); }).join(', ');
  }
  function bestKg(name){
    var best=0;
    state.workouts.forEach(function(w){
      if(state.draft && state.draft.editingId===w.id) return;
      w.exercises.forEach(function(e){
        if(e.name!==name) return;
        e.sets.forEach(function(s){ var v=parseFloat(s.weight)||0; if(v>best) best=v; });
      });
    });
    return best;
  }
  function history(name){
    var pts=[];
    state.workouts.forEach(function(w){
      w.exercises.forEach(function(e){
        if(e.name!==name || !e.sets.length) return;
        var b=null;
        e.sets.forEach(function(s){
          var wt=parseFloat(s.weight)||0, rp=parseInt(s.reps)||0;
          if(!b || wt>b.w || (wt===b.w && rp>b.r)) b={w:wt,r:rp,note:s.note||''};
        });
        if(b) pts.push({date:w.date, weight:b.w, reps:b.r, note:b.note});
      });
    });
    return pts.sort(function(a,b){ return a.date.localeCompare(b.date); });
  }
  function streak(){
    var days={}; state.workouts.forEach(function(w){ days[w.date]=1; });
    var n=0, d=new Date();
    // allow today to be un-trained without breaking the streak
    if(!days[todayStr()]) d.setDate(d.getDate()-1);
    for(;;){
      var k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      if(days[k]){ n++; d.setDate(d.getDate()-1); } else break;

    return n;

  function monthCount(){

  /* ---- rotation / week ---- */
  var ROTATION = ['upperA','legsA','upperB','legsB'];
  var WEEK_TARGET = 4;

  // next day type = the one after the most recent session that was part of the rotation
  function nextDayType(){
    var past = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    for(var i=0;i<past.length;i++){
      var ix = ROTATION.indexOf(past[i].dayType);
      if(ix>-1) return ROTATION[(ix+1)%ROTATION.length];
    }
    return ROTATION[0];
  }
  function daysSinceLast(dayType){
    var past = state.workouts.filter(function(w){ return w.dayType===dayType; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(!past.length) return null;
    var then = new Date(past[0].date+'T00:00:00');
    var now  = new Date(todayStr()+'T00:00:00');
    return Math.round((now-then)/86400000);
  }
  // Monday-start week
  function weekDates(){
    var now=new Date(); var dow=(now.getDay()+6)%7;
    var mon=new Date(now); mon.setDate(now.getDate()-dow);
    var out=[];
    for(var i=0;i<7;i++){ var d=new Date(mon); d.setDate(mon.getDate()+i);
      out.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())); }
    return out;
  }
  function weekCount(){
    var wk=weekDates(); var seen={};
    state.workouts.forEach(function(w){ if(wk.indexOf(w.date)>-1) seen[w.date]=1; });

    var out=[], now=new Date();

      var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      var ss=onDate(ds);
      out.push({ date:ds, cat: ss.length ? ((DAY_TYPES[ss[0].dayType]||DAY_TYPES.free).cat) : null });
