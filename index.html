<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1B1A17">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Ledger — Lift Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Montserrat:wght@400;500;600;700&family=Roboto+Condensed:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1B1A17;
    --surface: #221F1B;
    --surface-2: #2B2722;
    --line: #3A352E;
    --line-soft: #302C26;
    --chalk: #EDE9E1;
    --chalk-dim: #B4AC9F;
    --chalk-faint: #8A8377;
    --steel: #7E9BB5;
    --steel-dim: #33465A;
    --olive: #8A9463;
    --olive-dim: #464E33;
    --rust: #C1541F;
    --rust-dim: #5E2B13;
    --green: #6E9464;
    --radius: 3px;
  }

  *{ box-sizing: border-box; }
  html{ -webkit-text-size-adjust: 100%; }
  body{
    margin:0; min-height:100%;
    background: var(--bg);
    color: var(--chalk);
    font-family: 'Montserrat', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }
  body::before{
    content:""; position: fixed; inset:0;
    background-image: radial-gradient(circle at 1px 1px, rgba(237,233,225,0.03) 1px, transparent 0);
    background-size: 18px 18px;
    pointer-events:none; z-index:0;
  }

  h1,h2,h3,.display{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.03em; margin:0; font-weight:600; }
  .mono{ font-family:'Roboto Condensed', sans-serif; }

  /* Roboto Condensed is proportional, not monospaced — force tabular figures
     so weights and reps still line up in columns. */
  .mono, .stepper input, .set-hdr, .set-row .sidx, .lcol .k, .lcol .v, .strip-cap,
  .weekbar .txt, .hero .eyebrow, .lg-head span, .last-hint, .ex-meta .sub,
  .sess-head .date, .sess-body table, .stat .val, .pr-stat .val, .rest-bar .rt-time,
  .target-banner .k, .target-banner .v, .session-bar .cnt, .day-panel .dp-date, .cal-cell .num{
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum" 1;
  }
  /* Condensed data type reads lighter than the mono it replaces — nudge it back up */
  .lcol .v, .ex-meta .sub, .last-hint, .sess-body table, .stepper input{ font-weight:500; }

  #app{
    position:relative; z-index:1; max-width: 780px; margin:0 auto;
    padding: calc(18px + env(safe-area-inset-top, 0px)) 16px calc(96px + env(safe-area-inset-bottom, 0px));
  }

  /* ---- Masthead ---- */
  .masthead{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:20px; border-bottom:2px solid var(--line); padding-bottom:14px; }
  .masthead h1{ font-size:24px; letter-spacing:0.06em; }
  .masthead h1 span{ color: var(--rust); }
  .masthead-actions{ display:flex; align-items:center; gap:8px; }
  .unit-toggle{ display:flex; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .unit-btn{ font-family:'Oswald',sans-serif; letter-spacing:0.05em; font-size:12px; padding:8px 12px; background:var(--surface); color:var(--chalk-dim); border:none; cursor:pointer; }
  .unit-btn.active{ background: var(--rust-dim); color: var(--chalk); }
  .unit-btn:not(:last-child){ border-right:1px solid var(--line); }
  .gear-btn{ background:none; border:1px solid var(--line); border-radius:var(--radius); color:var(--chalk-dim); cursor:pointer; padding:8px 10px; display:inline-flex; }
  .gear-btn svg{ width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  .gear-btn.active{ color:var(--rust); border-color:var(--rust); }

  /* ---- Bottom nav ---- */
  nav.bottom-nav{
    position:fixed; left:0; right:0; bottom:0; z-index:60;
    display:flex; justify-content:center;
    background: rgba(34,31,27,0.97);
    backdrop-filter: blur(8px);
    border-top:1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  nav.bottom-nav button{
    flex:1; max-width:190px; background:none; border:none; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    padding:9px 4px 7px; min-height:56px;
    color: var(--chalk-faint);
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.06em; font-size:10px;
    border-top:2px solid transparent; margin-top:-1px;
    -webkit-tap-highlight-color: transparent;
    transition: color .15s, border-color .15s;
  }
  nav.bottom-nav button svg{ width:21px; height:21px; stroke:currentColor; fill:none; stroke-width:1.6; stroke-linecap:round; stroke-linejoin:round; }
  nav.bottom-nav button.active{ color: var(--rust); border-top-color: var(--rust); }
  nav.bottom-nav button .dot{ position:absolute; top:8px; margin-left:26px; width:6px; height:6px; border-radius:50%; background:var(--rust); }

  /* ---- Generic ---- */
  .card{ background: var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:18px 16px; margin-bottom:14px; }
  .card > h2{ font-size:15px; color: var(--chalk-dim); margin-bottom:14px; }
  .section-title{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em; font-size:15px; color:var(--chalk); }

  button.btn{
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em;
    background: var(--surface-2); color: var(--chalk); border:1px solid var(--line);
    padding:11px 16px; border-radius:var(--radius); cursor:pointer; font-size:13px;
    -webkit-tap-highlight-color: transparent;
  }
  button.btn.primary{ background: var(--rust); border-color: var(--rust); color:#fff; }
  button.btn.ghost{ background:none; color:var(--chalk-dim); }
  button.btn.small{ padding:7px 11px; font-size:11px; }
  button.btn.block{ width:100%; }
  button.btn.danger{ background:none; border-color:var(--line); color:#B0644A; }
  button.icon-btn{ background:none; border:none; color:var(--chalk-faint); cursor:pointer; padding:8px; line-height:1; display:inline-flex; -webkit-tap-highlight-color:transparent; }
  button.icon-btn svg{ width:17px; height:17px; stroke:currentColor; fill:none; stroke-width:1.7; stroke-linecap:round; stroke-linejoin:round; }
  button.icon-btn:hover{ color:var(--rust); }
  button:focus-visible, input:focus-visible, select:focus-visible{ outline:2px solid var(--steel); outline-offset:1px; }

  input[type=text], input[type=number], input[type=date], select{
    background: var(--bg); border:1px solid var(--line); color: var(--chalk);
    font-family:'Montserrat',sans-serif; font-size:16px; padding:10px; border-radius:var(--radius); width:100%;
  }
  label{ display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.06em; color:var(--chalk-dim); margin-bottom:6px; }
  .empty-state{ text-align:center; padding:28px 12px; color:var(--chalk-faint); font-size:13px; line-height:1.5; }

  /* ---- Resume banner ---- */
  .resume{ background: var(--rust-dim); border:1px solid var(--rust); border-radius:var(--radius); padding:14px 16px; margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .resume .txt{ font-size:13px; color:var(--chalk); }
  .resume .txt strong{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em; display:block; font-size:13px; margin-bottom:2px; }
  .resume .txt span{ color:#E4BFA8; font-size:12px; }

  /* ---- Calendar ---- */
  .cal-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .cal-header h2{ font-size:17px; }
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-dow{ text-align:center; font-size:9px; letter-spacing:0.08em; color:var(--chalk-faint); text-transform:uppercase; padding-bottom:2px; }
  .cal-cell{ aspect-ratio:1; background:var(--bg); border:1px solid var(--line-soft); border-radius:var(--radius);
    display:flex; align-items:center; justify-content:center; position:relative; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .cal-cell.empty{ background:none; border:none; cursor:default; }
  .cal-cell .num{ font-family:'Roboto Condensed',sans-serif; font-size:10px; color:var(--chalk-faint); position:absolute; top:3px; left:5px; }
  .cal-cell.today{ border-color:var(--chalk-dim); }
  .cal-cell.selected{ border-color:var(--rust); border-width:2px; }
  .plate{ width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:10px; font-weight:600; color:var(--bg); border:2px solid var(--chalk); }
  .plate.upper{ background: var(--steel); }
  .plate.legs{ background: var(--olive); }
  .plate.free{ background: var(--rust); }
  .cal-legend{ display:flex; gap:14px; margin-top:12px; font-size:11px; color:var(--chalk-faint); flex-wrap:wrap; }
  .cal-legend span{ display:inline-flex; align-items:center; gap:5px; }
  .legend-dot{ width:9px; height:9px; border-radius:50%; }

  .stat-row{ display:flex; gap:10px; margin-bottom:14px; }
  .stat{ flex:1; background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:12px 10px; text-align:center; }
  .stat .val{ font-family:'Oswald',sans-serif; font-size:22px; color:var(--chalk); line-height:1.1; }
  .stat .lbl{ font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); margin-top:3px; }

  .day-panel{ margin-top:16px; padding-top:16px; border-top:1px dashed var(--line); }
  .day-panel .dp-date{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-dim); margin-bottom:10px; }

  /* ---- Session log ---- */
  .session-bar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .session-bar .ttl{ font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em; font-size:16px; }
  .session-bar .cnt{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-dim); }
  .progress-track{ height:3px; background:var(--line); border-radius:2px; overflow:hidden; margin-bottom:16px; }
  .progress-fill{ height:100%; background:var(--rust); transition: width .3s; }

  .ex-card{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:8px; background:var(--bg); overflow:hidden; }
  .ex-card.open{ border-color:var(--chalk-dim); }
  .ex-card.done{ border-color:var(--olive-dim); }
  .ex-head{ display:flex; align-items:center; gap:10px; padding:13px 12px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .ex-check{ width:19px; height:19px; border-radius:50%; border:1.5px solid var(--line); flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
  .ex-card.done .ex-check{ background:var(--olive); border-color:var(--olive); }
  .ex-check svg{ width:11px; height:11px; stroke:var(--bg); fill:none; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; display:none; }
  .ex-card.done .ex-check svg{ display:block; }
  .ex-meta{ flex:1; min-width:0; }
  .ex-meta .nm{ font-size:14px; font-weight:500; color:var(--chalk); }
  .ex-card.done .ex-meta .nm{ color:var(--chalk-dim); }
  .ex-meta .sub{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-faint); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ex-meta .sub b{ color:var(--steel); font-weight:400; }
  .ex-body{ display:none; padding:0 12px 12px; }
  .ex-card.open .ex-body{ display:block; }
  .chev{ color:var(--chalk-faint); flex:0 0 auto; }
  .chev svg{ width:15px; height:15px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; transition:transform .2s; }
  .ex-card.open .chev svg{ transform:rotate(180deg); }

  .set-hdr{ display:grid; grid-template-columns: 26px 1fr 1fr 40px 30px; gap:6px; padding:0 0 5px; font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); }
  .set-row{ display:grid; grid-template-columns: 26px 1fr 1fr 40px 30px; gap:6px; align-items:center; margin-bottom:6px; }
  .set-row .sidx{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-faint); text-align:center; }
  .set-row.done .sidx{ color:var(--olive); }
  .stepper{ display:flex; align-items:center; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; }
  .stepper button{ background:none; border:none; color:var(--chalk-dim); font-size:17px; line-height:1; padding:0; width:28px; height:38px; flex:0 0 28px; cursor:pointer; -webkit-tap-highlight-color:transparent; font-family:'Montserrat',sans-serif; }
  .stepper button:active{ background:var(--line); }
  .stepper input{ flex:1; min-width:0; width:100%; border:none; background:none; text-align:center; padding:0; height:38px;
    font-family:'Roboto Condensed',sans-serif; font-size:15px; color:var(--chalk); -moz-appearance:textfield; }
  .stepper input::-webkit-outer-spin-button, .stepper input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .set-done-btn{ width:38px; height:38px; border-radius:var(--radius); border:1px solid var(--line); background:var(--surface-2);
    display:flex; align-items:center; justify-content:center; cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .set-done-btn svg{ width:15px; height:15px; stroke:var(--chalk-faint); fill:none; stroke-width:2.5; stroke-linecap:round; stroke-linejoin:round; }
  .set-row.done .set-done-btn{ background:var(--olive-dim); border-color:var(--olive); }
  .set-row.done .set-done-btn svg{ stroke:var(--chalk); }
  .set-del{ background:none; border:none; color:var(--chalk-faint); cursor:pointer; font-size:17px; padding:0; height:38px; }
  .pr-flag{ display:inline-block; font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:0.08em; background:var(--rust); color:#fff; padding:2px 5px; border-radius:2px; margin-left:6px; vertical-align:middle; }
  .set-note{ margin-bottom:8px; }
  .set-note input{ font-size:14px; padding:8px 10px; }
  .last-hint{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-faint); margin-bottom:10px; padding:7px 9px; background:var(--surface-2); border-left:2px solid var(--steel-dim); border-radius:2px; }
  .last-hint b{ color:var(--steel); font-weight:400; }
  .ex-actions{ display:flex; gap:8px; margin-top:4px; }

  /* ---- Day type picker ---- */
  .dt-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .dt-btn{ padding:16px 12px; border-radius:var(--radius); border:1px solid var(--line); background:var(--bg); color:var(--chalk-dim);
    font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.04em; font-size:13px; cursor:pointer; text-align:left;
    -webkit-tap-highlight-color:transparent; }
  .dt-btn .n{ display:block; font-size:10px; color:var(--chalk-faint); letter-spacing:0.06em; margin-top:3px; font-family:'Montserrat',sans-serif; text-transform:none; }
  .dt-btn[data-cat=upper]{ border-left:3px solid var(--steel); }
  .dt-btn[data-cat=legs]{ border-left:3px solid var(--olive); }
  .dt-btn[data-cat=free]{ border-left:3px solid var(--rust); grid-column:1 / -1; }
  .dt-btn:active{ background:var(--surface-2); color:var(--chalk); }

  /* ---- Rest timer ---- */
  .rest-bar{ position:fixed; left:0; right:0; z-index:55;
    bottom: calc(57px + env(safe-area-inset-bottom, 0px));
    background:var(--surface-2); border-top:1px solid var(--rust);
    display:flex; align-items:center; gap:10px; padding:10px 16px;
    max-width:780px; margin:0 auto; }
  .rest-bar .rt-time{ font-family:'Oswald',sans-serif; font-size:22px; color:var(--rust); min-width:62px; letter-spacing:0.02em; }
  .rest-bar .rt-lbl{ flex:1; font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); }

  /* ---- History ---- */
  .sess{ border:1px solid var(--line); border-radius:var(--radius); margin-bottom:8px; background:var(--bg); overflow:hidden; }
  .sess-head{ display:flex; justify-content:space-between; align-items:center; padding:12px; cursor:pointer; gap:8px; -webkit-tap-highlight-color:transparent; }
  .sess-head .meta{ display:flex; align-items:center; gap:9px; min-width:0; }
  .sess-head .date{ font-family:'Roboto Condensed',sans-serif; font-size:12px; color:var(--chalk-dim); }
  .sess-head .label{ font-family:'Oswald',sans-serif; font-size:12px; letter-spacing:0.03em; }
  .sess-head .tag{ width:8px; height:8px; border-radius:50%; flex:0 0 auto; }
  .sess-body{ display:none; padding:0 12px 12px; border-top:1px solid var(--line-soft); }
  .sess-body.open{ display:block; padding-top:10px; }
  .sess-body .exn{ font-size:13px; color:var(--chalk); font-weight:500; margin:8px 0 3px; }
  .sess-body table{ width:100%; border-collapse:collapse; font-family:'Roboto Condensed',sans-serif; font-size:12px; }
  .sess-body td{ padding:2px 8px 2px 0; color:var(--chalk-dim); }
  .sess-body td.nt{ color:var(--chalk-faint); font-style:italic; font-family:'Montserrat',sans-serif; }

  /* ---- Progress ---- */
  .pr-row{ display:flex; gap:8px; margin-bottom:14px; }
  .pr-stat{ flex:1; background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:12px 10px; }
  .pr-stat .val{ font-family:'Oswald',sans-serif; font-size:20px; color:var(--rust); line-height:1.15; }
  .pr-stat .lbl{ font-size:9px; text-transform:uppercase; letter-spacing:0.06em; color:var(--chalk-faint); margin-top:3px; }
  .chart-wrap{ background:var(--bg); border:1px solid var(--line); border-radius:var(--radius); padding:14px 10px; }

  /* ---- Presets ---- */
  .pcat{ margin-bottom:20px; }
  .pcat h3{ font-size:13px; color:var(--chalk); margin-bottom:9px; border-left:3px solid var(--steel); padding-left:8px; }
  .pcat.legs h3{ border-left-color:var(--olive); }
  .prow{ display:flex; gap:6px; margin-bottom:6px; align-items:center; }

  /* ---- Today: week bar (replaces day streak) ---- */
  .weekbar{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:14px; }
  .weekbar .txt{ font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-dim); }
  .weekbar .txt b{ color:var(--chalk); font-weight:500; }
  .pips{ display:flex; gap:5px; flex:0 0 auto; }
  .pip{ width:22px; height:4px; border-radius:2px; background:var(--line); }
  .pip.done{ background:var(--rust); }

  /* ---- Today: hero ---- */
  .hero{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin-bottom:14px; }
  .hero[data-cat=upper]{ border-left:3px solid var(--steel); }
  .hero[data-cat=legs]{ border-left:3px solid var(--olive); }
  .hero[data-cat=free]{ border-left:3px solid var(--rust); }
  .hero .eyebrow{ font-family:'Roboto Condensed',sans-serif; font-size:10px; letter-spacing:0.13em; text-transform:uppercase; color:var(--chalk-faint); margin-bottom:5px; }
  .hero h3{ font-family:'Oswald',sans-serif; font-size:26px; letter-spacing:0.02em; margin:0 0 3px; }
  .hero .meta{ font-size:12px; color:var(--chalk-dim); margin-bottom:14px; }
  .hero .acts{ display:flex; gap:8px; }
  .hero .acts .btn.primary{ flex:1; }

  /* ---- Today: ledger lines (last -> target) ---- */
  .lg-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
  .lg-head span{ font-family:'Roboto Condensed',sans-serif; font-size:10px; letter-spacing:0.13em; text-transform:uppercase; color:var(--chalk-faint); }
  .ledger{ border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; margin-bottom:14px; }
  .lline{ padding:11px 12px; border-bottom:1px solid var(--line-soft); background:var(--surface); }
  .lline:last-child{ border-bottom:none; }
  .lline .nm{ font-size:13px; font-weight:600; color:var(--chalk); margin-bottom:7px; }
  .lcols{ display:flex; gap:10px; }
  .lcol{ flex:1; min-width:0; }
  .lcol .k{ font-family:'Roboto Condensed',sans-serif; font-size:9px; letter-spacing:0.11em; color:var(--chalk-faint); margin-bottom:2px; }
  .lcol .v{ font-family:'Roboto Condensed',sans-serif; font-size:13px; color:var(--chalk-dim); }
  .lcol.tg{ border-left:1px solid var(--line); padding-left:10px; }
  .lcol.tg .k{ color:var(--rust); }
  .lcol.tg .v{ color:var(--chalk); }
  .lcol.tg .v b{ font-family:'Oswald',sans-serif; font-size:16px; font-weight:600; }

  /* ---- carried-forward note ---- */
  .carry{ display:flex; gap:7px; margin-top:9px; padding-top:8px; border-top:1px dashed var(--line);
    font-size:11.5px; color:var(--chalk-dim); line-height:1.45; font-style:italic; }
  .carry svg{ width:12px; height:12px; flex:0 0 12px; margin-top:2px; stroke:var(--rust); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .carry .flag{ color:var(--rust); font-style:normal; font-weight:600; }

  /* ---- 14-day strip ---- */
  .strip{ display:flex; gap:4px; margin-bottom:6px; }
  .strip i{ flex:1; aspect-ratio:1; border-radius:2px; background:var(--surface); border:1px solid var(--line-soft); }
  .strip i.upper{ background:var(--steel); border-color:var(--steel); }
  .strip i.legs{ background:var(--olive); border-color:var(--olive); }
  .strip i.free{ background:var(--rust); border-color:var(--rust); }
  .strip i.today{ border:1px solid var(--chalk); }
  .strip-cap{ display:flex; justify-content:space-between; font-family:'Roboto Condensed',sans-serif; font-size:9.5px; color:var(--chalk-faint); }

  /* ---- target banner (in session) ---- */
  .target-banner{ display:flex; align-items:center; justify-content:space-between; gap:8px;
    background:var(--rust-dim); border:1px solid var(--rust); border-radius:var(--radius);
    padding:9px 11px; margin-bottom:10px; }
  .target-banner .k{ font-family:'Roboto Condensed',sans-serif; font-size:9px; letter-spacing:0.12em; color:#F0C4A8; margin-bottom:1px; }
  .target-banner .v{ font-family:'Oswald',sans-serif; font-size:18px; font-weight:600; color:#fff; }
  .target-banner .why{ text-align:right; font-size:10px; color:#E3BDA3; line-height:1.35; max-width:145px; }

  /* ---- Load (volume per muscle) ---- */
  .load-row{ display:flex; align-items:center; gap:9px; padding:7px 0; border-bottom:1px solid var(--line-soft); }
  .load-row:last-child{ border-bottom:none; }
  .load-row .lm{ flex:0 0 78px; font-size:12px; color:var(--chalk); }
  .load-bar{ flex:1; height:6px; background:var(--surface-2); border-radius:3px; overflow:hidden; display:flex; }
  .load-bar i{ height:100%; display:block; }
  .load-bar i.have{ background:var(--steel); }
  .load-bar i.add{ background:var(--rust); opacity:.75; }
  .load-row .ln{ flex:0 0 84px; text-align:right; font-family:'Roboto Condensed',sans-serif; font-size:11px; color:var(--chalk-dim); font-variant-numeric:tabular-nums; }
  .load-row .ln b{ color:var(--rust); font-weight:600; }
  .load-row .ld{ flex:0 0 42px; text-align:right; font-family:'Roboto Condensed',sans-serif; font-size:10px; color:var(--chalk-faint); }
  .load-key{ display:flex; gap:14px; margin-top:10px; font-size:10px; color:var(--chalk-faint); }
  .load-key span{ display:inline-flex; align-items:center; gap:5px; }
  .load-key i{ width:9px; height:9px; border-radius:2px; }

  /* ---- Fatigue banner ---- */
  .fatigue{ display:flex; gap:9px; background:var(--surface); border:1px solid var(--line);
    border-left:3px solid var(--rust); border-radius:var(--radius); padding:12px; margin-bottom:14px; }
  .fatigue svg{ width:15px; height:15px; flex:0 0 15px; margin-top:1px; stroke:var(--rust); fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .fatigue .ft{ font-size:12.5px; line-height:1.5; color:var(--chalk-dim); }
  .fatigue .ft b{ color:var(--chalk); font-weight:600; }
  .fatigue .ft em{ color:var(--chalk-faint); font-style:normal; display:block; margin-top:3px; font-size:11.5px; }

  .stall-badge{ display:inline-block; font-family:'Oswald',sans-serif; font-size:9px; letter-spacing:0.07em;
    background:var(--surface-2); border:1px solid var(--rust); color:var(--rust); padding:1px 5px; border-radius:2px; margin-left:6px; vertical-align:middle; }

  /* ---- RIR chips ---- */
  .rir{ margin:10px 0 8px; }
  .rir .rl{ font-size:9px; text-transform:uppercase; letter-spacing:0.07em; color:var(--chalk-faint); margin-bottom:5px; }
  .rir .chips{ display:flex; gap:6px; }
  .rir .chips button{ flex:1; padding:8px 0; border:1px solid var(--line); background:var(--surface-2);
    color:var(--chalk-dim); border-radius:var(--radius); font-family:'Roboto Condensed',sans-serif; font-size:13px;
    cursor:pointer; -webkit-tap-highlight-color:transparent; }
  .rir .chips button.on{ background:var(--rust-dim); border-color:var(--rust); color:var(--chalk); }

  .toast{ position:fixed; left:50%; transform:translateX(-50%); bottom:calc(78px + env(safe-area-inset-bottom,0px));
    background:var(--chalk); color:var(--bg); font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:0.05em;
    font-size:12px; padding:10px 18px; border-radius:var(--radius); z-index:80; opacity:0; transition:opacity .25s; pointer-events:none; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
(function(){
  "use strict";

  var DAY_TYPES = {
    upperA: { label:"Upper A", cat:"upper", badge:"A" },
    upperB: { label:"Upper B", cat:"upper", badge:"B" },
    legsA:  { label:"Legs + Arms A", cat:"legs", badge:"A" },
    legsB:  { label:"Legs + Arms B", cat:"legs", badge:"B" },
    free:   { label:"Freeform", cat:"free", badge:"F" }
  };

  var DEFAULT_PRESETS = {
    upperA: ["Lat pull down","Incline DB chest press","Barbell row","Military press","Incline DB fly","Lateral raises","Face pulls"],
    upperB: ["Weighted pull ups","Smith machine incline chest press","Sitting machine row","Seated DB shoulder press","Vertical chest press","Lateral raises","Seated rear delt DB flys"],
    legsA:  ["Hack Squat","Barbell RDL","DB Romanian Split Squats","Hamstring curl","Leg curl","Standing calf","Cable overhead tricep extension","Cable bicep curl","Cable tricep extensions","Pronated bicep curl"],
    legsB:  ["Leg press","Barbell RDL","Walking DB lunges","Hamstring curl","Leg curl","Standing calf","Seated DB overhead tricep extension","Bicep curl DB","Dips","Hammer curl"]
  };

  var DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  var KG_LBS = 2.20462;
  var REST_DEFAULT = 120;
  var BUILD = '6 · load & fatigue';

  /* ---- MUSCLE TAGGING ----
     Primary muscles count a full set; secondary count half.
     Everything here is editable in Settings — these are just sensible defaults. */
  var MUSCLES = {
    chest:'Chest', back:'Back', frontDelts:'Front delts', sideDelts:'Side delts', rearDelts:'Rear delts',
    biceps:'Biceps', triceps:'Triceps', quads:'Quads', hamstrings:'Hamstrings', glutes:'Glutes', calves:'Calves'
  };
  var MUSCLE_ORDER = ['chest','back','frontDelts','sideDelts','rearDelts','biceps','triceps','quads','hamstrings','glutes','calves'];

  var DEFAULT_TAGS = {
    // Upper A
    'Lat pull down':                    { p:['back'], s:['biceps'] },
    'Incline DB chest press':           { p:['chest'], s:['frontDelts','triceps'] },
    'Barbell row':                      { p:['back'], s:['biceps','rearDelts'] },
    'Military press':                   { p:['frontDelts'], s:['triceps'] },
    'Incline DB fly':                   { p:['chest'], s:[] },
    'Lateral raises':                   { p:['sideDelts'], s:[] },
    'Face pulls':                       { p:['rearDelts'], s:[] },
    // Upper B
    'Weighted pull ups':                { p:['back'], s:['biceps'] },
    'Smith machine incline chest press':{ p:['chest'], s:['frontDelts','triceps'] },
    'Sitting machine row':              { p:['back'], s:['biceps','rearDelts'] },
    'Seated DB shoulder press':         { p:['frontDelts'], s:['triceps'] },
    'Vertical chest press':             { p:['chest'], s:['triceps'] },
    'Seated rear delt DB flys':         { p:['rearDelts'], s:[] },
    // Legs + Arms A
    'Hack Squat':                       { p:['quads'], s:['glutes'] },
    'Barbell RDL':                      { p:['hamstrings'], s:['glutes'] },
    'DB Romanian Split Squats':         { p:['quads','glutes'], s:[] },
    'Hamstring curl':                   { p:['hamstrings'], s:[] },
    'Leg curl':                         { p:['hamstrings'], s:[] },
    'Standing calf':                    { p:['calves'], s:[] },
    'Cable overhead tricep extension':  { p:['triceps'], s:[] },
    'Cable bicep curl':                 { p:['biceps'], s:[] },
    'Cable tricep extensions':          { p:['triceps'], s:[] },
    'Pronated bicep curl':              { p:['biceps'], s:[] },
    // Legs + Arms B
    'Leg press':                        { p:['quads'], s:['glutes'] },
    'Walking DB lunges':                { p:['quads','glutes'], s:[] },
    'Seated DB overhead tricep extension':{ p:['triceps'], s:[] },
    'Bicep curl DB':                    { p:['biceps'], s:[] },
    'Dips':                             { p:['triceps'], s:['chest'] },
    'Hammer curl':                      { p:['biceps'], s:[] }
  };

  // guess tags for a lift the app has never seen (custom / freeform)
  function inferTags(name){
    var n = name.toLowerCase();
    var has = function(){ for(var i=0;i<arguments.length;i++){ if(n.indexOf(arguments[i])>-1) return true; } return false; };
    if(has('calf','calves'))                       return { p:['calves'], s:[] };
    if(has('lateral raise','side raise'))          return { p:['sideDelts'], s:[] };
    if(has('rear delt','face pull','reverse fly')) return { p:['rearDelts'], s:[] };
    if(has('curl') && !has('leg','hamstring'))     return { p:['biceps'], s:[] };
    if(has('tricep','pushdown','skull','dip'))     return { p:['triceps'], s:[] };
    if(has('leg curl','hamstring','rdl','deadlift'))return { p:['hamstrings'], s:['glutes'] };
    if(has('squat','leg press','lunge','leg extension')) return { p:['quads'], s:['glutes'] };
    if(has('row','pull up','pull-up','pulldown','pull down','chin')) return { p:['back'], s:['biceps'] };
    if(has('shoulder press','overhead press','military')) return { p:['frontDelts'], s:['triceps'] };
    if(has('bench','chest','fly','press'))         return { p:['chest'], s:['triceps'] };
    if(has('glute','hip thrust'))                  return { p:['glutes'], s:[] };
    return { p:[], s:[] };
  }
  function tagsFor(name){
    if(state.tags && state.tags[name]) return state.tags[name];
    if(DEFAULT_TAGS[name]) return DEFAULT_TAGS[name];
    return inferTags(name);
  }

  var ICONS = {
    today:'<svg viewBox="0 0 24 24"><path d="M4 5h16v15H4z"/><path d="M8 3v4M16 3v4M9 13.5h6M12 10.5v6"/></svg>',
    calendar:'<svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>',
    log:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v8M8 12h8"/></svg>',
    progress:'<svg viewBox="0 0 24 24"><path d="M3 20h18"/><path d="M4 15l5-5 4 4 6-7"/><path d="M19 7h-4M19 7v4"/></svg>',
    history:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
    gear:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.8-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.8 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H9a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8V9a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>',
    check:'<svg viewBox="0 0 24 24"><path d="M4 12.5l5 5L20 6.5"/></svg>',
    chev:'<svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>',
    pencil:'<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
    trash:'<svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>'
  };

  var state = {
    tab:'today',
    picking:false,
    presets:null, workouts:null, unit:'kg', tags:null,
    calMonth:new Date().getMonth(), calYear:new Date().getFullYear(),
    selectedDate:null,
    draft:null,            // {id?, date, dayType, exercises:[{name,sets:[{weight,reps,note,done}]}], editingId}
    openEx:0,
    rest:{ endsAt:0, dur:REST_DEFAULT },
    progressExercise:null,
    loaded:false
  };
  var restTick = null;

  /* ---- utils ---- */
  function pad(n){ return n<10?'0'+n:''+n; }
  function todayStr(){ var d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
  function r1(n){ return Math.round(n*10)/10; }
  function toDisp(kg){ return state.unit==='lbs'? r1(kg*KG_LBS) : r1(kg); }
  function toKg(v){ return state.unit==='lbs'? v/KG_LBS : v; }
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
  function toast(msg){
    var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
    clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },1600);
  }

  /* ---- storage ---- */
  function load(){
    try{ var p=localStorage.getItem('ltp:presets'); state.presets = p?JSON.parse(p):JSON.parse(JSON.stringify(DEFAULT_PRESETS)); }
    catch(e){ state.presets=JSON.parse(JSON.stringify(DEFAULT_PRESETS)); }
    try{ var w=localStorage.getItem('ltp:workouts'); state.workouts = w?JSON.parse(w):[]; }
    catch(e){ state.workouts=[]; }
    try{ var u=localStorage.getItem('ltp:unit'); state.unit = (u==='kg'||u==='lbs')?u:'kg'; }catch(e){}
    try{ var d=localStorage.getItem('ltp:draft'); state.draft = d?JSON.parse(d):null; }catch(e){ state.draft=null; }
    try{ var tg=localStorage.getItem('ltp:tags'); state.tags = tg?JSON.parse(tg):{}; }catch(e){ state.tags={}; }
    state.loaded=true; render();
  }
  function save(key,val){ try{ localStorage.setItem('ltp:'+key, typeof val==='string'?val:JSON.stringify(val)); }
    catch(e){ toast('Storage failed'); } }
  function saveWorkouts(){ save('workouts', state.workouts); }
  function saveDraft(){ if(state.draft) save('draft', state.draft); else { try{ localStorage.removeItem('ltp:draft'); }catch(e){} } }

  /* ---- data helpers ---- */
  function onDate(d){ return state.workouts.filter(function(w){ return w.date===d; }); }
  function allExNames(){
    var s={};
    Object.keys(state.presets).forEach(function(k){ state.presets[k].forEach(function(n){ s[n]=1; }); });
    state.workouts.forEach(function(w){ w.exercises.forEach(function(e){ s[e.name]=1; }); });
    return Object.keys(s).sort(function(a,b){ return a.localeCompare(b); });
  }
  // most recent PAST session containing this exercise (excludes the session being edited)
  function lastFor(name){
    var editId = state.draft && state.draft.editingId;
    var cands = state.workouts.filter(function(w){
      if(editId && w.id===editId) return false;
      return w.exercises.some(function(e){ return e.name===name && e.sets.length; });
    }).sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(!cands.length) return null;
    var w = cands[0];
    var ex = w.exercises.filter(function(e){ return e.name===name; })[0];
    return { date:w.date, sets:ex.sets };
  }
  function lastSummary(name){
    var l = lastFor(name);
    if(!l) return null;
    return l.sets.map(function(s){ return toDisp(s.weight||0)+'×'+(s.reps||0); }).join(', ');
  }
  function bestKg(name){
    var best=0;
    state.workouts.forEach(function(w){
      if(state.draft && state.draft.editingId===w.id) return;
      w.exercises.forEach(function(e){
        if(e.name!==name) return;
        e.sets.forEach(function(s){ var v=parseFloat(s.weight)||0; if(v>best) best=v; });
      });
    });
    return best;
  }
  function history(name){
    var pts=[];
    state.workouts.forEach(function(w){
      w.exercises.forEach(function(e){
        if(e.name!==name || !e.sets.length) return;
        var b=null;
        e.sets.forEach(function(s){
          var wt=parseFloat(s.weight)||0, rp=parseInt(s.reps)||0;
          if(!b || wt>b.w || (wt===b.w && rp>b.r)) b={w:wt,r:rp,note:s.note||''};
        });
        if(b) pts.push({date:w.date, weight:b.w, reps:b.r, note:b.note});
      });
    });
    return pts.sort(function(a,b){ return a.date.localeCompare(b.date); });
  }
  function streak(){
    var days={}; state.workouts.forEach(function(w){ days[w.date]=1; });
    var n=0, d=new Date();
    // allow today to be un-trained without breaking the streak
    if(!days[todayStr()]) d.setDate(d.getDate()-1);
    for(;;){
      var k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      if(days[k]){ n++; d.setDate(d.getDate()-1); } else break;
    }
    return n;
  }
  function monthCount(){
    var pre=state.calYear+'-'+pad(state.calMonth+1);
    return state.workouts.filter(function(w){ return w.date.indexOf(pre)===0; }).length;
  }

  /* ---- rotation / week ---- */
  var ROTATION = ['upperA','legsA','upperB','legsB'];
  var WEEK_TARGET = 4;

  // next day type = the one after the most recent session that was part of the rotation
  function nextDayType(){
    var past = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    for(var i=0;i<past.length;i++){
      var ix = ROTATION.indexOf(past[i].dayType);
      if(ix>-1) return ROTATION[(ix+1)%ROTATION.length];
    }
    return ROTATION[0];
  }
  function daysSinceLast(dayType){
    var past = state.workouts.filter(function(w){ return w.dayType===dayType; })
      .sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(!past.length) return null;
    var then = new Date(past[0].date+'T00:00:00');
    var now  = new Date(todayStr()+'T00:00:00');
    return Math.round((now-then)/86400000);
  }
  // Monday-start week
  function weekDates(){
    var now=new Date(); var dow=(now.getDay()+6)%7;
    var mon=new Date(now); mon.setDate(now.getDate()-dow);
    var out=[];
    for(var i=0;i<7;i++){ var d=new Date(mon); d.setDate(mon.getDate()+i);
      out.push(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())); }
    return out;
  }
  function weekCount(){
    var wk=weekDates(); var seen={};
    state.workouts.forEach(function(w){ if(wk.indexOf(w.date)>-1) seen[w.date]=1; });
    return Object.keys(seen).length;
  }
  // last 14 days, oldest first
  function lastDays(n){
    var out=[], now=new Date();
    for(var i=n-1;i>=0;i--){
      var d=new Date(now); d.setDate(now.getDate()-i);
      var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
      var ss=onDate(ds);
      out.push({ date:ds, cat: ss.length ? ((DAY_TYPES[ss[0].dayType]||DAY_TYPES.free).cat) : null });
    }
    return out;
  }

  /* ---- TARGET ENGINE ----
     Double progression, 6–10 reps.
     Judged on the TOP SET — the heaviest weight you handled, and the best reps
     you got at that weight (set order doesn't matter; a 10 is a 10).
     Top set reaches 10 → add 2.5 kg next time, drop back to 6 and climb again.
     Otherwise hold the weight and chase one more rep (cap 10).                   */
  var REP_LOW = 6, REP_HIGH = 10, STEP_KG = 2.5;

  // heaviest set; ties broken by the most reps at that weight
  function topSet(sets){
    var best=null;
    (sets||[]).forEach(function(s){
      var w=parseFloat(s.weight)||0, r=parseInt(s.reps)||0;
      if(!w && !r) return;
      if(!best || w>best.w || (w===best.w && r>best.r)) best={ w:w, r:r };
    });
    return best;
  }

  function targetFor(name){
    var l = lastFor(name);
    if(!l || !l.sets.length) return null;
    var top = topSet(l.sets);
    if(!top) return null;

    if(top.r >= REP_HIGH){
      return { kg: top.w + STEP_KG, reps: REP_LOW, moved:true, sets:l.sets.length||2,
               why:'You hit '+top.r+' at '+toDisp(top.w)+'. Move up.' };
    }
    return { kg: top.w, reps: Math.min(REP_HIGH, Math.max(REP_LOW, top.r+1)), moved:false, sets:l.sets.length||2,
             why:'Hold the weight, chase one more rep.' };
  }

  // the most recent note you left on this lift, plus how many times you've noted it
  function carriedNote(name){
    var editId = state.draft && state.draft.editingId;
    var notes = [];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        if(editId && w.id===editId) return;
        w.exercises.forEach(function(e){
          if(e.name!==name) return;
          var n = e.sets.map(function(s){ return (s.note||'').trim(); }).filter(Boolean)[0];
          if(n) notes.push(n);
        });
      });
    if(!notes.length) return null;
    return { text: notes[0], count: notes.length };
  }
  function carryHtml(name){
    var c = carriedNote(name);
    if(!c) return '';
    var warn = '<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>';
    var flag = c.count>=3 ? '<span class="flag">Noted '+c.count+'×:</span> ' : '';
    return '<div class="carry">'+warn+'<div>'+flag+esc(c.text)+'</div></div>';
  }

  /* ---- LOAD: sets per muscle over a rolling window ----
     Primary muscle = 1 set. Secondary = 0.5. Standard-ish convention, not gospel. */
  function daysAgo(n){
    var d=new Date(); d.setDate(d.getDate()-n);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }
  function volumeWindow(days){
    var since = daysAgo(days-1);
    var vol = {};
    MUSCLE_ORDER.forEach(function(m){ vol[m] = { sets:0, last:null }; });
    state.workouts.forEach(function(w){
      if(w.date < since) return;
      w.exercises.forEach(function(e){
        var n = e.sets.length;
        if(!n) return;
        var t = tagsFor(e.name);
        (t.p||[]).forEach(function(m){
          if(!vol[m]) return;
          vol[m].sets += n;
          if(!vol[m].last || w.date > vol[m].last) vol[m].last = w.date;
        });
        (t.s||[]).forEach(function(m){
          if(!vol[m]) return;
          vol[m].sets += n*0.5;
          if(!vol[m].last || w.date > vol[m].last) vol[m].last = w.date;
        });
      });
    });
    return vol;
  }
  // what today's card would add on top (assumes 2 working sets per lift)
  function plannedAdds(dayType){
    var add = {};
    (state.presets[dayType]||[]).forEach(function(n){
      var t = tagsFor(n);
      (t.p||[]).forEach(function(m){ add[m]=(add[m]||0)+2; });
      (t.s||[]).forEach(function(m){ add[m]=(add[m]||0)+1; });
    });
    return add;
  }
  function daysBetween(a,b){
    return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00'))/86400000);
  }

  /* ---- FATIGUE: did lifts go backwards last session? ----
     Compares each lift in your most recent session against the previous time
     you did it. Nothing about sleep or soreness — just what the bar did. */
  function lastSessionReview(){
    var sorted = state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); });
    if(sorted.length < 2) return null;
    var recent = sorted[0];
    var down = [], up = 0;

    recent.exercises.forEach(function(e){
      var now = topSet(e.sets);
      if(!now) return;
      // find the previous session (before this one) that had this lift
      var prevW = null;
      for(var i=1;i<sorted.length;i++){
        if(sorted[i].exercises.some(function(x){ return x.name===e.name && x.sets.length; })){ prevW = sorted[i]; break; }
      }
      if(!prevW) return;
      var prevEx = prevW.exercises.filter(function(x){ return x.name===e.name; })[0];
      var was = topSet(prevEx.sets);
      if(!was) return;
      if(now.w < was.w || (now.w === was.w && now.r < was.r)) down.push(e.name);
      else if(now.w > was.w || (now.w === was.w && now.r > was.r)) up++;
    });

    var rirs = recent.exercises.map(function(e){ return e.rir; })
      .filter(function(v){ return v!==undefined && v!==null && v!==''; })
      .map(Number);
    var avgRir = rirs.length ? rirs.reduce(function(a,b){return a+b;},0)/rirs.length : null;

    return {
      date: recent.date,
      dayType: recent.dayType,
      ago: daysBetween(recent.date, todayStr()),
      down: down, up: up,
      total: recent.exercises.length,
      avgRir: avgRir
    };
  }

  /* ---- STALL: same top set, three sessions running ---- */
  function stalled(name){
    var tops = [];
    state.workouts.slice().sort(function(a,b){ return b.date.localeCompare(a.date); })
      .forEach(function(w){
        if(tops.length>=3) return;
        var e = w.exercises.filter(function(x){ return x.name===name && x.sets.length; })[0];
        if(e){ var t=topSet(e.sets); if(t) tops.push(t); }
      });
    if(tops.length<3) return false;
    return tops.every(function(t){ return t.w===tops[0].w && t.r===tops[0].r; });
  }

  /* ---- draft ---- */
  function newSet(prev){
    return { weight: prev?prev.weight:'', reps: prev?prev.reps:'', note:'', done:false };
  }
  // pre-fill the weight the app is telling you to lift; leave reps for you to earn
  function seedSets(name){
    var t = targetFor(name);
    if(t){
      var n = Math.max(1, t.sets);
      var out=[];
      for(var i=0;i<n;i++) out.push({ weight:String(toDisp(t.kg)), reps:'', note:'', done:false });
      return out;
    }
    return [ newSet(null), newSet(null) ];
  }
  function startDraft(dayType){
    var names = dayType==='free' ? [] : (state.presets[dayType]||[]);
    state.draft = {
      date: state.selectedDate || todayStr(),
      dayType: dayType,
      editingId: null,
      exercises: names.map(function(n){ return { name:n, sets:seedSets(n) }; })
    };
    state.openEx = 0;
    state.picking = false;
    state.tab = 'today';
    saveDraft(); render();
  }
  function editSession(id){
    var w = state.workouts.filter(function(x){ return x.id===id; })[0];
    if(!w) return;
    if(state.draft && !state.draft.editingId && !confirm('You have a session in progress. Editing will discard it. Continue?')) return;
    state.draft = {
      date:w.date, dayType:w.dayType, editingId:id,
      exercises: w.exercises.map(function(e){
        return { name:e.name, rir:e.rir, sets:e.sets.map(function(s){
          return { weight:String(toDisp(s.weight||0)), reps:String(s.reps||''), note:s.note||'', done:true };
        })};
      })
    };
    state.openEx=0; state.picking=false; state.tab='today'; saveDraft(); render(); window.scrollTo(0,0);
  }
  function exDone(ex){ return ex.sets.length>0 && ex.sets.every(function(s){ return s.done; }); }
  function draftDoneCount(){ return state.draft ? state.draft.exercises.filter(exDone).length : 0; }

  /* ---- rest timer ---- */
  function startRest(){
    state.rest.endsAt = Date.now() + state.rest.dur*1000;
    tickRest();
    if(restTick) clearInterval(restTick);
    restTick = setInterval(tickRest, 500);
  }
  function stopRest(){
    state.rest.endsAt = 0;
    if(restTick){ clearInterval(restTick); restTick=null; }
    var el=document.getElementById('rest-bar'); if(el) el.remove();
  }
  function restLeft(){ return Math.max(0, Math.ceil((state.rest.endsAt - Date.now())/1000)); }
  function fmtTime(s){ return Math.floor(s/60)+':'+pad(s%60); }
  function tickRest(){
    var left = restLeft();
    var bar = document.getElementById('rest-bar');
    if(!state.rest.endsAt){ if(bar) bar.remove(); return; }
    if(!bar){
      bar = document.createElement('div');
      bar.id='rest-bar'; bar.className='rest-bar';
      bar.innerHTML = '<div class="rt-time" id="rt-time"></div><div class="rt-lbl">Rest</div>'
        + '<button class="btn small" id="rt-plus">+30s</button>'
        + '<button class="btn small ghost" id="rt-skip">Skip</button>';
      document.body.appendChild(bar);
      bar.querySelector('#rt-plus').addEventListener('click', function(){ state.rest.endsAt += 30000; tickRest(); });
      bar.querySelector('#rt-skip').addEventListener('click', stopRest);
    }
    var t = document.getElementById('rt-time');
    if(t) t.textContent = fmtTime(left);
    if(left<=0){
      stopRest();
      if(navigator.vibrate) navigator.vibrate([200,80,200]);
      toast('Rest done');
    }
  }

  /* ---- render ---- */
  function render(){
    var app=document.getElementById('app');
    if(!state.loaded){ app.innerHTML='<div class="empty-state">Loading…</div>'; return; }
    var h = masthead();
    if(state.tab==='today') h+=vToday();
    else if(state.tab==='calendar') h+=vCalendar();
    else if(state.tab==='progress') h+=vProgress();
    else if(state.tab==='history') h+=vHistory();
    else if(state.tab==='settings') h+=vPresets();
    h += nav();
    app.innerHTML=h;
    wire();
  }

  function masthead(){
    // unit toggle lives in settings now — it's a set-once preference, not prime real estate
    return '<div class="masthead"><h1>LEDGER<span>.</span></h1><div class="masthead-actions">'
      + '<button class="gear-btn'+(state.tab==='settings'?' active':'')+'" data-tab="settings" aria-label="Settings">'+ICONS.gear+'</button>'
      + '</div></div>';
  }

  function nav(){
    var tabs=[['today','Today'],['calendar','Calendar'],['progress','Progress'],['history','History']];
    var live = state.draft && !state.draft.editingId;
    var h='<nav class="bottom-nav">';
    tabs.forEach(function(t){
      h+='<button data-tab="'+t[0]+'" class="'+(state.tab===t[0]?'active':'')+'" aria-label="'+t[1]+'" style="position:relative;">'
        + ICONS[t[0]] + '<span>'+t[1]+'</span>'
        + (t[0]==='today' && live ? '<span class="dot"></span>' : '')
        + '</button>';
    });
    return h+'</nav>';
  }

  function resumeBanner(){
    if(!state.draft || state.draft.editingId || state.tab==='today') return '';
    var dt=DAY_TYPES[state.draft.dayType];
    return '<div class="resume"><div class="txt"><strong>Session in progress</strong>'
      + '<span>'+(dt?dt.label:'Freeform')+' · '+draftDoneCount()+'/'+state.draft.exercises.length+' done</span></div>'
      + '<button class="btn small primary" data-tab="today">Resume</button></div>';
  }

  /* ---- Today (home) ---- */
  function vToday(){
    // a live session takes over this screen — Today is "what am I doing right now"
    if(state.draft) return vLog();
    if(state.picking) return vDayTypePicker();

    var k = nextDayType();
    var dt = DAY_TYPES[k];
    var names = state.presets[k] || [];
    var done = weekCount();
    var since = daysSinceLast(k);

    var h = '';

    // week, not streak — rest days shouldn't punish you
    h += '<div class="weekbar"><div class="txt"><b>'+done+'</b> of '+WEEK_TARGET+' sessions this week</div><div class="pips">';
    for(var i=0;i<WEEK_TARGET;i++) h += '<i class="pip'+(i<done?' done':'')+'"></i>';
    h += '</div></div>';

    // What the bar did last time — reported, not prescribed.
    var rv = lastSessionReview();
    if(rv && rv.down.length >= 2){
      var warn='<svg viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>';
      var grind = (rv.avgRir!==null && rv.avgRir<=1) ? ' You were averaging '+r1(rv.avgRir)+' reps in reserve.' : '';
      h += '<div class="fatigue">'+warn+'<div class="ft">'
         + '<b>'+rv.down.length+' lifts went backwards</b> last session ('+(rv.ago===0?'today':rv.ago+'d ago')+') — '
         + rv.down.slice(0,3).map(esc).join(', ') + (rv.down.length>3?' +'+(rv.down.length-3)+' more':'') + '.'
         + grind
         + '<em>Going backwards on several lifts at once is usually recovery, not effort. Your call — but cutting a set or the last exercise today is a reasonable response.</em>'
         + '</div></div>';
    }

    // the bar, not the attendance record
    h += '<div class="hero" data-cat="'+dt.cat+'">'
       + '<div class="eyebrow">Next in rotation</div>'
       + '<h3>'+dt.label+'</h3>'
       + '<div class="meta">'
       +   (since===null ? 'First time logging this day' :
            since===0 ? 'You already did this today' :
            'Last '+dt.label+' was '+since+' day'+(since===1?'':'s')+' ago')
       +   ' · '+names.length+' exercise'+(names.length===1?'':'s')
       + '</div>'
       + '<div class="acts">'
       +   '<button class="btn primary" data-start="'+k+'">Start session</button>'
       +   '<button class="btn ghost" id="pick-other">Pick another</button>'
       + '</div></div>';

    // THE LEDGER — last vs target, with your own notes carried forward
    if(names.length){
      h += '<div class="lg-head"><span>Today\'s card</span><span>Last → target</span></div><div class="ledger">';
      names.forEach(function(n){
        var last = lastSummary(n);
        var t = targetFor(n);
        var st = stalled(n) ? '<span class="stall-badge">Stalled 3×</span>' : '';
        h += '<div class="lline"><div class="nm">'+esc(n)+st+'</div><div class="lcols">'
           + '<div class="lcol"><div class="k">LAST</div><div class="v">'+(last? esc(last) : '—')+'</div></div>'
           + '<div class="lcol tg"><div class="k">TARGET</div><div class="v">'
           +   (t ? '<b>'+toDisp(t.kg)+'</b> '+state.unit+' × '+t.reps : 'Set your baseline')
           + '</div></div></div>'
           + carryHtml(n)
           + '</div>';
      });
      h += '</div>';
    }

    // LOAD — sets per muscle over 7 days, and what today piles on top.
    // Shown, not judged: no thresholds, no "you're overtraining".
    var vol = volumeWindow(7);
    var adds = plannedAdds(k);
    var maxSets = 1;
    MUSCLE_ORDER.forEach(function(m){ maxSets = Math.max(maxSets, vol[m].sets + (adds[m]||0)); });
    var anyVol = MUSCLE_ORDER.some(function(m){ return vol[m].sets>0; });

    if(anyVol){
      h += '<div class="lg-head"><span>Load · last 7 days</span><span>+ today</span></div>';
      h += '<div class="card" style="padding:12px 14px;">';
      MUSCLE_ORDER.forEach(function(m){
        var have = vol[m].sets, add = adds[m]||0;
        if(!have && !add) return;
        var hp = have/maxSets*100, ap = add/maxSets*100;
        var last = vol[m].last ? daysBetween(vol[m].last, todayStr()) : null;
        h += '<div class="load-row">'
           + '<div class="lm">'+MUSCLES[m]+'</div>'
           + '<div class="load-bar"><i class="have" style="width:'+hp+'%"></i><i class="add" style="width:'+ap+'%"></i></div>'
           + '<div class="ln">'+r1(have)+(add?' <b>+'+add+'</b>':'')+' sets</div>'
           + '<div class="ld">'+(last===null?'—':last===0?'today':last+'d')+'</div>'
           + '</div>';
      });
      h += '<div class="load-key">'
         + '<span><i style="background:var(--steel)"></i>Done this week</span>'
         + '<span><i style="background:var(--rust);opacity:.75"></i>Today adds</span>'
         + '<span>Secondary work counts as half a set</span>'
         + '</div>';
      h += '</div>';
    }

    // calendar shrunk to a strip; the full month has its own tab
    var days = lastDays(14);
    h += '<div class="lg-head"><span>Last 14 days</span></div><div class="strip">';
    days.forEach(function(d,ix){
      h += '<i class="'+(d.cat||'')+(ix===days.length-1?' today':'')+'"></i>';
    });
    h += '</div><div class="strip-cap"><span>'+days[0].date.slice(5)+'</span><span>Today</span></div>';

    return h;
  }

  /* ---- Calendar ---- */
  function vCalendar(){
    var y=state.calYear, m=state.calMonth;
    var off=(new Date(y,m,1).getDay()+6)%7;
    var dim=new Date(y,m+1,0).getDate();
    var td=todayStr();

    var h = resumeBanner();
    h += '<div class="stat-row">'
      + '<div class="stat"><div class="val">'+weekCount()+'/'+WEEK_TARGET+'</div><div class="lbl">This week</div></div>'
      + '<div class="stat"><div class="val">'+monthCount()+'</div><div class="lbl">This month</div></div>'
      + '<div class="stat"><div class="val">'+state.workouts.length+'</div><div class="lbl">Total</div></div>'
      + '</div>';

    h += '<div class="card"><div class="cal-header">'
      + '<button class="btn small" id="cal-prev">&larr;</button>'
      + '<h2>'+MONTHS[m]+' '+y+'</h2>'
      + '<button class="btn small" id="cal-next">&rarr;</button></div><div class="cal-grid">';
    DOW.forEach(function(d){ h+='<div class="cal-dow">'+d+'</div>'; });
    for(var i=0;i<off;i++) h+='<div class="cal-cell empty"></div>';
    for(var d=1; d<=dim; d++){
      var ds=y+'-'+pad(m+1)+'-'+pad(d);
      var ss=onDate(ds);
      var cls='cal-cell'+(ds===td?' today':'')+(ds===state.selectedDate?' selected':'');
      h+='<div class="'+cls+'" data-date="'+ds+'"><span class="num">'+d+'</span>';
      if(ss.length){
        var dt=DAY_TYPES[ss[0].dayType]||DAY_TYPES.free;
        h+='<div class="plate '+dt.cat+'">'+dt.badge+'</div>';
      }
      h+='</div>';
    }
    h+='</div><div class="cal-legend">'
      + '<span><i class="legend-dot" style="background:var(--steel)"></i>Upper</span>'
      + '<span><i class="legend-dot" style="background:var(--olive)"></i>Legs + Arms</span>'
      + '<span><i class="legend-dot" style="background:var(--rust)"></i>Freeform</span></div>';
    h+='<div class="day-panel">'+dayPanel()+'</div></div>';
    return h;
  }

  function dayPanel(){
    if(!state.selectedDate) return '<div class="empty-state">Tap a day to view or log a session.</div>';
    var ss=onDate(state.selectedDate);
    var h='<div class="dp-date">'+state.selectedDate+'</div>';
    if(!ss.length){
      return h+'<button class="btn primary block" id="log-this-day">Log this day</button>';
    }
    ss.forEach(function(s){
      var dt=DAY_TYPES[s.dayType]||DAY_TYPES.free;
      h+='<div style="margin-bottom:10px;"><div class="section-title" style="font-size:13px;margin-bottom:6px;">'+dt.label+'</div>';
      s.exercises.forEach(function(e){
        h+='<div class="exn" style="font-size:13px;color:var(--chalk);margin:7px 0 2px;font-weight:500;">'+esc(e.name)+'</div><table><tbody>';
        e.sets.forEach(function(st,i){
          h+='<tr><td class="mono">'+(i+1)+'.</td><td class="mono">'+toDisp(st.weight||0)+' '+state.unit+'</td><td class="mono">×'+(st.reps||0)+'</td>'
            + (st.note?'<td class="nt">'+esc(st.note)+'</td>':'<td></td>')+'</tr>';
        });
        h+='</tbody></table>';
      });
      h+='</div>';
    });
    h+='<div style="display:flex;gap:8px;margin-top:10px;">'
      + '<button class="btn small" data-edit="'+ss[0].id+'">Edit</button>'
      + '<button class="btn small danger" data-del="'+ss[0].id+'">Delete</button></div>';
    return h;
  }

  /* ---- Log ---- */
  function vLog(){
    if(!state.draft) return vDayTypePicker();
    var d=state.draft;
    var dt=DAY_TYPES[d.dayType]||DAY_TYPES.free;
    var done=draftDoneCount(), total=d.exercises.length;
    var pct= total? Math.round(done/total*100) : 0;

    var h='<div class="card">';
    h+='<div class="session-bar"><div class="ttl">'+(d.editingId?'Editing · ':'')+dt.label+'</div>'
      + '<div class="cnt">'+done+' / '+total+'</div></div>';
    h+='<div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

    h+='<div style="margin-bottom:14px;"><label>Date</label><input type="date" id="d-date" value="'+d.date+'"></div>';

    d.exercises.forEach(function(ex,i){ h+=exCard(ex,i); });

    h+='<button class="btn ghost small block" id="add-ex" style="margin:10px 0 14px;">+ Add exercise</button>';
    h+='<button class="btn primary block" id="finish">'+(d.editingId?'Update session':'Finish workout')+'</button>';
    h+='<button class="btn ghost small block" id="discard" style="margin-top:8px;">'+(d.editingId?'Cancel edit':'Discard session')+'</button>';
    h+='</div>';
    return h;
  }

  function vDayTypePicker(){
    var h = '<div class="card"><h2>Start a session</h2>';
    h+='<div style="margin-bottom:14px;"><label>Date</label><input type="date" id="new-date" value="'+(state.selectedDate||todayStr())+'"></div>';
    h+='<div class="dt-grid">';
    Object.keys(DAY_TYPES).forEach(function(k){
      var dt=DAY_TYPES[k];
      var n = k==='free'? 'Build from scratch' : (state.presets[k]||[]).length+' exercises';
      h+='<button class="dt-btn" data-start="'+k+'" data-cat="'+dt.cat+'">'+dt.label+'<span class="n">'+n+'</span></button>';
    });
    h+='</div>';
    h+='<button class="btn ghost small block" id="pick-cancel" style="margin-top:12px;">Back</button>';
    h+='</div>';
    return h;
  }

  function exCard(ex,i){
    var open = state.openEx===i;
    var done = exDone(ex);
    var last = lastSummary(ex.name);
    var logged = ex.sets.filter(function(s){ return s.done; }).length;

    var sub, tgt = targetFor(ex.name);
    if(done || logged){
      sub = ex.sets.filter(function(s){return s.done;}).map(function(s){ return (s.weight||0)+'×'+(s.reps||0); }).join(', ');
    } else if(tgt){
      sub = '<b>Target:</b> '+toDisp(tgt.kg)+' × '+tgt.reps;
    } else if(last){
      sub = '<b>Last:</b> '+esc(last);
    } else {
      sub = 'No history — set a baseline';
    }

    var h='<div class="ex-card'+(open?' open':'')+(done?' done':'')+'">';
    h+='<div class="ex-head" data-open="'+i+'">'
      + '<div class="ex-check">'+ICONS.check+'</div>'
      + '<div class="ex-meta"><div class="nm">'+esc(ex.name)+'</div><div class="sub">'+sub+'</div></div>'
      + '<div class="chev">'+ICONS.chev+'</div></div>';

    h+='<div class="ex-body">';

    // the prescription — what to lift and why
    var tg = targetFor(ex.name);
    if(tg){
      h+='<div class="target-banner">'
        + '<div><div class="k">TARGET</div><div class="v">'+toDisp(tg.kg)+' '+state.unit+' × '+tg.reps+'</div></div>'
        + '<div class="why">'+esc(tg.why)+'</div></div>';
    }
    // your own note, surfaced while you're setting up — not buried in history
    h+=carryHtml(ex.name);

    if(last) h+='<div class="last-hint"><b>Last time:</b> '+esc(last)+'</div>';
    h+='<div class="set-hdr"><div>#</div><div>'+state.unit.toUpperCase()+'</div><div>Reps</div><div></div><div></div></div>';

    var best = bestKg(ex.name);
    ex.sets.forEach(function(s,j){
      var wv = parseFloat(s.weight)||0;
      var isPR = best>0 && wv>0 && toKg(wv) > best + 0.001;
      h+='<div class="set-row'+(s.done?' done':'')+'">'
        + '<div class="sidx">'+(j+1)+'</div>'
        + stepper('w',i,j,s.weight)
        + stepper('r',i,j,s.reps)
        + '<div class="set-done-btn" data-setdone="'+i+'-'+j+'">'+ICONS.check+'</div>'
        + '<button class="set-del" data-delset="'+i+'-'+j+'">&times;</button>'
        + '</div>';
      if(isPR) h+='<div style="margin:-2px 0 6px 32px;"><span class="pr-flag">PR</span></div>';
    });

    h+='<div class="rir"><div class="rl">Reps in reserve — how many left in the tank? (optional)</div><div class="chips">';
    ['0','1','2','3+'].forEach(function(v){
      var on = String(ex.rir)===v ? ' on' : '';
      h+='<button class="'+on.trim()+'" data-rir="'+i+'-'+v+'">'+v+'</button>';
    });
    h+='</div></div>';

    h+='<div class="set-note"><input type="text" placeholder="Note — form cue, how it felt…" value="'+esc(ex.sets.length?ex.sets[0].note:'')+'" data-note="'+i+'"></div>';
    h+='<div class="ex-actions">'
      + '<button class="btn small" data-addset="'+i+'">+ Set</button>'
      + '<button class="btn small ghost" data-delex="'+i+'">Remove exercise</button></div>';
    h+='</div></div>';
    return h;
  }

  function stepper(kind,i,j,val){
    return '<div class="stepper">'
      + '<button data-step="'+kind+'--'+i+'-'+j+'">&minus;</button>'
      + '<input type="number" inputmode="decimal" value="'+esc(val)+'" data-fld="'+kind+'-'+i+'-'+j+'" placeholder="0">'
      + '<button data-step="'+kind+'+'+i+'-'+j+'">+</button></div>';
  }

  /* ---- History ---- */

            + (st.note?'<td class="nt">'+esc(st.note)+'</td>':'<td></td>')+'</tr>';

  /* ---- Progress ---- */
  function vProgress(){
    var names=allExNames();
    if(state.progressExercise && names.indexOf(state.progressExercise)<0) state.progressExercise=null;
    if(!state.progressExercise && names.length) state.progressExercise=names[0];

    var h = resumeBanner() + '<div class="card"><h2>Progress</h2>';
    if(!names.length) return h+'<div class="empty-state">Log a session to see progress.</div></div>';

    h+='<div style="margin-bottom:16px;"><label>Exercise</label><select id="pex">';
    names.forEach(function(n){ h+='<option'+(n===state.progressExercise?' selected':'')+'>'+esc(n)+'</option>'; });
    h+='</select></div>';

    var raw=history(state.progressExercise);
    if(!raw.length) return h+'<div class="empty-state">No sets logged for this lift yet.</div></div>';
    var pts=raw.map(function(p){ return {date:p.date, weight:toDisp(p.weight), reps:p.reps, note:p.note}; });

    var max=pts.reduce(function(a,p){ return Math.max(a,p.weight); },0);
    var latest=pts[pts.length-1];
    var delta=r1(max-pts[0].weight);

    h+='<div class="pr-row">'
      + '<div class="pr-stat"><div class="val">'+max+' '+state.unit+'</div><div class="lbl">Best</div></div>'
      + '<div class="pr-stat"><div class="val">'+latest.weight+'×'+latest.reps+'</div><div class="lbl">Latest</div></div>'
      + '<div class="pr-stat"><div class="val">'+(delta>=0?'+':'')+delta+'</div><div class="lbl">Gain</div></div></div>';
    h+='<div class="chart-wrap">'+chart(pts)+'</div>';

    h+='<table style="width:100%;margin-top:14px;border-collapse:collapse;font-family:Roboto Condensed,sans-serif;font-size:12px;">'
      + '<thead><tr style="color:var(--chalk-faint);text-align:left;font-weight:400;">'
      + '<th style="padding:6px 0;font-weight:400;">Date</th><th style="font-weight:400;">Top set</th><th style="font-weight:400;">Note</th></tr></thead><tbody>';
    pts.slice().reverse().forEach(function(p){
      h+='<tr style="border-top:1px solid var(--line-soft);">'
        + '<td style="padding:7px 8px 7px 0;color:var(--chalk-dim);">'+p.date+'</td>'
        + '<td style="color:var(--chalk);">'+p.weight+' × '+p.reps+'</td>'
        + '<td style="color:var(--chalk-faint);font-family:Montserrat,sans-serif;font-style:italic;">'+esc(p.note)+'</td></tr>';
    });
    return h+'</tbody></table></div>';
  }

  function chart(pts){
    var W=700,H=200,pl=42,pr=14,pt=14,pb=26;
    var iw=W-pl-pr, ih=H-pt-pb;
    var ws=pts.map(function(p){return p.weight;});
    var mn=Math.min.apply(null,ws), mx=Math.max.apply(null,ws);
    if(mn===mx){ mn-=2.5; mx+=2.5; }
    var rg=mx-mn;
    function X(i){ return pl + (pts.length===1? iw/2 : i/(pts.length-1)*iw); }
    function Y(v){ return pt + ih - (v-mn)/rg*ih; }

    var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block;">';
    for(var g=0;g<=3;g++){ var gy=pt+ih/3*g; s+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--line-soft)"/>'; }
    var area = pts.map(function(p,i){ return (i?'L':'M')+X(i)+','+Y(p.weight); }).join(' ')
      + ' L'+X(pts.length-1)+','+(pt+ih)+' L'+X(0)+','+(pt+ih)+' Z';
    s+='<path d="'+area+'" fill="var(--rust)" opacity="0.09"/>';
    s+='<path d="'+pts.map(function(p,i){ return (i?'L':'M')+X(i)+','+Y(p.weight); }).join(' ')+'" fill="none" stroke="var(--rust)" stroke-width="2"/>';
    pts.forEach(function(p,i){ s+='<circle cx="'+X(i)+'" cy="'+Y(p.weight)+'" r="3.5" fill="var(--rust)" stroke="var(--bg)" stroke-width="1.5"/>'; });
    s+='<text x="4" y="'+(Y(mx)+4)+'" font-family="Roboto Condensed" font-size="10" fill="var(--chalk-faint)">'+r1(mx)+'</text>';
    s+='<text x="4" y="'+(Y(mn)+4)+'" font-family="Roboto Condensed" font-size="10" fill="var(--chalk-faint)">'+r1(mn)+'</text>';
    s+='<text x="'+X(0)+'" y="'+(H-6)+'" font-family="Roboto Condensed" font-size="9" fill="var(--chalk-faint)">'+pts[0].date.slice(5)+'</text>';
    if(pts.length>1) s+='<text x="'+X(pts.length-1)+'" y="'+(H-6)+'" font-family="Roboto Condensed" font-size="9" fill="var(--chalk-faint)" text-anchor="end">'+pts[pts.length-1].date.slice(5)+'</text>';
    return s+'</svg>';
  }
