  /* Reports the actual geometry of the device. The decisive line is NAV BOTTOM
     vs INNER HEIGHT: if they match, the nav IS flush with the viewport and the
     empty band is outside it (browser chrome / PWA container) — a completely
     different bug from the nav simply sitting too high. */
  function renderDiag(){
    var el=document.getElementById('diag');
    if(!el) return;
    var navEl=document.getElementById('nav');
    var r = navEl ? navEl.getBoundingClientRect() : null;
    var vv = window.visualViewport;
    var cs = getComputedStyle(document.documentElement);
    var standalone = (window.navigator.standalone === true) ||
                     (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches);

    var rows = [
      ['mode', standalone ? 'standalone (installed)' : 'browser tab'],
      ['window.innerHeight', window.innerHeight],
      ['visualViewport.h', vv ? Math.round(vv.height) : 'n/a'],
      ['screen.height', screen.height],
      ['nav rect.bottom', r ? Math.round(r.bottom) : 'n/a'],
      ['nav rect.height', r ? Math.round(r.height) : 'n/a'],
      ['GAP below nav', r ? Math.round(window.innerHeight - r.bottom) : 'n/a'],
      ['safe-area-bottom', cs.getPropertyValue('--sab-probe').trim() || 'see below'],
      ['dpr', window.devicePixelRatio]
    ];
    var h='';
    rows.forEach(function(x){
      var hot = (x[0]==='GAP below nav' && x[1]!==0 && x[1]!=='n/a');
      h += '<div style="display:flex;justify-content:space-between;'+(hot?'color:var(--rust);font-weight:600;':'')+'">'
         + '<span>'+x[0]+'</span><span>'+x[1]+'</span></div>';
    });
    el.innerHTML=h;
  }

  /* ---- wiring ---- */
  function wire(){
    var app=document.getElementById('app');
    var navEl=document.getElementById('nav');
    // the nav sits outside #app now, so queries have to span both
    var q=function(sel){
      var out=[].slice.call(app.querySelectorAll(sel));
      if(navEl) out=out.concat([].slice.call(navEl.querySelectorAll(sel)));
      return out;
    };

    q('[data-tab]').forEach(function(b){
      b.addEventListener('click', function(){
        var t=b.getAttribute('data-tab');
        if(t==='settings' && state.tab==='settings') t='today';   // gear toggles
        if(t===state.tab && t!=='today') return;
        if(t!=='today') state.picking=false;
        state.tab=t; render(); toTop();
      });
    });

    // "Pick another" — override the rotation
    var po=document.getElementById('pick-other');
    if(po) po.addEventListener('click', function(){ state.picking=true; render(); toTop(); });
    var po2=document.getElementById('pick-other-2');
    if(po2) po2.addEventListener('click', function(){ state.picking=true; render(); toTop(); });

    // advisor: "Why this?"
    var wt=document.getElementById('whytoggle');
    if(wt) wt.addEventListener('click', function(){
      var a=document.getElementById('advisor');
      if(!a) return;
      a.classList.toggle('open');
      wt.textContent = a.classList.contains('open') ? 'Hide' : 'Why this?';
    });

    // ---- deck: session ----
    var dk = deckEl();
    if(dk){
      // update chrome live while swiping, but do NOT re-render (that fights the scroll)
      watchDeck(dk, 'deckIndex', function(i){
        var total = state.draft ? state.draft.exercises.length : 0;
        var pos = document.querySelector('.deck-head .dpos');
        if(pos) pos.innerHTML = '<b>'+(i+1)+'</b> / '+total;
        document.querySelectorAll('.dots i').forEach(function(dot, j){
          dot.classList.toggle('on', j===i);
        });
        var pv=document.getElementById('deck-prev'), nx=document.getElementById('deck-next');
        if(pv) pv.disabled = (i===0);
        if(nx) nx.disabled = (i>=total-1);
      });
      var pv=document.getElementById('deck-prev');
      if(pv) pv.addEventListener('click', function(){
        var i=Math.max(0, indexOfDeck(dk)-1);
        state.deckIndex=i; scrollDeckTo(dk,i,true);
      });
      var nx=document.getElementById('deck-next');
      if(nx) nx.addEventListener('click', function(){
        var i=Math.min(state.draft.exercises.length-1, indexOfDeck(dk)+1);
        state.deckIndex=i; scrollDeckTo(dk,i,true);
      });
      q('[data-jump]').forEach(function(dot){
        dot.addEventListener('click', function(){
          var i=parseInt(dot.getAttribute('data-jump'),10);
          state.deckIndex=i; scrollDeckTo(dk,i,true);
        });
      });
    }

    // ---- deck: calendar day review ----
    var dd = dayDeckEl();
    if(dd){
      watchDeck(dd, 'dayIndex', function(i){
        document.querySelectorAll('.day-sum span').forEach(function(chip, j){
          chip.classList.toggle('cur', j===i);
        });
      });
      q('[data-dayjump]').forEach(function(chip){
        chip.addEventListener('click', function(){
          var i=parseInt(chip.getAttribute('data-dayjump'),10);
          state.dayIndex=i; scrollDeckTo(dd,i,true);
        });
      });
    }

    // setup memory — persists per exercise, carries forward
    q('[data-setup]').forEach(function(inp){
      var commit=function(){
        var i=parseInt(inp.getAttribute('data-setup'),10);
        saveSetup(state.draft.exercises[i].name, inp.value);
      };
      inp.addEventListener('change', commit);
      inp.addEventListener('blur', commit);
    });

    // note history toggle
    q('[data-notes]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-notes'),10);
        state.openNotes = (state.openNotes===i) ? null : i;
        render();
      });
    });

    // note search
    var ns=document.getElementById('nsearch');
    if(ns){
      ns.addEventListener('input', function(){
        state.noteQuery = ns.value;
        var pos = ns.selectionStart;
        render();
        var el=document.getElementById('nsearch');
        if(el){ el.focus(); try{ el.setSelectionRange(pos,pos); }catch(e){} }
      });
    }

    // tap a muscle row to see exactly which lifts produced its number
    q('[data-muscle]').forEach(function(r){
      r.addEventListener('click', function(){
        var m=r.getAttribute('data-muscle');
        state.openMuscle = (state.openMuscle===m) ? null : m;
        render();
      });
    });

    // nudge: swap to a day that doesn't collide with the 48h window
    q('[data-swap]').forEach(function(b){
      b.addEventListener('click', function(){
        state.override = b.getAttribute('data-swap');
        render(); toTop();
      });
    });
    var pc=document.getElementById('pick-cancel');
    if(pc) pc.addEventListener('click', function(){ state.picking=false; render(); toTop(); });

    q('[data-unit]').forEach(function(b){
      b.addEventListener('click', function(){
        var u=b.getAttribute('data-unit');
        if(u===state.unit) return;
        if(state.draft){
          state.draft.exercises.forEach(function(ex){
            ex.sets.forEach(function(s){
              var v=parseFloat(s.weight);
              if(!isNaN(v)){
                var kg = state.unit==='lbs'? v/KG_LBS : v;
                s.weight = String(u==='lbs'? r1(kg*KG_LBS) : r1(kg));
              }
            });
          });
        }
        state.unit=u; save('unit',u); saveDraft(); render();
      });
    });

    // calendar
    var p=document.getElementById('cal-prev'), n=document.getElementById('cal-next');
    if(p) p.addEventListener('click', function(){ state.calMonth--; if(state.calMonth<0){state.calMonth=11;state.calYear--;} render(); });
    if(n) n.addEventListener('click', function(){ state.calMonth++; if(state.calMonth>11){state.calMonth=0;state.calYear++;} render(); });
    q('[data-date]').forEach(function(c){
      c.addEventListener('click', function(){ state.selectedDate=c.getAttribute('data-date'); render(); });
    });
    var ltd=document.getElementById('log-this-day');
    if(ltd) ltd.addEventListener('click', function(){ state.picking=true; state.tab='today'; render(); toTop(); });

    // session edit / delete
    q('[data-edit]').forEach(function(b){
      b.addEventListener('click', function(e){ e.stopPropagation(); editSession(b.getAttribute('data-edit')); });
    });
    q('[data-del]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        if(!confirm('Delete this session permanently?')) return;
        var id=b.getAttribute('data-del');
        state.workouts=state.workouts.filter(function(w){ return w.id!==id; });
        saveWorkouts(); toast('Session deleted'); render();
      });
    });
    q('[data-sess]').forEach(function(hd){
      hd.addEventListener('click', function(){
        var b=document.getElementById('sb-'+hd.getAttribute('data-sess'));
        if(b) b.classList.toggle('open');
      });
    });

    // start session
    var nd=document.getElementById('new-date');
    if(nd) nd.addEventListener('change', function(){ state.selectedDate=nd.value; });
    q('[data-start]').forEach(function(b){
      b.addEventListener('click', function(){ startDraft(b.getAttribute('data-start')); toTop(); });
    });

    // draft date
    var dd=document.getElementById('d-date');
    if(dd) dd.addEventListener('change', function(){ state.draft.date=dd.value; saveDraft(); });

    // steppers (buttons)
    q('[data-step]').forEach(function(b){
      b.addEventListener('click', function(){
        var raw=b.getAttribute('data-step');            // e.g. "w+2-1" / "r-2-1"
        var kind=raw[0], sign=raw[1];
        var parts=raw.slice(2).replace(/^-/,'').split('-');
        var i=parseInt(parts[0],10), j=parseInt(parts[1],10);
        var set=state.draft.exercises[i].sets[j];
        var step = kind==='w' ? (state.unit==='lbs'?5:2.5) : 1;
        var cur = parseFloat(kind==='w'? set.weight : set.reps) || 0;
        var next = sign==='+' ? cur+step : Math.max(0, cur-step);
        if(kind==='w') set.weight=String(r1(next)); else set.reps=String(Math.round(next));
        saveDraft(); render();
      });
    });

    // direct typing (no re-render — keeps focus)
    q('[data-fld]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var pr=inp.getAttribute('data-fld').split('-');
        var kind=pr[0], i=parseInt(pr[1],10), j=parseInt(pr[2],10);
        var set=state.draft.exercises[i].sets[j];
        if(kind==='w') set.weight=inp.value; else set.reps=inp.value;
        saveDraft();
      });
    });

    // RIR chips
    q('[data-rir]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-rir').split('-');
        var i=parseInt(pr[0],10), v=pr[1];
        var ex=state.draft.exercises[i];
        ex.rir = (String(ex.rir)===v) ? undefined : v;   // tap again to clear
        saveDraft(); render();
      });
    });

    // note
    q('[data-note]').forEach(function(inp){
      inp.addEventListener('input', function(){
        var i=parseInt(inp.getAttribute('data-note'),10);
        var ex=state.draft.exercises[i];
        if(ex.sets.length) ex.sets[0].note=inp.value;
        saveDraft();
      });
    });

    // mark set done → start rest
    q('[data-setdone]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-setdone').split('-');
        var i=parseInt(pr[0],10), j=parseInt(pr[1],10);
        var ex=state.draft.exercises[i];
        var set=ex.sets[j];
        set.done=!set.done;
        if(set.done){
          if(!set.weight) set.weight='0';
          if(!set.reps) set.reps='0';
          startRest();
          // finish an exercise -> slide to the next one you haven't done
          if(exDone(ex) && state.deckIndex===i){
            var nx = state.draft.exercises.findIndex(function(e,k){ return k>i && !exDone(e); });
            if(nx>-1) state.deckIndex = nx;
          }
        }
        saveDraft(); render();
      });
    });

    q('[data-addset]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-addset'),10);
        var sets=state.draft.exercises[i].sets;
        sets.push(newSet(sets[sets.length-1]));
        saveDraft(); render();
      });
    });
    q('[data-delset]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-delset').split('-');
        var i=parseInt(pr[0],10), j=parseInt(pr[1],10);
        state.draft.exercises[i].sets.splice(j,1);
        saveDraft(); render();
      });
    });
    q('[data-delex]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-delex'),10);
        state.draft.exercises.splice(i,1);
        state.deckIndex = Math.max(0, Math.min(state.deckIndex, state.draft.exercises.length-1));
        state.pickingEx=null;
        saveDraft(); render();
      });
    });

    // ---- title picker: tap the name to swap or add ----
    q('[data-rename]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-rename'),10);
        state.pickingEx = (state.pickingEx===i) ? null : i;
        render();
      });
    });
    q('[data-cancelpick]').forEach(function(b){
      b.addEventListener('click', function(){ state.pickingEx=null; render(); });
    });
    q('[data-swapto]').forEach(function(b){
      b.addEventListener('click', function(){
        var parts=b.getAttribute('data-swapto').split('|');
        var i=parseInt(parts[0],10), name=parts.slice(1).join('|');
        var ex=state.draft.exercises[i];
        if(ex.name!==name){
          // new exercise in this slot: reseed from ITS history, clear the old logging
          ex.name=name;
          ex.sets=seedSets(name);
          ex.rir=undefined;
        }
        state.pickingEx=null;
        saveDraft(); render();
      });
    });
    q('[data-addnew]').forEach(function(b){
      b.addEventListener('click', function(){
        var i=parseInt(b.getAttribute('data-addnew'),10);
        var inp=document.getElementById('expick-input-'+i);
        var nm=inp && inp.value.trim();
        if(!nm){ toast('Type a name first'); return; }
        var ex=state.draft.exercises[i];
        ex.name=nm; ex.sets=seedSets(nm); ex.rir=undefined;
        state.pickingEx=null;
        saveDraft(); render();
      });
    });
    var ae=document.getElementById('add-ex');
    if(ae) ae.addEventListener('click', function(){
      var nm=prompt('Exercise name:');
      if(!nm || !nm.trim()) return;
      state.draft.exercises.push({ name:nm.trim(), sets:seedSets(nm.trim()) });
      state.deckIndex=state.draft.exercises.length-1;   // swipe straight to it
      saveDraft(); render();
    });

    // finish
    var fin=document.getElementById('finish');
    if(fin) fin.addEventListener('click', function(){
      var d=state.draft;
      var out=d.exercises.map(function(e){
        var sets=e.sets.filter(function(s){ return s.done || s.weight!=='' || s.reps!==''; })
          .map(function(s){
            var v=parseFloat(s.weight)||0;
            return { weight: Math.round(toKg(v)*100)/100, reps: parseInt(s.reps)||0, note:s.note||'' };
          });
        var out_ex = { name:e.name, sets:sets };
        if(e.rir!==undefined && e.rir!=='') out_ex.rir = e.rir;
        return out_ex;
      }).filter(function(e){ return e.sets.length; });

      if(!out.length){ toast('Nothing logged yet'); return; }

      if(d.editingId){
        var ix=state.workouts.findIndex(function(w){ return w.id===d.editingId; });
        if(ix>-1) state.workouts[ix]={ id:d.editingId, date:d.date, dayType:d.dayType, exercises:out };
        toast('Session updated');
      } else {
        state.workouts.push({ id:uid(), date:d.date, dayType:d.dayType, exercises:out });
        toast('Workout saved');
      }
      saveWorkouts();
      state.selectedDate=d.date;
      state.draft=null; saveDraft(); stopRest();
      state.tab='today'; render(); toTop();
    });

    var dis=document.getElementById('discard');
    if(dis) dis.addEventListener('click', function(){
      var wasEditing = !!state.draft.editingId;
      if(!confirm(wasEditing?'Discard changes?':'Discard this session? Everything logged will be lost.')) return;
      state.draft=null; saveDraft(); stopRest();
      state.tab = wasEditing ? 'history' : 'today';
      render(); toTop();
    });

    // progress
    var pex=document.getElementById('pex');
    if(pex) pex.addEventListener('change', function(){ state.progressExercise=pex.value; render(); });

    // presets
    q('[data-pk]').forEach(function(inp){
      inp.addEventListener('input', function(){
        state.presets[inp.getAttribute('data-pk')][parseInt(inp.getAttribute('data-pi'),10)]=inp.value;
      });
    });
    q('[data-prm]').forEach(function(b){
      b.addEventListener('click', function(){
        var pr=b.getAttribute('data-prm').split('-');
        state.presets[pr[0]].splice(parseInt(pr[1],10),1); render();
      });
    });
    q('[data-padd]').forEach(function(b){
      b.addEventListener('click', function(){
        state.presets[b.getAttribute('data-padd')].push('New exercise'); render();
      });
    });
    var ps=document.getElementById('psave');
    if(ps) ps.addEventListener('click', function(){
      state.presets = Object.keys(state.presets).reduce(function(acc,k){
        acc[k]=state.presets[k].map(function(x){ return x.trim(); }).filter(Boolean); return acc;
      },{});
      save('presets', state.presets); toast('Presets saved'); render();
    });
    var prst=document.getElementById('preset');
    if(prst) prst.addEventListener('click', function(){
      if(!confirm('Reset all presets to defaults?')) return;
      state.presets=JSON.parse(JSON.stringify(DEFAULT_PRESETS));
      save('presets', state.presets); toast('Presets reset'); render();
    });
    // ---- backup ----
    var bx=document.getElementById('bk-export');
    if(bx) bx.addEventListener('click', exportBackup);
    var bs=document.getElementById('bk-share');
    if(bs) bs.addEventListener('click', shareBackup);
    var bc=document.getElementById('bk-copy');
    if(bc) bc.addEventListener('click', copyBackup);

    // restore — read the file, then require an explicit Merge or Replace
    var bf=document.getElementById('bk-file');
    if(bf) bf.addEventListener('change', function(){
      var f = bf.files && bf.files[0];
      if(!f) return;
      var rdr = new FileReader();
      rdr.onload = function(){
        state.pendingBackup = String(rdr.result);
        toast('File loaded — now choose Merge or Replace');
      };
      rdr.onerror = function(){ toast('Could not read that file'); };
      rdr.readAsText(f);
    });
    var bm=document.getElementById('bk-merge');
    if(bm) bm.addEventListener('click', function(){
      if(!state.pendingBackup){ toast('Choose a backup file first'); return; }
      importBackup(state.pendingBackup, 'merge');
    });
    var br=document.getElementById('bk-replace');
    if(br) br.addEventListener('click', function(){
      if(!state.pendingBackup){ toast('Choose a backup file first'); return; }
      if(!confirm('Replace ALL data on this phone with the backup?\n\nYour current '
                  + state.workouts.length + ' sessions will be overwritten. This cannot be undone.')) return;
      importBackup(state.pendingBackup, 'replace');
    });

    var rd=document.getElementById('rest-dur');
    if(rd) rd.addEventListener('change', function(){
      state.rest.dur=parseInt(rd.value,10); save('rest', String(state.rest.dur)); toast('Rest set to '+fmtTime(state.rest.dur));
    });

    // muscle tags
    var ts=document.getElementById('tsave');
    if(ts) ts.addEventListener('click', function(){
      var next={}, bad=[];
      app.querySelectorAll('[data-tag]').forEach(function(inp){
        var name=inp.getAttribute('data-tag');
        var parts=inp.value.split('/');
        var clean=function(str){
          return (str||'').split(',').map(function(x){ return x.trim(); }).filter(Boolean)
            .filter(function(m){
              if(MUSCLE_ORDER.indexOf(m)>-1) return true;
              bad.push(m); return false;
            });
        };
        next[name]={ p:clean(parts[0]), s:clean(parts[1]) };
      });
      state.tags=next; save('tags', next);
      toast(bad.length ? 'Saved — ignored: '+bad.slice(0,2).join(', ') : 'Tags saved');
      render();
    });
    var tr=document.getElementById('treset');
    if(tr) tr.addEventListener('click', function(){
      if(!confirm('Reset all muscle tags to defaults?')) return;
      state.tags={}; save('tags', {}); toast('Tags reset'); render();
    });
  }

  /* ---- Deck plumbing ----
     Every set you tick re-renders the app. Without this, the deck would snap
     back to card 1 mid-workout — which would make the whole thing unusable.
     So: remember the index, and put the scroll back exactly where it was. */
  function deckEl(){ return document.getElementById('deck'); }
  function dayDeckEl(){ return document.getElementById('daydeck'); }

  function cardWidth(d){
    var c = d.querySelector('.dcard');
    if(!c) return d.clientWidth;
    var gap = parseFloat(getComputedStyle(d).gap) || 12;
    return c.getBoundingClientRect().width + gap;
  }
  function scrollDeckTo(d, i, smooth){
    if(!d) return;
    d.scrollTo({ left: i * cardWidth(d), behavior: smooth ? 'smooth' : 'auto' });
  }
  function indexOfDeck(d){
    if(!d) return 0;
    return Math.round(d.scrollLeft / cardWidth(d));
  }
  function restoreDecks(){
    var d = deckEl();
    if(d) scrollDeckTo(d, state.deckIndex||0, false);
    var dd = dayDeckEl();
    if(dd) scrollDeckTo(dd, state.dayIndex||0, false);
  }

  /* ---- Nav enforcer ----
     This bar has been knocked out of place repeatedly by CSS quirks: an
     ancestor creating a containing block silently reparents position:fixed so
     it anchors to that element instead of the screen. Rather than keep hunting
     the offending property, we stop trusting CSS to hold the nav and pin it in
     JS to the measured viewport bottom. Nothing upstream can dislodge it now. */
  function pinNav(){
    var nav = document.getElementById('nav');
    if(!nav) return;
    var vv = window.visualViewport;
    // bottom of the ACTUAL visible viewport, page-relative
    var pageBottom = (vv ? (vv.offsetTop + vv.height) : window.innerHeight) + window.scrollY;
    nav.style.position = 'fixed';
    nav.style.left = '0';
    nav.style.right = '0';
    nav.style.bottom = '0';
    // if a containing block IS in play, translate to compensate so it still lands flush
    var rect = nav.getBoundingClientRect();
    var gap = Math.round((vv ? vv.height : window.innerHeight) - rect.bottom);
    nav.style.transform = gap ? ('translateY(' + gap + 'px)') : 'none';
  }
  window.addEventListener('scroll', pinNav, { passive:true });
  window.addEventListener('resize', pinNav);
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', pinNav);
    window.visualViewport.addEventListener('scroll', pinNav);
  }
  // update the counter/dots as you swipe, WITHOUT re-rendering (that would fight the scroll)
  function watchDeck(d, key, onChange){
    if(!d) return;
    var t=null;
    d.addEventListener('scroll', function(){
      if(t) clearTimeout(t);
      t = setTimeout(function(){
        var i = indexOfDeck(d);
        if(i !== state[key]){
          state[key] = i;
          if(key==='deckIndex') state.pickingEx=null;
          if(onChange) onChange(i);
        }
      }, 90);
    }, { passive:true });
  }

  // the scroll container is #app now, not the window
  function toTop(){
    var a=document.getElementById('app');
    if(a) a.scrollTop=0;
  }

  /* ---- Measured viewport ----
     CSS viewport units (vh, dvh) have proven unreliable inside the iOS PWA
     container — the body was coming up short of the screen, which is what left
     the band under the nav. So stop trusting CSS and measure the real viewport,
     then drive the layout from that number. visualViewport is the source of
     truth; innerHeight is the fallback. */
  function syncViewport(){
    var vv = window.visualViewport;
    var h = Math.round(vv ? vv.height : window.innerHeight);
    if(!h) return;
    document.documentElement.style.setProperty('--vh', h + 'px');
  }
  syncViewport();
  window.addEventListener('resize', syncViewport);
  // heights aren't final until first paint and fonts settle — re-pin then
  requestAnimationFrame(function(){ syncViewport(); if(typeof pinNav==='function') pinNav(); });
  window.addEventListener('load', function(){ syncViewport(); if(typeof pinNav==='function') pinNav(); });
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(function(){ if(typeof pinNav==='function') pinNav(); });
  }
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize', syncViewport);
    window.visualViewport.addEventListener('scroll', syncViewport);
  }
  window.addEventListener('orientationchange', function(){ setTimeout(syncViewport, 250); });

  /* ---- Zoom lockout ----
     Safari on iOS deliberately ignores user-scalable=no, so the viewport tag
     isn't enough on its own. Three layers, each covering a different gesture:
       · viewport meta        → pinch zoom in most browsers
       · touch-action CSS     → double-tap-to-zoom
       · gesture events below → pinch zoom in Safari specifically
     Inputs are all >=16px too, which is what stops iOS zooming on focus. */
  ['gesturestart','gesturechange','gestureend'].forEach(function(evt){
    document.addEventListener(evt, function(e){ e.preventDefault(); }, { passive:false });
  });
  // multi-touch pinch fallback for browsers without gesture events
  document.addEventListener('touchmove', function(e){
    if(e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive:false });

  try{ var r=localStorage.getItem('ltp:rest'); if(r) state.rest.dur=parseInt(r,10)||REST_DEFAULT; }catch(e){}
  load();
})();
</script>
</body>
</html>
